<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="JobsAI">
  <!-- Brand-square background: purple → lighter-purple gradient, matching
       the in-app .brand-glyph swatch (var(--accent)→var(--accent-h)). -->
  <defs>
    <linearGradient id="jb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#a78bff"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" ry="7" fill="url(#jb)"/>
  <!-- "Job list" glyph: three white rules of decreasing length + a
       circle marker in the lower-right (matches the BrandMark in app.jsx).
       Stroke width and end-caps are bumped vs. the in-app version so the
       silhouette reads cleanly at 16×16. -->
  <g stroke="#ffffff" stroke-linecap="round" fill="none">
    <line x1="6" y1="10" x2="26" y2="10" stroke-width="2.6"/>
    <line x1="6" y1="16" x2="20" y2="16" stroke-width="2.6"/>
    <line x1="6" y1="22" x2="14" y2="22" stroke-width="2.6"/>
    <circle cx="24" cy="22" r="3.1" stroke-width="2"/>
  </g>
</svg>
