<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Jobs AI — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
/* ── TOKENS ── */
:root {
  --bg:      #0a0a0f;
  --bg1:     #0f0f17;
  --bg2:     #141420;
  --bg3:     #1a1a28;
  --surface: #1e1e2e;
  --sur2:    #252538;
  --bdr:     rgba(255,255,255,.07);
  --bdr2:    rgba(255,255,255,.13);
  --t1:  #f0f0f8;
  --t2:  #8b8ba8;
  --t3:  #4a4a68;
  --accent:  #5e6ad2;
  --acch:    #7b84e8;
  --accd:    rgba(94,106,210,.14);
  --green:   #4ade80;
  --greend:  rgba(74,222,128,.12);
  --amber:   #fbbf24;
  --amberd:  rgba(251,191,36,.1);
  --red:     #f87171;
  --redd:    rgba(248,113,113,.1);
  --mono: 'JetBrains Mono', monospace;
  --sans: 'DM Sans', sans-serif;
  --serif: 'DM Serif Display', Georgia, serif;
  --sb: 260px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased;overflow:hidden;height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px}

/* ── ICON HELPER ── */
.ic{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}

/* ── LAYOUT ── */
.shell{display:flex;height:100vh;width:100vw;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sb);flex-shrink:0;background:var(--bg1);
  border-right:1px solid var(--bdr);display:flex;flex-direction:column;
  height:100vh;overflow-y:auto;
}
.sb-top{padding:18px 18px 14px;border-bottom:1px solid var(--bdr)}
.sb-wordmark{font-family:var(--serif);font-size:17px;color:var(--t1);letter-spacing:-.2px;cursor:pointer;user-select:none;display:block}
.sb-wordmark span{color:var(--accent)}
.sb-body{flex:1;padding:12px 14px;display:flex;flex-direction:column;gap:18px;overflow-y:auto}
.sb-section-label{
  font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--t3);margin-bottom:8px;font-family:var(--mono);
}
.sb-group{display:flex;flex-direction:column;gap:8px}
.sb-field{display:flex;flex-direction:column;gap:4px}
.sb-label{font-size:11px;font-weight:500;color:var(--t2)}
.sb-input{
  padding:7px 10px;border-radius:7px;border:1px solid var(--bdr2);
  background:var(--bg2);color:var(--t1);font-family:var(--sans);font-size:13px;
  outline:none;transition:border-color .15s,box-shadow .15s;width:100%;
}
.sb-input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(94,106,210,.18)}
.sb-input:disabled{opacity:.4;cursor:not-allowed}
.sb-select{
  padding:7px 10px;border-radius:7px;border:1px solid var(--bdr2);
  background:var(--bg2);color:var(--t1);font-family:var(--sans);font-size:13px;
  outline:none;cursor:pointer;width:100%;
}
.sb-select:disabled{opacity:.4;cursor:not-allowed}
.sb-helper{font-size:10px;color:var(--t3);line-height:1.4;margin-top:2px}
.sb-warn{font-size:10px;color:var(--amber);background:var(--amberd);padding:5px 8px;border-radius:5px;border:1px solid rgba(251,191,36,.2)}
/* range */
.range-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.range-label{font-size:11px;font-weight:500;color:var(--t2)}
.range-val{font-family:var(--mono);font-size:13px;color:var(--acch);font-weight:500}
input[type=range]{width:100%;accent-color:var(--accent)}
input[type=range]:disabled{opacity:.4}
/* toggle */
.toggle-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.toggle-lbl{font-size:12px;color:var(--t2)}
.toggle-btn{
  width:36px;height:20px;border-radius:10px;border:none;cursor:pointer;
  background:var(--bg3);position:relative;transition:background .2s;flex-shrink:0;
}
.toggle-btn.on{background:var(--accent)}
.toggle-btn::after{
  content:'';position:absolute;top:3px;left:3px;
  width:14px;height:14px;border-radius:50%;background:#fff;transition:transform .2s;
}
.toggle-btn.on::after{transform:translateX(16px)}
.toggle-btn:disabled{opacity:.4;cursor:not-allowed}
/* chips multiselect */
.chips{display:flex;flex-wrap:wrap;gap:5px}
.chip-opt{
  padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;
  border:1px solid var(--bdr2);color:var(--t3);transition:all .12s;user-select:none;
}
.chip-opt.sel{background:var(--accd);border-color:rgba(94,106,210,.4);color:var(--acch)}
/* advanced collapse */
.adv-toggle{
  display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t3);
  cursor:pointer;user-select:none;transition:color .12s;background:none;border:none;padding:0;
}
.adv-toggle:hover{color:var(--t2)}
.adv-body{overflow:hidden;max-height:0;transition:max-height .3s cubic-bezier(.16,1,.3,1)}
.adv-body.open{max-height:400px}
/* radio */
.radio-group{display:flex;flex-direction:column;gap:5px}
.radio-item{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:12px;color:var(--t2)}
.radio-item input{accent-color:var(--accent)}
/* divider */
.sb-sep{border:none;border-top:1px solid var(--bdr);margin:4px 0}
/* bottom */
.sb-bottom{padding:12px 14px;border-top:1px solid var(--bdr);display:flex;flex-direction:column;gap:8px}
.sb-mode-pill{
  display:flex;align-items:center;gap:6px;padding:5px 9px;
  background:var(--bg3);border:1px solid var(--bdr);border-radius:6px;font-size:11px;color:var(--t2);
  font-family:var(--mono);
}
.sb-mode-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.sb-reset{
  padding:7px 12px;border-radius:7px;border:1px solid var(--bdr2);background:transparent;
  color:var(--t3);font-family:var(--sans);font-size:12px;cursor:pointer;
  transition:all .15s;display:flex;align-items:center;gap:6px;justify-content:center;
  width:100%;
}
.sb-reset:hover{border-color:var(--red);color:var(--red);background:var(--redd)}

/* ── MAIN ── */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* ════════════════════════════════════
   SCREEN 1 — ONBOARDING
════════════════════════════════════ */
.onboard{
  flex:1;overflow-y:auto;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:60px 32px;
  background:var(--bg);
}
.ob-logo{font-family:var(--serif);font-size:28px;color:var(--t1);margin-bottom:52px;letter-spacing:-.3px}
.ob-logo span{color:var(--accent)}
.ob-card{
  width:100%;max-width:600px;background:var(--surface);
  border:1px solid var(--bdr2);border-radius:16px;padding:40px;
  box-shadow:0 24px 64px rgba(0,0,0,.5);
}
.ob-h1{font-family:var(--serif);font-size:30px;color:var(--t1);letter-spacing:-.03em;margin-bottom:8px}
.ob-sub{font-size:15px;color:var(--t2);line-height:1.6;margin-bottom:28px}
.ob-textarea{
  width:100%;min-height:180px;resize:vertical;padding:14px;
  border-radius:10px;border:1px solid var(--bdr2);background:var(--bg2);
  color:var(--t1);font-family:var(--mono);font-size:12px;line-height:1.7;
  outline:none;transition:border-color .15s,box-shadow .15s;margin-bottom:16px;
}
.ob-textarea:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(94,106,210,.18)}
.ob-dropzone{
  border:1.5px dashed var(--bdr2);border-radius:10px;padding:24px;
  text-align:center;cursor:pointer;transition:all .15s;margin-bottom:14px;
}
.ob-dropzone:hover,.ob-dropzone.drag{border-color:var(--accent);background:var(--accd)}
.ob-dz-icon{margin:0 auto 10px;color:var(--t3)}
.ob-dz-title{font-size:14px;font-weight:500;color:var(--t2);margin-bottom:4px}
.ob-dz-sub{font-size:12px;color:var(--t3)}
.ob-dz-fmts{display:flex;gap:5px;justify-content:center;margin-top:10px}
.ob-fmt{font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:4px;background:rgba(255,255,255,.06);color:var(--t3)}
.ob-demo-link{
  font-size:13px;color:var(--t3);cursor:pointer;text-align:center;
  display:block;transition:color .15s;background:none;border:none;font-family:var(--sans);
  width:100%;padding:4px 0;
}
.ob-demo-link:hover{color:var(--acch)}
/* loaded state */
.ob-loaded-banner{
  display:flex;align-items:flex-start;gap:10px;padding:14px 16px;
  background:var(--greend);border:1px solid rgba(74,222,128,.25);
  border-radius:10px;margin-bottom:20px;
}
.ob-loaded-text{font-size:13px;color:var(--t1);line-height:1.5;flex:1}
.ob-loaded-text strong{font-weight:600;color:var(--green)}
.ob-change{font-size:12px;color:var(--t3);cursor:pointer;text-decoration:underline;background:none;border:none;font-family:var(--sans);margin-top:4px;display:block;padding:0}
.ob-change:hover{color:var(--t2)}
.ob-cta{
  width:100%;padding:14px;border-radius:10px;border:none;cursor:pointer;
  background:var(--accent);color:#fff;font-family:var(--sans);font-size:15px;
  font-weight:600;transition:all .15s;display:flex;align-items:center;
  justify-content:center;gap:8px;margin-bottom:12px;
}
.ob-cta:hover{background:var(--acch);transform:translateY(-1px);box-shadow:0 8px 24px rgba(94,106,210,.35)}
.ob-settings-hint{font-size:12px;color:var(--t3);text-align:center;line-height:1.5}

/* ════════════════════════════════════
   SCREEN 2 — PIPELINE
════════════════════════════════════ */
.pipeline-shell{flex:1;display:flex;overflow:hidden}

/* phase inline header bars */
.ph-wrap{border-radius:10px;overflow:hidden;margin-bottom:16px;border:1px solid var(--bdr)}
.ph-wrap.ph-done{border-left:3px solid var(--green)}
.ph-wrap.ph-running{border-left:3px solid var(--amber);animation:ph-glow 2s ease-in-out infinite}
.ph-wrap.ph-wait{border-left:3px solid var(--bdr)}
.ph-wrap.ph-error{border-left:3px solid var(--red)}
@keyframes ph-glow{0%,100%{box-shadow:0 0 0 0 rgba(251,191,36,.08)}50%{box-shadow:0 0 12px 0 rgba(251,191,36,.18)}}
.ph-header{
  display:flex;align-items:center;gap:10px;padding:0 16px;
  height:44px;background:var(--bg2);cursor:pointer;
  user-select:none;transition:background .12s;
}
.ph-header:hover{background:var(--bg3)}
.ph-num{
  width:26px;height:26px;border-radius:6px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-family:var(--mono);font-weight:600;
  background:var(--bg3);color:var(--t3);border:1px solid var(--bdr);
  transition:all .2s;
}
.ph-done .ph-num{background:var(--greend);color:var(--green);border-color:rgba(74,222,128,.25)}
.ph-running .ph-num{background:var(--amberd);color:var(--amber);border-color:rgba(251,191,36,.3)}
.ph-error .ph-num{background:var(--redd);color:var(--red);border-color:rgba(248,113,113,.25)}
.ph-name{font-size:13px;font-weight:600;color:var(--t1);flex:1;letter-spacing:-.01em}
.ph-wait .ph-name{color:var(--t2)}
.ph-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.ph-badge{font-size:10px;font-weight:600;font-family:var(--mono);padding:2px 7px;border-radius:4px}
.phb-done{background:var(--greend);color:var(--green)}
.phb-run{background:var(--amberd);color:var(--amber)}
.phb-wait{background:rgba(255,255,255,.05);color:var(--t3)}
.phb-err{background:var(--redd);color:var(--red)}
.ph-elapsed{font-family:var(--mono);font-size:10px;color:var(--t3)}
.ph-chevron{font-size:11px;color:var(--t3);transition:transform .2s;line-height:1}
.ph-chevron.open{transform:rotate(180deg)}
.ph-body{background:var(--surface);border-top:1px solid var(--bdr)}
.ph-wait-body{padding:12px 16px;font-size:12px;color:var(--t3);font-style:italic}
.step-time{font-size:10px;font-family:var(--mono);color:var(--t3)}

/* inline phase loading bar */
.phase-loading-bar{height:2px;background:var(--bg3);overflow:hidden;border-radius:1px}
.phase-loading-fill{height:100%;background:var(--amber);animation:lsweep 1.4s ease-in-out infinite}
@keyframes lsweep{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}

/* pipeline meta bar */
.pipeline-meta-bar{padding:10px 32px 0;flex-shrink:0;font-family:var(--mono);font-size:11px;color:var(--t3)}
/* progress bar */
.prog-track{height:3px;background:var(--bg3);flex-shrink:0;position:relative;overflow:hidden;margin-top:8px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--acch),var(--green));transition:width .8s cubic-bezier(.16,1,.3,1)}
.prog-shimmer{position:absolute;top:0;bottom:0;width:60px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);animation:shimmer 1.8s ease-in-out infinite}
@keyframes shimmer{0%{left:-60px}100%{left:100%}}

/* result area */
.result-area{flex:1;overflow-y:auto;padding:24px 32px}

/* phase result card */
.phase-card{margin-bottom:36px;animation:card-in .45s cubic-bezier(.16,1,.3,1)}
@keyframes card-in{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.pc-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.pc-num{
  width:24px;height:24px;border-radius:6px;background:var(--accd);
  display:flex;align-items:center;justify-content:center;font-size:11px;
  font-family:var(--mono);font-weight:600;color:var(--acch);flex-shrink:0;
}
.pc-num.done-card{background:var(--greend);color:var(--green)}
.pc-title{font-size:16px;font-weight:600;color:var(--t1);letter-spacing:-.02em}
.pc-divider{border:none;border-top:1px solid var(--bdr);margin:0 0 24px}

/* metrics strip */
.metrics{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.met{background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;padding:11px 14px}
.met-val{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--t1);letter-spacing:-.04em;line-height:1}
.met-lbl{font-size:10px;color:var(--t3);margin-top:4px;text-transform:uppercase;letter-spacing:.05em}

/* data table */
.dtbl{width:100%;border-collapse:collapse;margin-bottom:14px}
.dtbl th{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;padding:6px 10px;text-align:left;border-bottom:1px solid var(--bdr)}
.dtbl td{padding:9px 10px;font-size:12px;color:var(--t2);border-bottom:1px solid rgba(255,255,255,.03)}
.dtbl tr:last-child td{border:none}
.dtbl tr:hover td{background:rgba(255,255,255,.02)}
.td-s{font-weight:600;color:var(--t1)}
.score-cell{font-family:var(--mono);font-size:14px;font-weight:700}
.sc-hi{color:var(--acch)}.sc-md{color:var(--amber)}.sc-lo{color:var(--t3)}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:6px}
.sd-green{background:var(--green)}.sd-amber{background:var(--amber)}.sd-red{background:var(--red)}.sd-dim{background:var(--t3)}
.chip-sm{font-size:10px;font-weight:600;font-family:var(--mono);padding:2px 7px;border-radius:4px;white-space:nowrap}
.cg{background:var(--greend);color:var(--green)}
.ca{background:var(--accd);color:var(--acch)}
.cy{background:var(--amberd);color:var(--amber)}
.cr{background:var(--redd);color:var(--red)}
.cd{background:rgba(255,255,255,.05);color:var(--t3)}

/* skills columns */
.skills-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:14px}
.skills-group h4{font-size:11px;font-weight:600;color:var(--t3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
.skill-chips{display:flex;flex-wrap:wrap;gap:5px}
.skill-chip{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--bg3);border:1px solid var(--bdr2);color:var(--t2)}

/* warning / info / success bars */
.warn-bar{padding:10px 14px;background:var(--amberd);border:1px solid rgba(251,191,36,.2);border-radius:8px;font-size:12px;color:var(--amber);display:flex;align-items:center;gap:8px;margin-bottom:14px}
.info-bar{padding:10px 14px;background:var(--accd);border:1px solid rgba(94,106,210,.2);border-radius:8px;font-size:12px;color:var(--t2);display:flex;align-items:center;gap:8px;margin-bottom:14px}
.success-bar{padding:10px 14px;background:var(--greend);border:1px solid rgba(74,222,128,.25);border-radius:8px;font-size:12px;color:var(--green);display:flex;align-items:center;gap:8px;margin-bottom:14px}

/* action button */
.act-btn{
  padding:7px 16px;border-radius:7px;border:1px solid var(--bdr2);background:transparent;
  color:var(--t2);font-family:var(--sans);font-size:12px;font-weight:500;cursor:pointer;
  transition:all .12s;display:inline-flex;align-items:center;gap:6px;
}
.act-btn:hover{background:rgba(255,255,255,.05);color:var(--t1)}
.act-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.act-btn.primary:hover{background:var(--acch)}
.act-btn:disabled{opacity:.35;cursor:not-allowed}

/* tailoring expand rows */
.tailor-row{border-bottom:1px solid var(--bdr)}
.tailor-row-header{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;transition:background .12s;border-radius:7px}
.tailor-row-header:hover{background:rgba(255,255,255,.02)}
.tailor-row-co{font-size:13px;font-weight:600;color:var(--t1);flex:1}
.tailor-row-role{font-size:12px;color:var(--t2)}
.tailor-expand{overflow:hidden;max-height:0;transition:max-height .3s cubic-bezier(.16,1,.3,1)}
.tailor-expand.open{max-height:400px}
.tailor-expand-body{padding:12px 12px 18px;border-top:1px solid var(--bdr)}
.ats-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.ats-score{font-family:var(--mono);font-size:18px;font-weight:700}
.ats-arrow{color:var(--t3);font-size:14px}
.ats-delta{font-size:12px;font-weight:600;font-family:var(--mono);padding:2px 7px;border-radius:4px}
.delta-pos{background:var(--greend);color:var(--green)}

/* CLI / terminal log */
.cli-wrap{background:var(--bg);border-radius:8px;border:1px solid var(--bdr);padding:14px 16px;margin-bottom:14px;font-family:var(--mono);font-size:12px;line-height:1.85;min-height:60px}
.cli-line{animation:cli-in .18s ease}
@keyframes cli-in{from{opacity:0;transform:translateX(-5px)}to{opacity:1;transform:none}}
.cc0{color:var(--t3)}.cc1{color:var(--t2)}.cc2{color:var(--acch)}.cc3{color:var(--green)}.cc4{color:var(--amber)}
.cli-cursor{display:inline-block;width:7px;height:13px;background:var(--accent);vertical-align:middle;animation:cur 1s step-end infinite}
@keyframes cur{0%,100%{opacity:1}50%{opacity:0}}

/* loading sweep */
.load-track{height:2px;background:var(--bg3);overflow:hidden;border-radius:1px}
.load-fill{height:100%;background:var(--amber);animation:lsweep 1.4s ease-in-out infinite}

/* waiting state */
.wait-state{padding:20px;border:1.5px dashed var(--bdr);border-radius:10px;text-align:center}
.wait-text{font-size:13px;color:var(--t3);margin-top:8px}

/* error block */
.err-block{background:var(--redd);border:1px solid rgba(248,113,113,.25);border-radius:8px;padding:14px;margin-bottom:14px}

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;
  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);
  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);
  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);
  const dismiss = () => { setOpen(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); };
  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      clampToViewport();
    };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };
  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" onMouseDown={e=>e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}
function TweakSection({ label, children }) {
  return <><div className="twk-sect">{label}</div>{children}</>;
}
function TweakSlider({ label, value, min=0, max=100, step=1, unit='', onChange }) {
  return (

      <div className="twk-lbl"><span>{label}</span><span className="twk-val">{value}{unit}</span></div>
      <input type="range" className="twk-slider" min={min} max={max} step={step} value={value} onChange={e=>onChange(Number(e.target.value))}/>
    </div>
  );
}
function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value?'1':'0'} onClick={()=>onChange(!value)}><i/></button>

}
function TweakText({ label, value, placeholder, onChange }) {

function TweakColor({ label, value, onChange }) {

Object.assign(window, { useTweaks, TweaksPanel, TweakSection, TweakSlider, TweakToggle, TweakText, TweakColor });

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ── REAL API MODULE ── */
const api = {
  get:    url  => fetch(url).then(r => r.json()),
  post:   (url, body) => fetch(url, {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body),
  }).then(r => r.json()),
  upload: (url, file) => {
    const fd = new FormData(); fd.append('file', file);
    return fetch(url, {method: 'POST', body: fd}).then(r => r.json());
  },
  del:    url  => fetch(url, {method: 'DELETE'}).then(r => r.json()),
};

/* ── SSE PHASE RUNNER ── */
function runPhaseSSE(n, { onStart, onDone, onError }) {
  const es = new EventSource(`/api/phase/${n}/run`);
  es.onmessage = e => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }
    if (msg.type === 'start')  onStart && onStart(msg);
    if (msg.type === 'done')  { onDone && onDone(msg); es.close(); }
    if (msg.type === 'error') { onError && onError(msg); es.close(); }
  };
  es.onerror = () => { onError && onError({message: 'Connection lost'}); es.close(); };
  return es;
}

/* ── LUCIDE ICON HELPER ── */
function Icon({ name, size = 16, color = 'currentColor', style = {} }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = '';
      const el = document.createElement('i');
      el.setAttribute('data-lucide', name);
      el.style.width = size + 'px';
      el.style.height = size + 'px';
      el.style.color = color;
      ref.current.appendChild(el);
      window.lucide.createIcons({ nodes: [el] });
    }
  }, [name, size, color]);
  return <span ref={ref} className="ic" style={{ width: size, height: size, ...style }} />;
}

/* ── MARKDOWN RENDERER ── */
function MdRender({ text }) {
  const lines = (text || '').split('\n');
  const els = []; let buf = [];
  const flush = () => { if (buf.length) { els.push(<p key={els.length}>{buf.join(' ')}</p>); buf = []; } };
  lines.forEach((l, i) => {
    if (l.startsWith('## '))      { flush(); els.push(<h2 key={i}>{l.slice(3)}</h2>); }
    else if (l.startsWith('### ')) { flush(); els.push(<h3 key={i}>{l.slice(4)}</h3>); }
    else if (l.startsWith('- '))   { flush(); els.push(<ul key={i}><li dangerouslySetInnerHTML={{__html:l.slice(2).replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/`(.*?)`/g,'<code>$1</code>')}}/></ul>); }
    else if (/^\d+\. /.test(l))    { flush(); els.push(<ul key={i}><li dangerouslySetInnerHTML={{__html:l.replace(/^\d+\. /,'').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}}/></ul>); }
    else if (l.trim() === '')      { flush(); }
    else { buf.push(l); }
  });
  flush();
  return <div className="md-render">{els}</div>;
}

/* ── CLI LOG COMPONENT ── */
function CliLog({ phaseN, running }) {
  const lines = CLI_LINES[phaseN] || [];
  const [shown, setShown] = useState(running ? 0 : lines.length);
  useEffect(() => {
    if (!running) { setShown(lines.length); return; }
    setShown(0);
    let i = 0;
    const iv = setInterval(() => { i++; setShown(i); if (i >= lines.length) clearInterval(iv); }, 280);
    return () => clearInterval(iv);
  }, [running, phaseN]);
  const cls = l => {
    if (l.startsWith('✓')) return 'cc3';
    if (l.startsWith('$')) return 'cc0';
    if (l.startsWith('    +') || l.startsWith('    ~')) return 'cc2';
    if (l.includes('error') || l.includes('failed')) return 'cc4';
    return 'cc1';
  };
  return (
    <div className="cli-wrap">
      {lines.slice(0, shown).map((l, i) => <div key={i} className={`cli-line ${cls(l)}`}>{l}</div>)}
      {running && shown < lines.length && <div className="cc0">▌<span className="cli-cursor"/></div>}
    </div>
  );
}

/* ── ELAPSED TIMER ── */
function ElapsedTimer({ active }) {
  const [t, setT] = useState(0);
  useEffect(() => {
    if (!active) { setT(0); return; }
    const s = Date.now();
    const iv = setInterval(() => setT(((Date.now()-s)/1000).toFixed(1)), 100);
    return () => clearInterval(iv);
  }, [active]);
  if (!active) return null;
  return <span className="step-time">{t}s</span>;
}

/* ── TOGGLE ── */
function Toggle({ on, onChange, disabled }) {
  return <button className={`toggle-btn${on?' on':''}`} onClick={() => !disabled && onChange(!on)} disabled={disabled}/>;
}

/* ── CHIPS MULTISELECT ── */
function ChipSelect({ options, value, onChange, disabled }) {
  const toggle = o => {
    if (disabled) return;
    onChange(value.includes(o) ? value.filter(x => x !== o) : [...value, o]);
  };
  return (
    <div className="chips">
      {options.map(o => (
        <span key={o} className={`chip-opt${value.includes(o)?' sel':''}`} onClick={() => toggle(o)}>{o}</span>
      ))}
    </div>
  );
}

/* ── MARKDOWN RENDERER ── */
function MdRender({ text }) {
  const lines = text.split('\n');
  const els = [];
  let buf = [];
  const flush = () => { if (buf.length) { els.push(<p key={els.length}>{buf.join(' ')}</p>); buf = []; } };
  lines.forEach((l, i) => {
    if (l.startsWith('## '))      { flush(); els.push(<h2 key={i}>{l.slice(3)}</h2>); }
    else if (l.startsWith('### ')) { flush(); els.push(<h3 key={i}>{l.slice(4)}</h3>); }
    else if (l.startsWith('- '))   { flush(); els.push(<ul key={i}><li dangerouslySetInnerHTML={{__html:l.slice(2).replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/`(.*?)`/g,'<code>$1</code>')}}/></ul>); }
    else if (/^\d+\. /.test(l))    { flush(); els.push(<ul key={i}><li dangerouslySetInnerHTML={{__html:l.replace(/^\d+\. /,'').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}}/></ul>); }
    else if (l.trim() === '')      { flush(); }
    else { buf.push(l); }
  });
  flush();
  return <div className="md-render">{els}</div>;
}


function PhaseResults({ n, threshold, setJobTitles, data }) {
  if (n === 1) return <Phase1Results data={data} setJobTitles={setJobTitles}/>;

  if (n === 6) return <Phase6Results data={data}/>;
  if (n === 7) return <Phase7Results data={data}/>;
  return null;
}

      const res = await api.upload('/api/resume/upload', f);

/* ── INLINE PHASE CARD ── */
function PhaseInlineCard({ n, done, running, locked, elapsed, threshold, setJobTitles, phaseErrors, showElapsed, onRun, phaseRunning, phaseData }) {
  const [open, setOpen] = useState(true);
  useEffect(() => { if (running) setOpen(true); }, [running]);

  const st = phaseErrors[n] ? 'error' : done ? 'done' : running ? 'running' : locked ? 'wait' : 'ready';
  const wrapCls = `ph-wrap ph-${st==='ready'?'wait':st}`;
  const badgeCls = st==='done'?'phb-done':st==='running'?'phb-run':st==='error'?'phb-err':'phb-wait';
  const badgeTxt = st==='done'?'done':st==='running'?'running…':st==='error'?'error':st==='ready'?'ready':'waiting';
  const numContent = st==='done'
    ? <Icon name="check" size={11} color="var(--green)"/>
    : running
      ? <span className="spin" style={{borderTopColor:'var(--amber)',width:10,height:10}}/>
      : n;

  return (
    <div className={wrapCls} id={`phase-card-${n}`}>
      <div className="ph-header" onClick={()=>setOpen(o=>!o)}>
        <div className="ph-num">{numContent}</div>
        <span className="ph-name">{PHASE_NAMES[n-1]}</span>
        <div className="ph-right">
          {running && <ElapsedTimer active={true}/>}
          {(done || st==='error') && showElapsed && elapsed && <span className="ph-elapsed">{elapsed}</span>}
          <span className={`ph-badge ${badgeCls}`}>{badgeTxt}</span>
          <span className={`ph-chevron${open?' open':''}`}>▾</span>
        </div>
      </div>
      {running && <div className="phase-loading-bar"><div className="phase-loading-fill"/></div>}
      {open && (
        <div className="ph-body">
          {st==='wait' ? (
            <div className="ph-wait-body">Waiting for Phase {n-1} to complete.</div>
          ) : st==='ready' ? (
            <div style={{padding:'12px 16px'}}>
              <button className="act-btn primary" onClick={()=>onRun(n)} disabled={phaseRunning!==null} style={{fontSize:12}}>
                <Icon name="play" size={12}/>
                {['Extract Profile','Discover Jobs','Score Jobs','Tailor Resumes','Submit Applications','Write Tracker','Generate Report'][n-1]} →
              </button>
            </div>
          ) : (
            <>
              {(done || running) && <CliLog phaseN={n} running={running}/>}
              {st==='error' && (
                <div style={{padding:'14px 16px'}}>
                  <div className="err-block">
                    <div className="err-title"><Icon name="alert-circle" size={14}/> Phase {n} failed</div>
                    <div className="err-msg">{phaseErrors[n]}</div>
                    <button className="act-btn" style={{marginTop:10}}>Retry →</button>
                  </div>
                </div>
              )}
              {done && (
                <div style={{padding:'0 16px 16px'}}>
                  <PhaseResults n={n} threshold={threshold} setJobTitles={setJobTitles} data={phaseData}/>
                </div>
              )}
              {running && (
                <div style={{padding:'0 16px 14px'}}>
                  <div className="ph-wait-body" style={{fontStyle:'normal',color:'var(--t2)'}}>Processing…</div>
                </div>
              )}
            </>
          )}
        </div>
      )}
    </div>
  );
}

              <PhaseInlineCard
                key={n} n={n}
                done={phaseDone.has(n)}
                running={phaseRunning===n}
                locked={isLocked}
                elapsed={phaseTimes[n]}
                threshold={cfg.threshold}
                setJobTitles={v=>setCfg(c=>({...c,jobTitles:v}))}
                phaseErrors={phaseErrors}
                showElapsed={showElapsed}
                onRun={onRun}
                phaseRunning={phaseRunning}
                phaseData={phaseResults[n]}
              />
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ── ROOT APP ── */
function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  useEffect(() => {
    document.documentElement.style.setProperty('--accent', tweaks.accentColor);
    document.documentElement.style.setProperty('--acch', tweaks.accentColor + 'cc');
    document.documentElement.style.setProperty('--accd', tweaks.accentColor + '25');
    document.documentElement.style.setProperty('--sb', tweaks.sidebarWidth + 'px');
    document.documentElement.style.setProperty('font-size', tweaks.fontSize + 'px');
  }, [tweaks.accentColor, tweaks.sidebarWidth, tweaks.fontSize]);

  const [screen, setScreen] = useState('onboard');
  const [resume, setResume] = useState(null);
  const [cfg, setCfg] = useState({
    mode:'demo', apiKey:'', ollamaModel:'llama3.2',
    jobTitles:'Hardware Engineer, FPGA Intern', location:'United States',
    threshold:75, maxApps:10, coverLetter:false,
    expLevels:['Internship','Entry-level'],
    eduFilter:["Bachelor's"],
    inclUnknownEdu:false, useSimplify:true, daysOld:30,
    blacklist:'', whitelist:'NVIDIA, Apple, Microsoft, Intel',
    citFilter:'Exclude required',
  });
  const [phaseDone,    setPhaseDone]    = useState(new Set());
  const [phaseRunning, setPhaseRunning] = useState(null);
  const [phaseTimes,   setPhaseTimes]   = useState({});
  const [phaseErrors,  setPhaseErrors]  = useState({});
  const [phaseResults, setPhaseResults] = useState({});  // real data from SSE done events
  const phaseRunningRef = useRef(null);

  /* ── Sync initial state from backend on mount ── */
  useEffect(() => {
    api.get('/api/state').then(s => {
      if (s.has_resume) setResume({ name: s.resume_filename || 'resume loaded', length: 0 });
      setCfg(c => ({
        ...c,
        mode:           s.mode           || c.mode,
        ollamaModel:    s.ollama_model    || c.ollamaModel,
        jobTitles:      s.job_titles      || c.jobTitles,
        location:       s.location        || c.location,
        threshold:      s.threshold       ?? c.threshold,
        maxApps:        s.max_apps        ?? c.maxApps,
        coverLetter:    s.cover_letter    ?? c.coverLetter,
        expLevels:      s.experience_levels || c.expLevels,
        eduFilter:      s.education_filter  || c.eduFilter,
        inclUnknownEdu: s.include_unknown_education ?? c.inclUnknownEdu,
        citizenship_filter: s.citizenship_filter || c.citFilter,
        useSimplify:    s.use_simplify    ?? c.useSimplify,
        daysOld:        s.days_old        ?? c.daysOld,
        blacklist:      s.blacklist       || c.blacklist,
        whitelist:      s.whitelist       || c.whitelist,
      }));
      // Restore pipeline state if phases already ran
      if (s.done && s.done.length > 0) {
        setPhaseDone(new Set(s.done));
        const times = {};
        (s.done || []).forEach(n => { if (s.elapsed && s.elapsed[n]) times[n] = s.elapsed[n]+'s'; });
        setPhaseTimes(times);
        setScreen('pipeline');
      }
    }).catch(() => {/* backend not running — stay in demo */});
  }, []);

  /* ── Sync cfg changes to backend (debounced 400ms) ── */
  const syncTimer = useRef(null);
  useEffect(() => {
    clearTimeout(syncTimer.current);
    syncTimer.current = setTimeout(() => {
      api.post('/api/config', {
        mode:            cfg.mode,
        api_key:         cfg.apiKey,
        ollama_model:    cfg.ollamaModel,
        job_titles:      cfg.jobTitles,
        location:        cfg.location,
        threshold:       cfg.threshold,
        max_apps:        cfg.maxApps,
        cover_letter:    cfg.coverLetter,
        experience_levels: cfg.expLevels,
        education_filter:  cfg.eduFilter,
        include_unknown_education: cfg.inclUnknownEdu,
        citizenship_filter: cfg.citFilter,
        use_simplify:    cfg.useSimplify,
        days_old:        cfg.daysOld,
        blacklist:       cfg.blacklist,
        whitelist:       cfg.whitelist,
      }).catch(() => {});
    }, 400);
    return () => clearTimeout(syncTimer.current);
  }, [cfg]);

  /* ── Real phase runner via SSE ── */
  const runPhase = useCallback(n => {
    if (phaseRunningRef.current !== null) return;
    phaseRunningRef.current = n;
    setPhaseRunning(n);
    setPhaseErrors(e => { const ne = {...e}; delete ne[n]; return ne; });

    runPhaseSSE(n, {
      onStart: () => {},
      onDone: msg => {
        phaseRunningRef.current = null;
        setPhaseDone(p => new Set([...p, n]));
        setPhaseTimes(p => ({ ...p, [n]: msg.elapsed ? msg.elapsed+'s' : '' }));
        setPhaseResults(r => ({ ...r, [n]: msg.data || {} }));
        setPhaseRunning(null);

        // If Phase 1 completed, update job titles from extracted profile
        if (n === 1 && msg.data?.target_titles?.length > 0) {
          const titles = msg.data.target_titles.join(', ');
          setCfg(c => {
            const cur = (c.jobTitles || '').trim().toLowerCase();
            if (cur === '' || cur === 'hardware engineer, fpga intern' || cur === 'engineer') {
              return { ...c, jobTitles: titles };
            }
            return c;
          });
        }
      },
      onError: msg => {
        phaseRunningRef.current = null;
        setPhaseErrors(e => ({ ...e, [n]: msg.message || 'Phase failed' }));
        setPhaseRunning(null);
      },
    });
  }, []);

  /* ── Run all 7 phases sequentially ── */
  const runAll = useCallback(() => {
    api.post('/api/reset', {}).then(() => {
      setPhaseDone(new Set());
      setPhaseRunning(null);
      setPhaseTimes({});
      setPhaseErrors({});
      setPhaseResults({});
      phaseRunningRef.current = null;
      setScreen('pipeline');

      // Chain: each phase starts after the previous SSE done event
      const chain = (n) => {
        if (n > 7) return;
        phaseRunningRef.current = n;
        setPhaseRunning(n);
        runPhaseSSE(n, {
          onStart: () => {},
          onDone: msg => {
            phaseRunningRef.current = null;
            setPhaseDone(p => new Set([...p, n]));
            setPhaseTimes(p => ({ ...p, [n]: msg.elapsed ? msg.elapsed+'s' : '' }));
            setPhaseResults(r => ({ ...r, [n]: msg.data || {} }));
            setPhaseRunning(null);
            if (n === 1 && msg.data?.target_titles?.length > 0) {
              const titles = msg.data.target_titles.join(', ');
              setCfg(c => {
                const cur = (c.jobTitles || '').trim().toLowerCase();
                if (cur === '' || cur === 'hardware engineer, fpga intern' || cur === 'engineer') {
                  return { ...c, jobTitles: titles };
                }
                return c;
              });
            }
            chain(n + 1);
          },
          onError: msg => {
            phaseRunningRef.current = null;
            setPhaseErrors(e => ({ ...e, [n]: msg.message || 'Phase failed' }));
            setPhaseRunning(null);
            // Stop the chain on error
          },
        });
      };
      chain(1);
    }).catch(() => {});
  }, []);

  const reset = useCallback(() => {
    api.post('/api/reset', {}).catch(() => {});
    setPhaseDone(new Set()); setPhaseRunning(null);
    setPhaseTimes({}); setPhaseErrors({}); setPhaseResults({});
    phaseRunningRef.current = null;
    setResume(null);
    setScreen('onboard');
  }, []);

  const startPipeline = () => setScreen('pipeline');

  return (
    <div className="shell">
      <TweaksPanel>
        <TweakSection label="Appearance">
          <TweakColor id="accentColor" label="Accent color" value={tweaks.accentColor} onChange={v=>setTweak('accentColor',v)}/>
          <TweakSlider id="sidebarWidth" label="Sidebar width" min={200} max={360} step={10} value={tweaks.sidebarWidth} onChange={v=>setTweak('sidebarWidth',v)}/>
          <TweakSlider id="fontSize" label="Font size" min={11} max={16} step={1} value={tweaks.fontSize} onChange={v=>setTweak('fontSize',v)}/>
        </TweakSection>
        <TweakSection label="Pipeline">
          <TweakText id="runBtnLabel" label="Run button label" value={tweaks.runBtnLabel} onChange={v=>setTweak('runBtnLabel',v)}/>
          <TweakToggle id="showElapsed" label="Show elapsed time" value={tweaks.showElapsed} onChange={v=>setTweak('showElapsed',v)}/>
        </TweakSection>
      </TweaksPanel>

      <Sidebar
        cfg={cfg} setCfg={setCfg}
        running={phaseRunning!==null}
        onReset={reset}
        onHome={() => window.location.href = '/'}
        onRunAll={runAll}
        runBtnLabel={tweaks.runBtnLabel}
        phaseRunning={phaseRunning}
      />

      <div className="main">
        {screen === 'onboard'
          ? <OnboardScreen resume={resume} setResume={setResume} onStart={startPipeline} cfg={cfg}/>
          : <PipelineScreen
              cfg={cfg} setCfg={setCfg}
              phaseDone={phaseDone} phaseRunning={phaseRunning}
              phaseTimes={phaseTimes} phaseErrors={phaseErrors}
              phaseResults={phaseResults}
              onRun={runPhase} onRunAll={runAll} onReset={reset}
              runBtnLabel={tweaks.runBtnLabel}
              showElapsed={tweaks.showElapsed}
            />
        }
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
