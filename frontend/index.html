.sc-runtime .sc-col-h { color: var(--accent2) }
.sc-row {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; padding: 4px 0; min-width: 0;
}
.sc-row-l { min-width: 0; flex: 1 }
.sc-row-h { font-size: 15px; font-weight: 600; color: var(--t1); line-height: 1.2 }

/* ── Upgrade CTA ─────────────────────────────────────────────────────────
   The plan-page Pro button is the single most consequential click on the
   site, so it gets unique treatment: a continuously flowing 7-stop
   chromatic gradient, a diagonal light sweep that scans every ~5s, a
   throbbing chromatic halo, an animated zap glyph, and a hover that
   accelerates everything. All effects use existing brand tokens.
   Respects prefers-reduced-motion. */
.plan-cta-pro {
  position: relative;
  isolation: isolate;
  overflow: hidden;
  border: none;
  color: #fff;
  font-weight: 700;
  letter-spacing: .015em;
  padding: 13px 18px;
  background: linear-gradient(
    110deg,
    #7c5cff   0%,
    #a78bff  16%,
    #ff3d9a  38%,
    #ff6a45  56%,
    #ffd23d  70%,
    #22e5ff  86%,
    #7c5cff 100%
  );
  background-size: 240% 240%;
  background-position: 0% 50%;
  /* Stacked drop-shadow halo composes OUTSIDE the button's overflow-clipped
     paint box, unlike a pseudo-element. Three colored layers blur into a
     chromatic aura that throbs via the cta-halo keyframes. */
  filter:
    drop-shadow(0 0  6px rgba(124,  92, 255, .55))
    drop-shadow(0 0 12px rgba(255,  61, 154, .35))
    drop-shadow(0 0 22px rgba(34,  229, 255, .25));
  animation:
    cta-flow 5.5s ease-in-out infinite,
    cta-halo 2.6s ease-in-out infinite;
  box-shadow:
    0 14px 32px -10px rgba(124, 92, 255, .5),
    inset 0  1px 0 rgba(255, 255, 255, .42),
    inset 0 -1px 0 rgba(0, 0, 0, .14);
  transition:
    transform .22s cubic-bezier(.16, 1, .3, 1),
    box-shadow .3s ease;
}
/* Diagonal shimmer that scans across the face. Clipped to button bounds
   by the parent's overflow:hidden. */
.plan-cta-pro::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    100deg,
    transparent           30%,
    rgba(255,255,255,.55) 48%,
    rgba(255,255,255,.92) 50%,
    rgba(255,255,255,.55) 52%,
    transparent           70%
  );
  transform: translateX(-130%);
  animation: cta-sweep 4.8s cubic-bezier(.5, 0, .2, 1) infinite;
  pointer-events: none;
  mix-blend-mode: overlay;
  z-index: 0;
}
/* Inner top-edge gloss highlight — adds dimensionality without clipping. */
.plan-cta-pro::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: linear-gradient(180deg, rgba(255,255,255,.18) 0%, rgba(255,255,255,0) 50%);
  pointer-events: none;
  z-index: 0;
}
/* Keep text + icon above both pseudos. */
.plan-cta-pro > * { position: relative; z-index: 1; }
.plan-cta-pro .ic { animation: cta-zap 2.6s ease-in-out infinite; transform-origin: center; }

.plan-cta-pro:hover {
  transform: translateY(-2px) scale(1.02);
  /* Both gradient and halo speed up on hover; halo also intensifies. */
  animation-duration: 2s, 1.4s;
  filter:
    drop-shadow(0 0  8px rgba(124,  92, 255, .7))
    drop-shadow(0 0 18px rgba(255,  61, 154, .55))
    drop-shadow(0 0 32px rgba(34,  229, 255, .45))
    saturate(1.18) brightness(1.06);
  box-shadow:
    0 22px 50px -12px rgba(255, 61, 154, .55),
    0   0    0 1.5px rgba(34, 229, 255, .55),
    inset 0  1px 0 rgba(255, 255, 255, .5),
    inset 0 -1px 0 rgba(0, 0, 0, .14);
}
.plan-cta-pro:hover::before { animation-duration: 1.6s; }
.plan-cta-pro:hover .ic     { animation-duration: 1.1s; }
.plan-cta-pro:active        { transform: translateY(0) scale(.992); transition-duration: .08s; }

@keyframes cta-flow {
  0%, 100% { background-position:   0% 50%; }
  50%      { background-position: 100% 50%; }
}
@keyframes cta-sweep {
  0%, 22%  { transform: translateX(-130%); }
  62%      { transform: translateX( 130%); }
  100%     { transform: translateX( 130%); }
}
/* Halo throb — same drop-shadow stack at higher intensity at the midpoint. */
@keyframes cta-halo {
  0%, 100% {
    filter:
      drop-shadow(0 0  6px rgba(124,  92, 255, .55))
      drop-shadow(0 0 12px rgba(255,  61, 154, .35))
      drop-shadow(0 0 22px rgba(34,  229, 255, .25));
  }
  50% {
    filter:
      drop-shadow(0 0 10px rgba(124,  92, 255, .75))
      drop-shadow(0 0 20px rgba(255,  61, 154, .55))
      drop-shadow(0 0 32px rgba(34,  229, 255, .45));
  }
}
@keyframes cta-zap {
  0%, 100% { transform: rotate(0)     scale(1);     filter: drop-shadow(0 0 0 transparent); }
  35%      { transform: rotate(-9deg) scale(1.18);  filter: drop-shadow(0 0 6px rgba(255,255,255,.85)); }
  55%      { transform: rotate( 9deg) scale(1.18); }
  75%      { transform: rotate(0)     scale(1); }
}

@media (prefers-reduced-motion: reduce) {
  .plan-cta-pro,
  .plan-cta-pro::before,
  .plan-cta-pro .ic {
    animation: none !important;
  }
  .plan-cta-pro::before { transform: translateX(0); opacity: 0; }
}

/* ── ASK ATLAS DRAWER ─────────────────────────────────────────
   Per-job chat panel that slides in from the right. Owns its
   own thread state; closes on ESC, click-outside, or X. */
.ask-overlay {
  position: fixed; inset: 0; z-index: 9000;
  background: radial-gradient(120% 80% at 100% 50%, rgba(10,10,18,.8) 0%, rgba(10,10,18,.55) 60%, rgba(10,10,18,.3) 100%);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  display: flex; justify-content: flex-end;
  animation: ask-overlay-in .25s cubic-bezier(.16,1,.3,1);
}
@keyframes ask-overlay-in { from { opacity: 0 } to { opacity: 1 } }

.ask-drawer {
  width: min(560px, 92vw); height: 100vh;
  display: flex; flex-direction: column;
  background:
    linear-gradient(180deg, rgba(124,92,255,.05) 0%, transparent 25%),
    var(--bg-1);
  border-left: 1px solid var(--bdr2);
  box-shadow: -30px 0 70px -20px rgba(0,0,0,.6);
  animation: ask-drawer-in .35s cubic-bezier(.16,1,.3,1);
  overflow: hidden;
}
@keyframes ask-drawer-in {
  from { transform: translateX(40px); opacity: 0 }
  to { transform: none; opacity: 1 }
}

.ask-head {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 12px; padding: 16px 18px;

}

.ask-pro-pill {
  margin-left: 4px; padding: 1px 6px; border-radius: 4px;
  background: var(--accent2-d); border: 1px solid var(--accent2-b);
  color: var(--accent2); font-size: 9px; font-weight: 700; letter-spacing: .1em;
}
.ask-head-role {
  font-family: var(--serif); font-size: 18px; line-height: 1.2;
  color: var(--t1); letter-spacing: -.015em;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.ask-head-co {
  display: flex; align-items: center; gap: 10px;
  font-size: 12px; color: var(--t3);
}
.ask-head-co > span:first-child {
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 280px;
}
.ask-head-score {
  display: inline-flex; align-items: baseline; gap: 1px;
  padding: 1px 7px; border-radius: 5px;
  font-family: var(--mono); font-size: 11px; font-weight: 700;
  color: var(--accent2); background: var(--accent2-d); border: 1px solid var(--accent2-b);
}
.ask-head-score i { font-size: 9px; font-style: normal; opacity: .6; margin-left: 1px }
.ask-close {
  width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0;
  background: rgba(255,255,255,.04); border: 1px solid var(--bdr);
  color: var(--t2); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .12s;
}
.ask-close:hover { color: var(--t1); background: var(--bg-3); border-color: var(--bdr2) }

.ask-thread {
  flex: 1; overflow-y: auto;
  padding: 18px 18px 8px;
  display: flex; flex-direction: column; gap: 14px;
  scroll-behavior: smooth;
}
.ask-thread::-webkit-scrollbar { width: 4px }
.ask-thread::-webkit-scrollbar-thumb { background: var(--bdr2); border-radius: 2px }

.ask-empty {
  display: flex; flex-direction: column; gap: 14px;
  padding: 22px 6px 8px;
  animation: fade-in-up .35s cubic-bezier(.16,1,.3,1);
}
.ask-empty-eyebrow {
  display: inline-flex; align-items: center; gap: 6px; align-self: flex-start;
  font-family: var(--mono); font-size: 10px; font-weight: 600;
  color: var(--accent2); letter-spacing: .08em; text-transform: uppercase;
  padding: 5px 11px; border-radius: 999px;
  background: var(--accent2-d); border: 1px solid var(--accent2-b);
}
.ask-empty-h {
  font-family: var(--serif); font-size: 22px; line-height: 1.3;
  color: var(--t1); letter-spacing: -.02em;
}
.ask-empty-h em {
  font-style: normal;
  background: linear-gradient(120deg, #a78bff, #22e5ff);
  background-clip: text; -webkit-background-clip: text; color: transparent;
}
.ask-suggestions { display: flex; flex-direction: column; gap: 7px; margin-top: 6px }
.ask-suggestion {
  display: flex; align-items: center; gap: 9px; text-align: left;
  padding: 11px 14px; border-radius: 10px;
  background: rgba(255,255,255,.025); border: 1px solid var(--bdr);
  color: var(--t1); font-size: 13px; cursor: pointer;
  opacity: 0; animation: fade-in-up .35s cubic-bezier(.16,1,.3,1) forwards;
  transition: all .15s;
}
.ask-suggestion > svg { color: var(--accent-h); flex-shrink: 0 }
.ask-suggestion:hover {
  border-color: var(--accent-b);
  background: var(--accent-d);
  transform: translateX(2px);
}

.ask-msg {
  display: flex; gap: 10px; max-width: 95%;
  animation: fade-in-up .25s cubic-bezier(.16,1,.3,1);
}
.ask-msg-user { align-self: flex-end; flex-direction: row-reverse }
.ask-msg-icon {
  width: 26px; height: 26px; border-radius: 8px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  background: var(--accent-d); border: 1px solid var(--accent-b);
  color: var(--accent-h);
  margin-top: 2px;
}
.ask-msg-body {
  padding: 11px 14px; border-radius: 12px;
  font-size: 13.5px; line-height: 1.6;
  white-space: pre-wrap; word-wrap: break-word;
  letter-spacing: -.005em;
}
.ask-msg-user .ask-msg-body {
  background: linear-gradient(135deg, var(--accent), var(--accent-h));
  color: #fff;
  border-bottom-right-radius: 4px;
  box-shadow: 0 6px 18px -8px rgba(124,92,255,.5);
}
.ask-msg-assistant .ask-msg-body {
  background: var(--surface); color: var(--t1);
  border: 1px solid var(--bdr);
  border-bottom-left-radius: 4px;
}

.ask-typing { display: inline-flex; align-items: center; gap: 4px; padding: 14px 16px }
.ask-typing > span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent-h);
  animation: ask-bounce 1.2s ease-in-out infinite;
}
.ask-typing > span:nth-child(2) { animation-delay: .15s }
.ask-typing > span:nth-child(3) { animation-delay: .30s }
@keyframes ask-bounce {
  0%, 60%, 100% { transform: translateY(0); opacity: .5 }
  30% { transform: translateY(-5px); opacity: 1 }
}

.ask-error {
  display: inline-flex; align-items: center; gap: 8px; align-self: flex-start;
  padding: 9px 13px; border-radius: 10px;
  background: var(--bad-d); border: 1px solid var(--bad-b); color: var(--bad);
  font-size: 12.5px; line-height: 1.4;
}

.ask-input-row {
  display: flex; align-items: stretch; gap: 8px;
  padding: 12px 16px 4px;
  border-top: 1px solid var(--bdr);
  flex-shrink: 0;
}
.ask-input {
  flex: 1; resize: none;
  padding: 11px 14px; border-radius: 12px;
  background: var(--bg-2); border: 1px solid var(--bdr2);
  color: var(--t1); font-family: var(--sans); font-size: 13.5px; line-height: 1.5;
  min-height: 44px; max-height: 160px;
  transition: border-color .12s, box-shadow .12s;
}
.ask-input:focus {
  outline: none; border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-d);
}
.ask-input::placeholder { color: var(--t3) }
.ask-input:disabled { opacity: .6 }
.ask-send {
  width: 44px; flex-shrink: 0; border-radius: 12px;
  border: none; cursor: pointer; color: #fff;
  background: linear-gradient(135deg, var(--accent), var(--accent-h));
  box-shadow: 0 6px 16px -6px rgba(124,92,255,.55);
  display: flex; align-items: center; justify-content: center;
  transition: transform .12s, box-shadow .12s, opacity .12s;
}
.ask-send:hover:not(:disabled) {
  transform: translateY(-1px);
  box-shadow: 0 10px 22px -6px rgba(124,92,255,.7), 0 0 0 1px rgba(34,229,255,.25);
}
.ask-send:disabled { opacity: .4; cursor: not-allowed }
.ask-foot-hint {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 0 16px 12px;
  font-family: var(--mono); font-size: 9.5px; color: var(--t4);
  letter-spacing: .04em;
}
@media (max-width: 600px) {
  .ask-drawer { width: 100vw }
}

/* ── Tailor drawer (per-job on-demand resume) ────────────────────────────── */
.tailor-drawer {
  width: min(680px, 96vw);
}
.tailor-drawer .ask-head {
  background: linear-gradient(180deg, rgba(124, 92, 255, .14), rgba(124, 92, 255, .02));
}
.tailor-body {
  flex: 1; overflow-y: auto;
  padding: 18px 18px 24px;
  display: flex; flex-direction: column; gap: 16px;
  scroll-behavior: smooth;
}
.tailor-body::-webkit-scrollbar { width: 4px }
.tailor-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 4px }

.tailor-loading {
  display: flex; flex-direction: column; gap: 14px;
  padding: 20px 18px;
  border: 1px solid var(--bdr);
  border-radius: 12px;
  background:
    linear-gradient(180deg, rgba(124,92,255,.05), transparent 65%),
    var(--bg-2);
}
.tailor-loading-eyebrow {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: var(--mono); font-size: 11px; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--accent2);
}
.tailor-loading-hint {
  font-size: 13px; line-height: 1.55; color: var(--t3);
}
.tailor-steps {
  list-style: none; margin: 4px 0 0; padding: 0;
  display: flex; flex-direction: column; gap: 8px;
}
.tailor-steps li {
  display: inline-flex; align-items: center; gap: 9px;
  font-size: 12.5px; color: var(--t2);
  opacity: 0;
  animation: tailor-step-in .55s cubic-bezier(.16,1,.3,1) forwards;
}
.tailor-steps li svg { color: var(--accent2); opacity: .85 }
@keyframes tailor-step-in {
  from { opacity: 0; transform: translateX(-6px) }
  to   { opacity: 1; transform: translateX(0) }
}

.tailor-error {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 14px 16px;
  border: 1px solid var(--bad-b); border-radius: 12px;
  background: var(--bad-d);
  color: var(--bad);
}
.tailor-error svg { flex-shrink: 0; margin-top: 2px }
.tailor-error-h {
  font-size: 13px; font-weight: 700; color: var(--t1);
  margin-bottom: 2px; letter-spacing: -.005em;
}
.tailor-error-msg {
  font-size: 12.5px; color: var(--t3); line-height: 1.5;
}

.tailor-result { display: flex; flex-direction: column; gap: 14px }
.tailor-result .tr-card { border-color: var(--bdr2) }

.btn-tailor {
  border-color: var(--accent-b);
  color: var(--accent2);
  background: var(--accent-d);
}
.btn-tailor:hover {
  background: var(--accent2-d);
  color: var(--t1);
  border-color: var(--accent2-b);
}
.btn-tailor svg { color: var(--accent2) }

/* RESPONSIVE */
@media (max-width: 1180px) {
  .viz-grid  { grid-template-columns: 1fr 1fr }
  .viz-tip   { grid-column: 1 / -1 }
  .viz-pulse { grid-column: 1 / -1 }
  .lower-grid{ grid-template-columns: 1fr }
  .kpi-row   { grid-template-columns: repeat(2, 1fr) }
}
@media (max-width: 760px) {
  .hero-grid    { grid-template-columns: 1fr }
  .hero-right   { display: flex; justify-content: center }
  .viz-grid     { grid-template-columns: 1fr }
  .kpi-row      { grid-template-columns: 1fr 1fr }
  .hero-h       { font-size: 34px }
}

/* ══════════════════════════════════════════════════════════
   MOBILE — single comprehensive block. Reflows the full app
   shell into a single-column layout with a slide-out rail
   drawer. No functionality is hidden — only reflowed and
   re-prioritized for narrow widths and touch input.
   Last in the stylesheet so its rules win on specificity.
   ══════════════════════════════════════════════════════════ */

/* Hamburger / nav toggle is hidden by default; only mobile shows it */
.nav-toggle { display: none }
.rail-backdrop { display: none }

@media (max-width: 720px) {
  :root { --rail-w: 240px; }

  /* Allow the body to scroll vertically; shell can no longer be a
     fixed-height grid because content stacks. Use 100dvh so iOS
     browser chrome doesn't cut off the bottom row. */
  html, body { height: auto; min-height: 100dvh; overflow-x: hidden }
  body { overflow-y: auto; font-size: 15px }

  .shell {
    display: block;
    width: 100vw;
    min-height: 100dvh;
    overflow: visible;
  }

  /* Brand cell becomes a sticky header that hosts the hamburger */
  .brand-cell {
    grid-area: auto;
    height: 56px;
    padding: 0 12px;
    gap: 10px;
    border-right: none;
    border-bottom: 1px solid var(--bdr);
    position: sticky;
    top: 0;
    z-index: 70;
    background: var(--bg-1);
  }

  /* Promo strip stacks below brand */
  .promo-cell {
    grid-area: auto;
    padding: 8px 14px;
    font-size: 13.5px;
    flex-wrap: wrap;
    text-align: center;
    justify-content: center;
  }

  /* Rail becomes a slide-out drawer. Pulled out of the grid via
     fixed positioning, hidden offscreen until .is-open is added. */
  .rail {
    grid-area: auto;
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    width: var(--rail-w);
    max-width: 86vw;
    background: var(--bg-1);
    border-right: 1px solid var(--bdr);
    z-index: 90;
    padding: 64px 0 16px;
    transform: translateX(-100%);
    transition: transform .22s cubic-bezier(.16,1,.3,1);
    overflow-y: auto;
  }
  .rail.is-open {
    transform: translateX(0);
    box-shadow: 0 16px 60px rgba(0,0,0,.55);
  }

  /* Backdrop sits under the rail when open */
  .rail-backdrop {
    display: block;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.55);
    z-index: 80;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s ease;
  }
  .rail-backdrop.is-open {
    opacity: 1;
    pointer-events: auto;
  }

  /* Hamburger button — only on mobile */
  .nav-toggle {
    display: inline-flex;
    width: 40px;
    height: 40px;
    border-radius: 9px;
    background: var(--bg-2);
    border: 1px solid var(--bdr);
    color: var(--t1);
    cursor: pointer;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .nav-toggle:hover { background: var(--bg-3) }
  .nav-toggle:active { transform: scale(.97) }

  /* Main column takes full width */
  .main {
    grid-area: auto;
    width: 100%;
    min-height: calc(100dvh - 56px);
    overflow: visible;
  }

  /* Page head wraps; tabs and search drop to their own row */
  .page-head {
    height: auto;
    min-height: 56px;
    padding: 10px 14px;
    flex-wrap: wrap;
    gap: 8px;
    position: sticky;
    top: 56px;
    z-index: 40;
  }
  .page-title-big { font-size: 19px }
  .page-tabs {
    order: 99;
    width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    flex-wrap: nowrap;
    padding-bottom: 2px;
  }
  .page-tab {
    padding: 7px 11px;
    font-size: 14.5px;
    white-space: nowrap;
  }
  .head-search {
    order: 100;
    width: 100%;
  }
  .head-cta {
    padding: 9px 14px;
    font-size: 14.5px;
  }
  .head-spacer { display: none }

  /* All multi-column grids collapse to one column on mobile.
     !important wins over inline grid-template overrides. */
  .page-body,
  .settings-grid,
  .rs-grid,
  .rs-overview-top,
  .rs-keystrip,
  .rs-tile-grid,
  .viz-grid,
  .lower-grid,
  .kpi-row,
  .coach-grid,
  .iv-grid,
  .dev-grid,
  .dev-inspect-grid,
  .profile-grid,
  .detail-kv,
  .detail-grid {
    grid-template-columns: 1fr !important;
  }
  .page-body { gap: 16px; padding: 16px }
  .page-body.solo { padding: 16px }
  .col-rail { order: 99 }
  .iv-feature { grid-row: auto }
  .dev-card.dev-span,
  .dev-card.dev-users {
    grid-column: auto !important;
    grid-row: auto !important;
  }

  /* Data table grids: hide the column-label header, stack rows */
  .dt-head { display: none }
  .dt-row {
    grid-template-columns: 1fr;
    padding: 14px 16px;
    gap: 6px;
  }

  /* Job card: score column drops below body instead of right side */
  .job-card-inner { flex-direction: column }
  .job-score-col {
    flex-direction: row;
    border-left: none;
    border-top: 1px solid var(--bdr);
    padding: 10px 16px;
    justify-content: flex-start;
    gap: 12px;
  }

  /* Onboarding & auth cards lose the desktop-padded look */
  .onboard-wrap { padding: 24px 14px }
  .ob-card { padding: 24px 18px; border-radius: 14px }
  .ob-h1 { font-size: 26px }
  .auth-card { padding: 28px 22px !important; border-radius: 16px !important }

  /* Resume page hero & sub-nav */
  .rs-hero {
    flex-direction: column;
    align-items: flex-start;
    padding: 18px;
    gap: 16px;
  }
  .rs-hero-rating { font-size: 26px }
  .rs-viewing { padding: 12px 14px }
  .rs-viewing-name { font-size: 17px }
  .rs-subnav-row {
    flex-direction: column;
    align-items: stretch;
    gap: 10px;
  }
  .rs-subnav {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    flex-wrap: nowrap;
  }
  .rs-subnav-pill { white-space: nowrap }

  /* Agent page hero */
  .agent-hero {
    flex-direction: column-reverse;
    align-items: stretch;
    padding: 20px;
    gap: 18px;
  }
  .agent-h { font-size: 25px }
  .agent-ring { align-self: center }

  /* Profile sub-nav scrolls horizontally on mobile */
  .prof-nav-tabs {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    flex-wrap: nowrap;
  }
  .prof-nav-tab { white-space: nowrap; padding: 10px 14px }
  .prof-tabs { flex-wrap: wrap }

  /* Tables that must stay tables — allow horizontal scroll */
  .detail-table-wrap { overflow-x: auto }
  .dev-event { grid-template-columns: 1fr; gap: 4px }

  /* Touch-friendly minimum hit areas */
  .icon-btn,
  .nav-toggle,
  .rail-item,
  .ph-hd,
  .menu-item,
  .btn-primary,
  .btn-ghost { min-height: 40px }
  .rail-item { padding: 12px 14px }

  /* Customer-mode escape pill — keep above the bottom edge */
  .sim-pill {
    right: 12px !important;
    bottom: 12px !important;
  }

  /* Hero pipeline & rail filters wrap freely */
  .hero-pipeline { gap: 4px }
  .filters { gap: 5px }
  .iv-statbar { gap: 18px; flex-wrap: wrap }
}

/* Tighter on very small phones (≤420px) */
@media (max-width: 420px) {
  .brand-name { font-size: 18px }
  .page-title-big { font-size: 17px }
  .head-cta {
    padding: 8px 12px;
    font-size: 14px;
  }
  .ob-h1 { font-size: 22px }
  .agent-h { font-size: 22px }
  .rs-hero-rating { font-size: 22px }
  .kpi-n { font-size: 32px }
  .ag-h { font-size: 22px }
  .rs-tile-val { font-size: 22px }
  .met b { font-size: 18px }
  .iv-stat-num { font-size: 26px }
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="/frontend/app.jsx" data-presets="react"></script>
