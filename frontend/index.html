}
.ask-empty-eyebrow {
  display: inline-flex; align-items: center; gap: 6px; align-self: flex-start;
  font-family: var(--mono); font-size: 10px; font-weight: 600;
  color: var(--accent2); letter-spacing: .08em; text-transform: uppercase;
  padding: 5px 11px; border-radius: 999px;
  background: var(--accent2-d); border: 1px solid var(--accent2-b);
}
.ask-empty-h {
  font-family: var(--serif); font-size: 22px; line-height: 1.3;
  color: var(--t1); letter-spacing: -.02em;
}
.ask-empty-h em {
  font-style: normal;
  background: linear-gradient(120deg, #a78bff, #22e5ff);
  background-clip: text; -webkit-background-clip: text; color: transparent;
}
.ask-suggestions { display: flex; flex-direction: column; gap: 7px; margin-top: 6px }
.ask-suggestion {
  display: flex; align-items: center; gap: 9px; text-align: left;
  padding: 11px 14px; border-radius: 10px;
  background: rgba(255,255,255,.025); border: 1px solid var(--bdr);
  color: var(--t1); font-size: 13px; cursor: pointer;
  opacity: 0; animation: fade-in-up .35s cubic-bezier(.16,1,.3,1) forwards;
  transition: all .15s;
}
.ask-suggestion > svg { color: var(--accent-h); flex-shrink: 0 }
.ask-suggestion:hover {
  border-color: var(--accent-b);
  background: var(--accent-d);
  transform: translateX(2px);
}

.ask-msg {
  display: flex; gap: 10px; max-width: 95%;
  animation: fade-in-up .25s cubic-bezier(.16,1,.3,1);
}
.ask-msg-user { align-self: flex-end; flex-direction: row-reverse }
.ask-msg-icon {
  width: 26px; height: 26px; border-radius: 8px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  background: var(--accent-d); border: 1px solid var(--accent-b);
  color: var(--accent-h);
  margin-top: 2px;
}
.ask-msg-body {
  padding: 11px 14px; border-radius: 12px;
  font-size: 13.5px; line-height: 1.6;
  white-space: pre-wrap; word-wrap: break-word;
  letter-spacing: -.005em;
}
.ask-msg-user .ask-msg-body {
  background: linear-gradient(135deg, var(--accent), var(--accent-h));
  color: #fff;
  border-bottom-right-radius: 4px;
  box-shadow: 0 6px 18px -8px rgba(124,92,255,.5);
}
.ask-msg-assistant .ask-msg-body {
  background: var(--surface); color: var(--t1);
  border: 1px solid var(--bdr);
  border-bottom-left-radius: 4px;
}

.ask-typing { display: inline-flex; align-items: center; gap: 4px; padding: 14px 16px }
.ask-typing > span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent-h);
  animation: ask-bounce 1.2s ease-in-out infinite;
}
.ask-typing > span:nth-child(2) { animation-delay: .15s }
.ask-typing > span:nth-child(3) { animation-delay: .30s }
@keyframes ask-bounce {
  0%, 60%, 100% { transform: translateY(0); opacity: .5 }
  30% { transform: translateY(-5px); opacity: 1 }
}

.ask-error {
  display: inline-flex; align-items: center; gap: 8px; align-self: flex-start;
  padding: 9px 13px; border-radius: 10px;
  background: var(--bad-d); border: 1px solid var(--bad-b); color: var(--bad);
  font-size: 12.5px; line-height: 1.4;
}

.ask-input-row {
  display: flex; align-items: stretch; gap: 8px;
  padding: 12px 16px 4px;
  border-top: 1px solid var(--bdr);
  flex-shrink: 0;
}
.ask-input {
  flex: 1; resize: none;
  padding: 11px 14px; border-radius: 12px;
  background: var(--bg-2); border: 1px solid var(--bdr2);
  color: var(--t1); font-family: var(--sans); font-size: 13.5px; line-height: 1.5;
  min-height: 44px; max-height: 160px;
  transition: border-color .12s, box-shadow .12s;
}
.ask-input:focus {
  outline: none; border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-d);
}
.ask-input::placeholder { color: var(--t3) }
.ask-input:disabled { opacity: .6 }
.ask-send {
  width: 44px; flex-shrink: 0; border-radius: 12px;
  border: none; cursor: pointer; color: #fff;
  background: linear-gradient(135deg, var(--accent), var(--accent-h));
  box-shadow: 0 6px 16px -6px rgba(124,92,255,.55);
  display: flex; align-items: center; justify-content: center;
  transition: transform .12s, box-shadow .12s, opacity .12s;
}
.ask-send:hover:not(:disabled) {
  transform: translateY(-1px);
  box-shadow: 0 10px 22px -6px rgba(124,92,255,.7), 0 0 0 1px rgba(34,229,255,.25);
}
.ask-send:disabled { opacity: .4; cursor: not-allowed }
.ask-foot-hint {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 0 16px 12px;
  font-family: var(--mono); font-size: 9.5px; color: var(--t4);
  letter-spacing: .04em;
}
@media (max-width: 600px) {
  .ask-drawer { width: 100vw }
}

/* ── Tailor drawer (per-job on-demand resume) ────────────────────────────── */
.tailor-drawer {
  width: min(680px, 96vw);
}
.tailor-drawer .ask-head {
  background: linear-gradient(180deg, rgba(124, 92, 255, .14), rgba(124, 92, 255, .02));
}
.tailor-body {
  flex: 1; overflow-y: auto;
  padding: 18px 18px 24px;
  display: flex; flex-direction: column; gap: 16px;
  scroll-behavior: smooth;
}
.tailor-body::-webkit-scrollbar { width: 4px }
.tailor-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 4px }

.tailor-loading {
  display: flex; flex-direction: column; gap: 14px;
  padding: 20px 18px;
  border: 1px solid var(--bdr);
  border-radius: 12px;
  background:
    linear-gradient(180deg, rgba(124,92,255,.05), transparent 65%),
    var(--bg-2);
}
.tailor-loading-eyebrow {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: var(--mono); font-size: 11px; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--accent2);
}
.tailor-loading-hint {
  font-size: 13px; line-height: 1.55; color: var(--t3);
}
.tailor-steps {
  list-style: none; margin: 4px 0 0; padding: 0;
  display: flex; flex-direction: column; gap: 8px;
}
.tailor-steps li {
  display: inline-flex; align-items: center; gap: 9px;
  font-size: 12.5px; color: var(--t2);
  opacity: 0;
  animation: tailor-step-in .55s cubic-bezier(.16,1,.3,1) forwards;
}
.tailor-steps li svg { color: var(--accent2); opacity: .85 }
@keyframes tailor-step-in {
  from { opacity: 0; transform: translateX(-6px) }
  to   { opacity: 1; transform: translateX(0) }
}

.tailor-error {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 14px 16px;
  border: 1px solid var(--bad-b); border-radius: 12px;
  background: var(--bad-d);
  color: var(--bad);
}
.tailor-error svg { flex-shrink: 0; margin-top: 2px }
.tailor-error-h {
  font-size: 13px; font-weight: 700; color: var(--t1);
  margin-bottom: 2px; letter-spacing: -.005em;
}
.tailor-error-msg {
  font-size: 12.5px; color: var(--t3); line-height: 1.5;
}

.tailor-result { display: flex; flex-direction: column; gap: 14px }
.tailor-result .tr-card { border-color: var(--bdr2) }

/* Three contrasting CTA buttons (Plans / Atlas / Tailor): distinct gold,
   magenta-violet, cyan-mint gradients ~120 degrees apart for visibility. */
.btn-tailor {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 15px; border-radius: 9px;
  font-size: 15.5px; font-weight: 600; letter-spacing: -.005em;
  cursor: pointer; transition: transform .15s ease, box-shadow .2s ease, filter .2s ease;
  white-space: nowrap; border: 1px solid rgba(34,229,255,.55); color: #03161a;
  background: linear-gradient(125deg, #22e5ff 0%, #34d399 100%);
  box-shadow: 0 0 0 1px rgba(34,229,255,.25), 0 6px 18px -8px rgba(34,229,255,.55), inset 0 1px 0 rgba(255,255,255,.35);
}
.btn-tailor:hover { transform: translateY(-1px); filter: brightness(1.05) saturate(1.1); box-shadow: 0 0 0 1px rgba(34,229,255,.50), 0 14px 28px -10px rgba(34,229,255,.75), inset 0 1px 0 rgba(255,255,255,.45) }
.btn-tailor:active { transform: translateY(0); filter: brightness(.96) }
.btn-tailor:disabled { opacity: .55; cursor: not-allowed; transform: none; filter: grayscale(.4) }
.btn-tailor svg { color: #03161a }

.btn-atlas {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 15px; border-radius: 9px;
  font-size: 15.5px; font-weight: 600; letter-spacing: -.005em;
  cursor: pointer; transition: transform .15s ease, box-shadow .2s ease, filter .2s ease;
  white-space: nowrap; border: 1px solid rgba(255,61,154,.55); color: #fff;
  background: linear-gradient(125deg, #ff3d9a 0%, #a855f7 55%, #7c5cff 100%);
  box-shadow: 0 0 0 1px rgba(168,85,247,.30), 0 6px 18px -8px rgba(255,61,154,.55), inset 0 1px 0 rgba(255,255,255,.25);
}
.btn-atlas:hover { transform: translateY(-1px); filter: brightness(1.07) saturate(1.05); box-shadow: 0 0 0 1px rgba(255,61,154,.50), 0 14px 28px -10px rgba(168,85,247,.75), inset 0 1px 0 rgba(255,255,255,.35) }
.btn-atlas:active { transform: translateY(0); filter: brightness(.96) }
.btn-atlas:disabled { opacity: .55; cursor: not-allowed; transform: none; filter: grayscale(.4) }
.btn-atlas svg { color: #fff; filter: drop-shadow(0 0 4px rgba(255,255,255,.35)) }

.rail-item-plans {
  position: relative; overflow: hidden;
  background: linear-gradient(110deg, rgba(251,191,36,.10) 0%, rgba(251,191,36,.02) 60%, transparent 100%);
  border-left: 2px solid rgba(251,191,36,.55);
  padding-left: 10px !important;
}
.rail-item-plans .lbl {
  background: linear-gradient(95deg, #ffd778 0%, #fbbf24 45%, #f59e0b 100%);
  -webkit-background-clip: text; background-clip: text; color: transparent;
  font-weight: 600; letter-spacing: -.005em;
}
.rail-item-plans .rail-icon { color: #fbbf24 }
.rail-item-plans .rail-icon svg {
  filter: drop-shadow(0 0 6px rgba(251,191,36,.55));
  animation: rail-plans-pulse 3.2s ease-in-out infinite;
}
@keyframes rail-plans-pulse {
  0%, 100% { transform: scale(1);    filter: drop-shadow(0 0 4px rgba(251,191,36,.35)) }
  50%      { transform: scale(1.10); filter: drop-shadow(0 0 10px rgba(251,191,36,.75)) }
}
.rail-plans-glint {
  position: absolute; inset: 0; pointer-events: none;
  background: linear-gradient(105deg, transparent 0%, transparent 38%, rgba(255,215,120,.18) 48%, rgba(255,255,255,.28) 50%, rgba(255,215,120,.18) 52%, transparent 62%, transparent 100%);
  background-size: 220% 100%; background-position: 120% 0;
  animation: rail-plans-shimmer 5.2s ease-in-out infinite;
  mix-blend-mode: screen;
}
@keyframes rail-plans-shimmer {
  0%   { background-position: 120% 0 }
  60%  { background-position: -40% 0 }
  100% { background-position: -40% 0 }
}
.rail-item-plans:hover {
  background: linear-gradient(110deg, rgba(251,191,36,.18) 0%, rgba(251,191,36,.06) 60%, transparent 100%);
  border-left-color: rgba(251,191,36,.85);
}
.rail-item-plans.active {
  background: linear-gradient(110deg, rgba(251,191,36,.25) 0%, rgba(251,191,36,.10) 60%, transparent 100%);
  border-left-color: #fbbf24;
}
.rail-item-plans.active .lbl { color: transparent }
.rail-item-plans.active .rail-plans-glint { animation-play-state: paused; opacity: .35 }
@media (prefers-reduced-motion: reduce) {
  .rail-plans-glint, .rail-item-plans .rail-icon svg { animation: none }
}

/* RESPONSIVE */
@media (max-width: 1180px) {
  .viz-grid  { grid-template-columns: 1fr 1fr }
  .viz-tip   { grid-column: 1 / -1 }
  .viz-pulse { grid-column: 1 / -1 }
  .lower-grid{ grid-template-columns: 1fr }
  .kpi-row   { grid-template-columns: repeat(2, 1fr) }
}
@media (max-width: 760px) {
  .hero-grid    { grid-template-columns: 1fr }
  .hero-right   { display: flex; justify-content: center }
  .viz-grid     { grid-template-columns: 1fr }
  .kpi-row      { grid-template-columns: 1fr 1fr }
  .hero-h       { font-size: 34px }
}

/* ══════════════════════════════════════════════════════════
   JOB DETAIL VIEW — Overview / Company sub-page.
   Slides over the JobsPage body when a JobCard is clicked.
   Inherits the cosmic dark palette; --accent halos in the
   hero, --good/--accent3 dichotomy in skill alignment chips.
   ══════════════════════════════════════════════════════════ */
.jd-shell {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  background: var(--bg);
  animation: jd-shell-in .35s cubic-bezier(.22, 1, .36, 1);
}
@keyframes jd-shell-in {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: none; }
}
.jd-shell::before {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(ellipse 700px 460px at 18% 0%,  var(--accent-d)  0%, transparent 60%),
    radial-gradient(ellipse 600px 420px at 92% 100%, var(--accent2-d) 0%, transparent 65%);
  opacity: .85;
  z-index: 0;
}

/* Sticky action bar */
.jd-bar {
  position: relative;
  z-index: 5;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 11px 22px;
  background: rgba(7, 7, 14, .82);
  backdrop-filter: blur(18px) saturate(140%);
  -webkit-backdrop-filter: blur(18px) saturate(140%);
  border-bottom: 1px solid var(--bdr);
  flex-shrink: 0;
}
.jd-back {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 12px 7px 9px;
  border-radius: 8px;
  border: 1px solid var(--bdr);
  background: var(--bg-2);
  color: var(--t2);
  font-size: 14.5px;
  font-weight: 500;
  cursor: pointer;
  transition: all .12s;
}
.jd-back:hover {
  background: var(--bg-3);
  border-color: var(--bdr2);
  color: var(--t1);
  transform: translateX(-1px);
}
.jd-tabs {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  padding: 4px;
  background: var(--bg-2);
  border: 1px solid var(--bdr);
  border-radius: 10px;
  margin-left: 8px;
}
.jd-tab {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 13px;
  border-radius: 7px;
  border: none;
  background: transparent;
  color: var(--t3);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: color .12s, background .12s, box-shadow .12s;
}
.jd-tab:hover { color: var(--t1); }
.jd-tab.active {
  background: var(--surface);
  color: var(--t1);
  box-shadow: 0 1px 2px rgba(0, 0, 0, .18), inset 0 0 0 1px var(--bdr2);
}
.jd-tab.active .ic { color: var(--accent-h); }
.jd-spacer { flex: 1; }
.jd-bar-meta {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--t3);
  margin-right: 6px;
}
.jd-bar-meta b {
  font-family: var(--mono);
  font-size: 14px;
  letter-spacing: 0;
  text-transform: none;
  color: var(--accent-h);
  font-weight: 700;
}
.jd-bar-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 34px;
  height: 34px;
  border-radius: 8px;
  border: 1px solid var(--bdr);
  background: transparent;
  color: var(--t3);
  cursor: pointer;
  transition: all .12s;
}
.jd-bar-icon:hover {
  background: var(--bg-3);
  border-color: var(--bdr2);
  color: var(--t1);
}
.jd-bar-icon.active {
  color: var(--accent-h);
  background: var(--accent-d);
  border-color: var(--accent-b);
}
.jd-apply {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 9px 16px;
  border-radius: 9px;
  border: none;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent3) 100%);
  color: #fff;
  font-size: 14.5px;
  font-weight: 600;
  letter-spacing: -.005em;
  cursor: pointer;
  transition: all .15s;
  box-shadow:
    0 4px 16px -4px rgba(124, 92, 255, .55),
    inset 0 0 0 1px rgba(255, 255, 255, .08);
}
.jd-apply:hover {
  transform: translateY(-1px);
  box-shadow:
    0 8px 22px -4px rgba(124, 92, 255, .68),
    inset 0 0 0 1px rgba(255, 255, 255, .14);
}

/* Body / page wrapper */
.jd-body {
  position: relative;
  z-index: 2;
  flex: 1;
  overflow-y: auto;
  scroll-behavior: smooth;
}
.jd-page {
  max-width: 1080px;
  margin: 0 auto;
  padding: 28px 32px 64px;
  display: flex;
  flex-direction: column;
  gap: 22px;
}

/* Hero card */
.jd-hero {
  position: relative;
  background: linear-gradient(135deg, var(--surface) 0%, var(--bg-2) 100%);
  border: 1px solid var(--bdr);
  border-radius: 16px;
  padding: 22px 30px 24px;
  overflow: hidden;
}
.jd-hero::before {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: radial-gradient(circle at 0% 0%, var(--accent-d) 0%, transparent 55%);
  opacity: .85;
}
.jd-hero > * { position: relative; }
.jd-hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--t3);
  margin-bottom: 10px;
}
.jd-eb-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--good);
  box-shadow: 0 0 10px var(--good);
}
.jd-hero-eyebrow b { color: var(--good); font-weight: 700; }
.jd-dot { color: var(--t4); font-style: normal; }
.jd-hero-top {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  margin-bottom: 12px;
}
.jd-hero-logo { flex-shrink: 0; }
.jd-hero-meta {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.jd-hero-co {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  flex-wrap: wrap;
  font-size: 14.5px;
  color: var(--t3);
  font-weight: 500;
}
.jd-hero-co b { color: var(--t1); font-weight: 600; font-size: 15.5px; }
.jd-source-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: .15em;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 4px;
  background: var(--accent-d);
  color: var(--accent-h);
  border: 1px solid var(--accent-b);
  font-weight: 700;
}
.jd-hero-title {
  font-family: var(--serif);
  font-size: 32px;
  line-height: 1.15;
  letter-spacing: -.025em;
  font-weight: 700;
  color: var(--t1);
  margin: 4px 0 14px;
}
.jd-hero-quick {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 14px;
}
.jd-quick-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 10px;
  border-radius: 7px;
  background: rgba(255, 255, 255, .04);
  border: 1px solid var(--bdr);
  font-size: 13.5px;
  color: var(--t2);
  font-weight: 500;
}
.jd-quick-chip .ic { color: var(--t3); }
.jd-quick-chip.accent { background: var(--accent-d);  color: var(--accent-h); border-color: var(--accent-b); }
.jd-quick-chip.accent .ic { color: var(--accent-h); }
.jd-quick-chip.cyan   { background: var(--accent2-d); color: var(--accent2);  border-color: var(--accent2-b); }
.jd-quick-chip.cyan .ic   { color: var(--accent2); }
.jd-quick-chip.warn   { background: var(--warn-d);    color: var(--warn);     border-color: var(--warn-b); }
.jd-quick-chip.warn .ic   { color: var(--warn); }
.jd-quick-chip.good   { background: var(--good-d);    color: var(--good);     border-color: var(--good-b); }
.jd-quick-chip.good .ic   { color: var(--good); }
.jd-hero-industry {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.jd-industry-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 9px;
  border-radius: 999px;
  background: rgba(255, 255, 255, .03);
  border: 1px solid var(--bdr);
  font-size: 12.5px;
  color: var(--t3);
  font-weight: 500;
}

/* Match score card */
.jd-match {
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 28px;
  align-items: center;
  background: var(--surface);
  border: 1px solid var(--bdr);
  border-radius: 14px;
  padding: 26px 30px;
  position: relative;
  overflow: hidden;
}
.jd-match::before {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: linear-gradient(135deg, transparent 60%, var(--accent-d) 100%);
  opacity: .55;
}
.jd-match > * { position: relative; }
.jd-match-ring { position: relative; width: 220px; height: 220px; }
.jd-match-ring svg { width: 100%; height: 100%; }
.jd-match-ring-c {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.jd-match-num {
  font-family: var(--mono);
  font-size: 56px;
  font-weight: 700;
  line-height: 1;
  letter-spacing: -.03em;
  color: var(--t1);
}
.jd-match-num i {
  font-style: normal;
  font-size: 26px;
  color: var(--t3);
  margin-left: 1px;
}
.jd-match-verdict {
  margin-top: 10px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: .2em;
  text-transform: uppercase;
  font-weight: 700;
  padding: 3px 12px;
  border-radius: 999px;
}
.jd-match-verdict.good   { color: var(--good);     background: var(--good-d);   border: 1px solid var(--good-b); }
.jd-match-verdict.accent { color: var(--accent-h); background: var(--accent-d); border: 1px solid var(--accent-b); }
.jd-match-verdict.warn   { color: var(--warn);     background: var(--warn-d);   border: 1px solid var(--warn-b); }
.jd-match-verdict.bad    { color: var(--bad);      background: var(--bad-d);    border: 1px solid var(--bad-b); }
.jd-match-rows { display: flex; flex-direction: column; gap: 14px; }
.jd-match-row {
  display: grid;
  grid-template-columns: 150px 1fr 60px;
  align-items: center;
  gap: 14px;
}
.jd-match-row-l {
  font-size: 14px;
  color: var(--t2);
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 7px;
}
.jd-match-row-l .ic { color: var(--accent-h); }
.jd-match-bar {
  height: 6px;
  background: rgba(255, 255, 255, .05);
  border-radius: 3px;
  overflow: hidden;
}
.jd-match-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 1.4s cubic-bezier(.22, 1, .36, 1);
}
.jd-match-row-r {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 700;
  text-align: right;
}
.jd-match-reason {
  margin-top: 16px;
  padding: 12px 16px;
  border-left: 2px solid var(--accent-b);
  background: var(--accent-d);
  border-radius: 0 8px 8px 0;
  font-size: 13.5px;
  color: var(--t2);
  line-height: 1.55;
}
.jd-match-reason b { color: var(--accent-h); font-weight: 600; }

/* Generic detail section */
.jd-section {
  background: var(--surface);
  border: 1px solid var(--bdr);
  border-radius: 14px;
  padding: 24px 28px;
}
.jd-section-h {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--serif);
  font-size: 18.5px;
  font-weight: 700;
  letter-spacing: -.015em;
  color: var(--t1);
  margin-bottom: 18px;
}
.jd-section-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border-radius: 8px;
  background: var(--accent-d);
  color: var(--accent-h);
  border: 1px solid var(--accent-b);
}

/* Skills alignment */
.jd-skills-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
}
.jd-skills-col {
  background: var(--bg-2);
  border: 1px solid var(--bdr);
  border-radius: 12px;
  padding: 16px 18px;
}
.jd-skills-col-h {
  display: flex;
  align-items: center;
  gap: 7px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: .16em;
  text-transform: uppercase;
  font-weight: 700;
  margin-bottom: 12px;
}
.jd-skills-col.match .jd-skills-col-h { color: var(--good); }
.jd-skills-col.gap   .jd-skills-col-h { color: var(--accent3); }
.jd-skills-count {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0;
  padding: 2px 7px;
  border-radius: 4px;
  background: rgba(255, 255, 255, .05);
  color: var(--t3);
}
.jd-skills-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.jd-skill-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 10px;
  border-radius: 7px;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: -.005em;
}
.jd-skill-chip.match { background: var(--good-d);    color: var(--good);    border: 1px solid var(--good-b); }
.jd-skill-chip.gap   { background: var(--accent3-d); color: var(--accent3); border: 1px solid var(--accent3-b); }
.jd-skills-empty { color: var(--t4); font-size: 13px; }
.jd-skills-foot {
  margin-top: 14px;
  font-size: 13px;
  color: var(--t3);
  line-height: 1.55;
}
.jd-skills-foot b { color: var(--t1); font-weight: 600; }

/* Requirements list */
.jd-reqs-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  list-style: none;
  padding: 0;
  margin: 0;
}
.jd-reqs-item {
  display: grid;
  grid-template-columns: 24px 1fr;
  gap: 12px;
  font-size: 14.5px;
  color: var(--t2);
  line-height: 1.55;
}
.jd-reqs-item-marker {
  width: 24px;
  height: 24px;
  border-radius: 7px;
  background: var(--bg-3);
  color: var(--t3);
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.jd-reqs-item.match .jd-reqs-item-marker {
  background: var(--good-d);
  color: var(--good);
}

/* Action footer */
.jd-actions-card {
  background: linear-gradient(135deg, var(--surface) 0%, var(--bg-2) 100%);
  border: 1px solid var(--accent-b);
  border-radius: 14px;
  padding: 20px 24px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
  position: relative;
  overflow: hidden;
}
.jd-actions-card::before {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: radial-gradient(ellipse 400px 200px at 100% 50%, var(--accent-d) 0%, transparent 60%);
  opacity: .9;
}
.jd-actions-card > * { position: relative; }
.jd-actions-text { flex: 1; min-width: 220px; }
.jd-actions-h {
  font-family: var(--serif);
  font-size: 17px;
  font-weight: 700;
  color: var(--t1);
  letter-spacing: -.01em;
  line-height: 1.3;
}
.jd-actions-sub {
  font-size: 13.5px;
  color: var(--t3);
  margin-top: 2px;
  line-height: 1.45;
}
.jd-actions-row { display: flex; gap: 8px; flex-wrap: wrap; }
.jd-action-btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 9px 14px;
  border-radius: 9px;
  border: 1px solid var(--bdr);
  background: var(--bg-3);
  color: var(--t1);
  font-size: 14px;
  font-weight: 600;
  letter-spacing: -.005em;
  cursor: pointer;
  transition: all .12s;
}
.jd-action-btn:hover {
  background: var(--bg-2);
  border-color: var(--bdr2);
  transform: translateY(-1px);
}
.jd-action-btn.primary {
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent3) 100%);
  color: #fff;
  border-color: transparent;
  box-shadow: 0 4px 14px -4px rgba(124, 92, 255, .55);
}
.jd-action-btn.primary:hover {
  box-shadow: 0 8px 22px -4px rgba(124, 92, 255, .7);
}
.jd-action-btn.cyan {
  background: var(--accent2-d);
  color: var(--accent2);
  border-color: var(--accent2-b);
}
.jd-action-btn.cyan:hover { background: rgba(34, 229, 255, .22); }

/* Company tab */
.jd-company-hero {
  display: flex;
  align-items: center;
  gap: 22px;
  background: var(--surface);
  border: 1px solid var(--bdr);
  border-radius: 16px;
  padding: 24px 30px;
  position: relative;
  overflow: hidden;
}
.jd-company-hero::before {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: radial-gradient(circle at 100% 0%, var(--accent2-d) 0%, transparent 55%);
}
.jd-company-hero > * { position: relative; }
.jd-company-logo { flex-shrink: 0; }
.jd-company-text {
  display: flex;
  flex-direction: column;
  gap: 7px;
  flex: 1;
  min-width: 0;
}
.jd-company-name {
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -.025em;
  color: var(--t1);
  line-height: 1.15;
}
.jd-company-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.jd-company-link {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 13.5px;
  color: var(--accent-h);
  font-weight: 500;
  margin-top: 2px;
}
.jd-company-link:hover { text-decoration: underline; }

.jd-fact-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 14px;
}
.jd-fact {
  background: var(--bg-2);
  border: 1px solid var(--bdr);
  border-radius: 10px;
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.jd-fact-l {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--t3);
  font-weight: 700;
}
.jd-fact-v {
  font-size: 16px;
  font-weight: 600;
  color: var(--t1);
  letter-spacing: -.01em;
}
.jd-fact-v.mono { font-family: var(--mono); font-size: 14px; }
.jd-fact-h {
  font-size: 13px;
  color: var(--t3);
  margin-top: 2px;
  line-height: 1.5;
}

.jd-lookup-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 10px;
}
.jd-lookup {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 12px 14px;
  background: var(--bg-2);
  border: 1px solid var(--bdr);
  border-radius: 10px;
  color: var(--t2);
  text-decoration: none;
  cursor: pointer;
  transition: all .12s;
}
.jd-lookup:hover {
  background: var(--bg-3);
  border-color: var(--bdr2);
  color: var(--t1);
  text-decoration: none;
  transform: translateY(-1px);
}
.jd-lookup-ic {
  width: 30px;
  height: 30px;
  border-radius: 7px;
  background: var(--accent-d);
  color: var(--accent-h);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  border: 1px solid var(--accent-b);
}
.jd-lookup-text {
  display: flex;
  flex-direction: column;
  min-width: 0;
  flex: 1;
}
.jd-lookup-l { font-size: 13.5px; font-weight: 600; color: var(--t1); }
.jd-lookup-h {
  font-size: 12px;
  color: var(--t3);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.jd-roles-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.jd-role-card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 16px;
  background: var(--bg-2);
  border: 1px solid var(--bdr);
  border-radius: 10px;
  cursor: pointer;
  transition: all .12s;
}
.jd-role-card:hover {
  background: var(--bg-3);
  border-color: var(--bdr2);
  transform: translateX(2px);
}
.jd-role-card-text { flex: 1; min-width: 0; }
.jd-role-card-title {
  font-size: 14.5px;
  font-weight: 600;
  color: var(--t1);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.jd-role-card-meta {
  font-size: 12.5px;
  color: var(--t3);
  margin-top: 2px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.jd-role-card-score {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 700;
  padding: 4px 9px;
  border-radius: 6px;
  background: var(--bg-3);
  color: var(--t2);
  flex-shrink: 0;
}
.jd-role-card-score.good   { background: var(--good-d);   color: var(--good); }
.jd-role-card-score.accent { background: var(--accent-d); color: var(--accent-h); }

/* ── Body-content sections — pulled live from the source API ─────── */
.jd-jd-loading {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.jd-jd-skel {
  height: 14px;
  border-radius: 6px;
  background: linear-gradient(90deg, var(--bg-2), var(--bg-3), var(--bg-2));
  background-size: 200% 100%;
  animation: jd-skel-shimmer 1.4s linear infinite;
}
.jd-jd-skel.short { width: 65%; }
.jd-jd-skel.title { height: 18px; width: 38%; margin-bottom: 6px; }
@keyframes jd-skel-shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* Lead paragraph — short company / role intro pulled from JD */
.jd-lead-card {
  background: var(--surface);
  border: 1px solid var(--bdr);
  border-radius: 14px;
  padding: 22px 28px;
  position: relative;
  overflow: hidden;
}
.jd-lead-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 100%;
  background: linear-gradient(180deg, var(--accent), var(--accent3));
  opacity: .85;
}
.jd-lead-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--t3);
  font-weight: 700;
  margin-bottom: 8px;
}
.jd-lead-eyebrow .ic { color: var(--accent-h); }
.jd-lead-text {
  font-size: 15.5px;
  line-height: 1.65;
  color: var(--t1);
  letter-spacing: -.005em;
}

/* Bullet list shared by Responsibilities / Required / Preferred / Benefits */
.jd-bullet-list {
  display: flex;
  flex-direction: column;
  gap: 11px;
  list-style: none;
  padding: 0;
  margin: 0;
}
.jd-bullet-item {
  display: grid;
  grid-template-columns: 22px 1fr;
  gap: 12px;
  font-size: 14.5px;
  line-height: 1.6;
  color: var(--t1);
}
.jd-bullet-marker {
  width: 22px;
  height: 22px;
  border-radius: 6px;
  background: var(--bg-3);
  color: var(--t3);
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
}
.jd-bullet-marker.good {
  background: var(--good-d);
  color: var(--good);
  border: 1px solid var(--good-b);
}
.jd-bullet-marker.accent {
  background: var(--accent-d);
  color: var(--accent-h);
  border: 1px solid var(--accent-b);
}
.jd-bullet-marker.warn {
  background: var(--warn-d);
  color: var(--warn);
}

/* Inline skill highlight inside bullet text */
.jd-skill-inline {
  display: inline;
  padding: 0 5px;
  border-radius: 4px;
  font-weight: 600;
  letter-spacing: -.005em;
  white-space: nowrap;
}
.jd-skill-inline.match {
  background: var(--good-d);
  color: var(--good);
  box-shadow: inset 0 0 0 1px var(--good-b);
}
.jd-skill-inline.gap {
  background: var(--accent3-d);
  color: var(--accent3);
  box-shadow: inset 0 0 0 1px var(--accent3-b);
}

/* Qualifications: required vs preferred two-column */
.jd-qual-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
}
.jd-qual-col {
  background: var(--bg-2);
  border: 1px solid var(--bdr);
  border-radius: 12px;
  padding: 18px 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.jd-qual-col.required {
  border-color: rgba(124, 92, 255, .25);
  background:
    linear-gradient(180deg, var(--accent-d) 0%, transparent 60%),
    var(--bg-2);
}
.jd-qual-col.preferred {
  border-color: rgba(34, 229, 255, .22);
  background:
    linear-gradient(180deg, var(--accent2-d) 0%, transparent 60%),
    var(--bg-2);
}
.jd-qual-col-h {
  display: flex;
  align-items: center;
  gap: 7px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: .15em;
  text-transform: uppercase;
  font-weight: 700;
  margin-bottom: 4px;
}
.jd-qual-col.required .jd-qual-col-h    { color: var(--accent-h); }
.jd-qual-col.preferred .jd-qual-col-h   { color: var(--accent2); }

/* Skill chip cloud above the qualifications list — green for matched,
   muted gray for the rest. Mirrors jobright's "click on the tags" UX
   visually (we don't make them interactive yet). */
.jd-skill-cloud {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 12px 14px;
  background: var(--bg-2);
  border: 1px solid var(--bdr);
  border-radius: 10px;
  margin-bottom: 14px;
}
.jd-skill-cloud-h {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: .14em;
  text-transform: uppercase;
  font-weight: 700;
  color: var(--t3);
  width: 100%;
  margin-bottom: 6px;
}
.jd-skill-cloud-h .jd-cloud-tip {
  margin-left: auto;
  font-family: var(--sans);
  font-size: 12px;
  color: var(--t3);
  font-weight: 500;
  text-transform: none;
  letter-spacing: -.005em;
}
.jd-cloud-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  border-radius: 7px;
  font-size: 13px;
  font-weight: 500;
  border: 1px solid;
}
.jd-cloud-chip.on {
  background: var(--good-d);
  color: var(--good);
  border-color: var(--good-b);
}
.jd-cloud-chip.off {
  background: rgba(255, 255, 255, .03);
  color: var(--t3);
  border-color: var(--bdr);
}

/* "Open original posting" fallback when no source-side description */
.jd-no-desc {
  background: var(--bg-2);
  border: 1px dashed var(--bdr2);
  border-radius: 12px;
  padding: 26px 28px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}
.jd-no-desc-icon {
  width: 44px;
  height: 44px;
  border-radius: 11px;
  background: var(--accent-d);
  border: 1px solid var(--accent-b);
  color: var(--accent-h);
  display: flex;
  align-items: center;
  justify-content: center;
}
.jd-no-desc-h {
  font-family: var(--serif);
  font-size: 16.5px;
  font-weight: 700;
  color: var(--t1);
  letter-spacing: -.005em;
}
.jd-no-desc-p {
  font-size: 13.5px;
  color: var(--t3);
  line-height: 1.55;
  max-width: 460px;
}
.jd-no-desc-cta {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 4px;
  padding: 8px 14px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent3));
  color: #fff;
  font-size: 13.5px;
  font-weight: 600;
  text-decoration: none;
  border: none;
  cursor: pointer;
  box-shadow: 0 4px 14px -4px rgba(124, 92, 255, .55);
}
.jd-no-desc-cta:hover {
  text-decoration: none;
  transform: translateY(-1px);
  box-shadow: 0 8px 20px -4px rgba(124, 92, 255, .68);
}

/* Company summary card (pulled from Wikipedia) */
.jd-co-summary {
  display: flex;
  gap: 22px;
  align-items: flex-start;
  background: var(--surface);
  border: 1px solid var(--bdr);
  border-radius: 14px;
  padding: 22px 26px;
  position: relative;
  overflow: hidden;
}
.jd-co-summary::before {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: radial-gradient(circle at 0% 50%, var(--accent2-d) 0%, transparent 55%);
  opacity: .55;
}
.jd-co-summary > * { position: relative; }
.jd-co-summary-img {
  width: 120px;
  height: 120px;
  border-radius: 12px;
  object-fit: cover;
  flex-shrink: 0;
  background: var(--bg-2);
  border: 1px solid var(--bdr);
}
.jd-co-summary-text {
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex: 1;
  min-width: 0;
}
.jd-co-summary-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: .15em;
  text-transform: uppercase;

/* ══════════════════════════════════════════════════════════
   MOBILE — single comprehensive block. Reflows the full app
   shell into a single-column layout with a slide-out rail
   drawer. No functionality is hidden — only reflowed and
   re-prioritized for narrow widths and touch input.
   Last in the stylesheet so its rules win on specificity.
   ══════════════════════════════════════════════════════════ */

/* Hamburger / nav toggle is hidden by default; only mobile shows it */
.nav-toggle { display: none }
.rail-backdrop { display: none }

@media (max-width: 720px) {
  :root { --rail-w: 240px; }

  /* Allow the body to scroll vertically; shell can no longer be a
     fixed-height grid because content stacks. Use 100dvh so iOS
     browser chrome doesn't cut off the bottom row. */
  html, body { height: auto; min-height: 100dvh; overflow-x: hidden }
  body { overflow-y: auto; font-size: 15px }

  .shell {
    display: block;
    width: 100vw;
    min-height: 100dvh;
    overflow: visible;
  }

  /* Brand cell becomes a sticky header that hosts the hamburger */
  .brand-cell {
    grid-area: auto;
    height: 56px;
    padding: 0 12px;
    gap: 10px;
    border-right: none;
    border-bottom: 1px solid var(--bdr);
    position: sticky;
    top: 0;
    z-index: 70;
    background: var(--bg-1);
  }

  /* Promo strip stacks below brand */
  .promo-cell {
    grid-area: auto;
    padding: 8px 14px;
    font-size: 13.5px;
    flex-wrap: wrap;
    text-align: center;
    justify-content: center;
  }

  /* Rail becomes a slide-out drawer. Pulled out of the grid via
     fixed positioning, hidden offscreen until .is-open is added. */
  .rail {
    grid-area: auto;
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    width: var(--rail-w);
    max-width: 86vw;
    background: var(--bg-1);
    border-right: 1px solid var(--bdr);
    z-index: 90;
    padding: 64px 0 16px;
    transform: translateX(-100%);
    transition: transform .22s cubic-bezier(.16,1,.3,1);
    overflow-y: auto;
  }
  .rail.is-open {
    transform: translateX(0);
    box-shadow: 0 16px 60px rgba(0,0,0,.55);
  }

  /* Backdrop sits under the rail when open */
  .rail-backdrop {
    display: block;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.55);
    z-index: 80;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s ease;
  }
  .rail-backdrop.is-open {
    opacity: 1;
    pointer-events: auto;
  }

  /* Hamburger button — only on mobile */
  .nav-toggle {
    display: inline-flex;
    width: 40px;
    height: 40px;
    border-radius: 9px;
    background: var(--bg-2);
    border: 1px solid var(--bdr);
    color: var(--t1);
    cursor: pointer;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .nav-toggle:hover { background: var(--bg-3) }
  .nav-toggle:active { transform: scale(.97) }

  /* Main column takes full width */
  .main {
    grid-area: auto;
    width: 100%;
    min-height: calc(100dvh - 56px);
    overflow: visible;
  }

  /* Page head wraps; tabs and search drop to their own row */
  .page-head {
    height: auto;
    min-height: 56px;
    padding: 10px 14px;
    flex-wrap: wrap;
    gap: 8px;
    position: sticky;
    top: 56px;
    z-index: 40;
  }
  .page-title-big { font-size: 19px }
  .page-tabs {
    order: 99;
    width: 100%;
    flex-wrap: wrap;
    padding-bottom: 2px;
  }
  .page-tab {
    padding: 7px 11px;
    font-size: 14.5px;
    white-space: nowrap;
  }
  .head-search {
    order: 100;
    width: 100%;
  }
  .head-cta {
    padding: 9px 14px;
    font-size: 14.5px;
  }
  .head-spacer { display: none }

  /* All multi-column grids collapse to one column on mobile.
     !important wins over inline grid-template overrides. */
  .page-body,
  .settings-grid,
  .rs-grid,
  .rs-overview-top,
  .rs-keystrip,
  .rs-tile-grid,
  .viz-grid,
  .lower-grid,
  .kpi-row,
  .coach-grid,
  .iv-grid,
  .dev-grid,
  .dev-inspect-grid,
  .profile-grid,
  .detail-kv,
  .detail-grid {
    grid-template-columns: 1fr !important;
  }
  .page-body { gap: 16px; padding: 16px }
  .page-body.solo { padding: 16px }
  .col-rail { order: 99 }
  .iv-feature { grid-row: auto }
  .dev-card.dev-span,
  .dev-card.dev-users {
    grid-column: auto !important;
    grid-row: auto !important;
  }

  /* Data table grids: hide the column-label header, stack rows */
  .dt-head { display: none }
  .dt-row {
    grid-template-columns: 1fr;
    padding: 14px 16px;
    gap: 6px;
  }

  /* Job card: score column drops below body instead of right side */
  .job-card-inner { flex-direction: column }
  .job-score-col {
    flex-direction: row;
    border-left: none;
    border-top: 1px solid var(--bdr);
    padding: 10px 16px;
    justify-content: flex-start;
    gap: 12px;
  }

  /* Onboarding & auth cards lose the desktop-padded look */
  .onboard-wrap { padding: 24px 14px }
  .ob-card { padding: 24px 18px; border-radius: 14px }
  .ob-h1 { font-size: 26px }
  .auth-card { padding: 28px 22px !important; border-radius: 16px !important }

  /* Resume page hero & sub-nav */
  .rs-hero {
    flex-direction: column;
    align-items: flex-start;
    padding: 18px;
    gap: 16px;
  }
  .rs-hero-rating { font-size: 26px }
  .rs-viewing { padding: 12px 14px }
  .rs-viewing-name { font-size: 17px }
  .rs-subnav-row {
    flex-direction: column;
    align-items: stretch;
    gap: 10px;
  }
  .rs-subnav {
    flex-wrap: wrap;
  }
  .rs-subnav-pill { white-space: nowrap }

  /* Agent page hero */
  .agent-hero {
    flex-direction: column-reverse;
    align-items: stretch;
    padding: 20px;
    gap: 18px;
  }
  .agent-h { font-size: 25px }
  .agent-ring { align-self: center }

  /* Profile sub-nav wraps to a 2nd row on mobile (no scrolling). */
  .prof-nav-tabs {
    flex-wrap: wrap;
  }
  .prof-nav-tab { white-space: nowrap; padding: 10px 14px }
  .prof-tabs { flex-wrap: wrap }

  /* Wide data tables on mobile keep their internal horizontal scroll —
     reflowing a true table to single-column would lose the per-row
     comparison the table is for. The scroll is contained to the table
     wrap itself, never bleeds to the page. */
  .detail-table-wrap { overflow-x: auto; max-width: 100% }
  .dev-event { grid-template-columns: 1fr; gap: 4px }

  /* Touch-friendly minimum hit areas */
  .icon-btn,
  .nav-toggle,
  .rail-item,
  .ph-hd,
  .menu-item,
  .btn-primary,
  .btn-ghost { min-height: 40px }
  .rail-item { padding: 12px 14px }

  /* Customer-mode escape pill — keep above the bottom edge */
  .sim-pill {
    right: 12px !important;
    bottom: 12px !important;
  }

  /* Hero pipeline & rail filters wrap freely */
  .hero-pipeline { gap: 4px }
  .filters { gap: 5px }
  .iv-statbar { gap: 18px; flex-wrap: wrap }
}

/* Tighter on very small phones (≤420px) */
@media (max-width: 420px) {
  .brand-name { font-size: 18px }
  .page-title-big { font-size: 17px }
  .head-cta {
    padding: 8px 12px;
    font-size: 14px;
  }
  .ob-h1 { font-size: 22px }
  .agent-h { font-size: 22px }
  .rs-hero-rating { font-size: 22px }
  .kpi-n { font-size: 32px }
  .ag-h { font-size: 22px }
  .rs-tile-val { font-size: 22px }
  .met b { font-size: 18px }
  .iv-stat-num { font-size: 26px }
}
</style>
</head>

<div id="root"></div>
<script type="text/babel" src="/frontend/app.jsx" data-presets="react"></script>
