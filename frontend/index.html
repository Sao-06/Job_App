<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Jobs AI — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Literata:ital,opsz,wght@0,7..72,400;0,7..72,500;0,7..72,600;0,7..72,700;1,7..72,400;1,7..72,500;1,7..72,600&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.454.0/dist/umd/lucide.min.js" crossorigin="anonymous"></script>
<style>
/* ── TOKENS ── */
:root {
  /* deep ink stage so the accents read as electric */
  --bg:       #07070e;
  --bg-1:     #0e0e1c;
  --bg-2:     #161628;
  --bg-3:     #212138;
  --surface:  #1f1f33;
  --sur2:     #2b2b48;

  /* assertive separators — cards now feel discrete */
  --bdr:      rgba(255,255,255,.11);
  --bdr2:     rgba(255,255,255,.22);

  /* high-contrast text ladder; t2/t3 no longer wash out */
  --t1:       #f6f7ff;
  --t2:       #b9bee0;
  --t3:       #8186ad;
  --t4:       #50547a;

  /* primary: electric violet */
  --accent:   #7c5cff;
  --accent-h: #a78bff;
  --accent-d: rgba(124,92,255,.18);
  --accent-b: rgba(124,92,255,.45);

  /* secondary pop: neon cyan — used in highlights and gradient sweeps */
  --accent2:   #22e5ff;
  --accent2-d: rgba(34,229,255,.14);
  --accent2-b: rgba(34,229,255,.42);

  /* tertiary kicker: hot magenta for streaks/badges */
  --accent3:   #ff3d9a;
  --accent3-d: rgba(255,61,154,.14);
  --accent3-b: rgba(255,61,154,.42);

  /* status: saturated, semantic, awake */
  --good:     #3dff9a;
  --good-d:   rgba(61,255,154,.14);
  --good-b:   rgba(61,255,154,.36);
  --warn:     #ffd23d;
  --warn-d:   rgba(255,210,61,.14);
  --warn-b:   rgba(255,210,61,.36);
  --bad:      #ff4d6d;
  --bad-d:    rgba(255,77,109,.14);
  --bad-b:    rgba(255,77,109,.38);

  /* electric halo applied to primary CTAs and active rings */
  --glow:     0 0 0 1px rgba(124,92,255,.55), 0 12px 28px -10px rgba(124,92,255,.65);
  --glow-cy:  0 0 0 1px rgba(34,229,255,.5), 0 10px 26px -10px rgba(34,229,255,.55);

  --mono:     'JetBrains Mono', monospace;
  --sans:     'Manrope', system-ui, sans-serif;
  --serif:    'Literata', 'Iowan Old Style', Georgia, serif;
  --rail-w:   210px;
}

/* Light theme overrides — applied when <html data-theme="light"> */
:root[data-theme="light"] {
  --bg:       #f3f4fc;
  --bg-1:     #ffffff;
  --bg-2:     #eaecf7;
  --bg-3:     #dbdef0;
  --surface:  #ffffff;
  --sur2:     #f1f2fb;
  --bdr:      rgba(20,20,40,.13);
  --bdr2:     rgba(20,20,40,.24);
  --t1:       #0a0b1d;
  --t2:       #3a3d5b;
  --t3:       #6c708e;
  --t4:       #9ea2bd;
  --accent:   #6a3dff;
  --accent-h: #4a1cdc;
  --accent-d: rgba(106,61,255,.12);
  --accent-b: rgba(106,61,255,.42);
  --accent2:   #00b8d4;
  --accent2-d: rgba(0,184,212,.12);
  --accent2-b: rgba(0,184,212,.40);
  --accent3:   #e02e8a;
  --accent3-d: rgba(224,46,138,.12);
  --accent3-b: rgba(224,46,138,.40);
  --good:     #0fb86b;
  --good-d:   rgba(15,184,107,.12);
  --good-b:   rgba(15,184,107,.36);
  --warn:     #c98700;
  --warn-d:   rgba(201,135,0,.12);
  --warn-b:   rgba(201,135,0,.36);
  --bad:      #d63152;
  --bad-d:    rgba(214,49,82,.12);
  --bad-b:    rgba(214,49,82,.38);
  --glow:     0 0 0 1px rgba(106,61,255,.40), 0 10px 24px -10px rgba(106,61,255,.45);
  --glow-cy:  0 0 0 1px rgba(0,184,212,.40), 0 10px 24px -10px rgba(0,184,212,.45);
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0 }
html { scroll-behavior:smooth; font-size:16px }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--t1);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  font-size: 15.5px;
  line-height: 1.55;
  letter-spacing: -0.005em;     /* Manrope reads cleaner with a hair of negative tracking */
  font-feature-settings: "ss01", "ss02", "cv11";  /* friendlier 'a' / 'g' / numbers */
  overflow: hidden;
  height: 100vh;
}
::-webkit-scrollbar { width:5px; height:5px }
::-webkit-scrollbar-track { background:transparent }
::-webkit-scrollbar-thumb { background:var(--bdr2); border-radius:3px }
a { color:var(--accent-h); text-decoration:none }
a:hover { text-decoration:underline }
button { font-family:var(--sans); cursor:pointer }
input, select, textarea { font-family:var(--sans) }

/* ── ICON HELPER ── */
.ic { display:inline-flex; align-items:center; justify-content:center; flex-shrink:0 }

/* ── ANIMATIONS ── */
@keyframes sp { to { transform:rotate(360deg) } }
@keyframes fade-in-up { from { opacity:0; transform:translateY(8px) } to { opacity:1; transform:none } }
@keyframes lsweep { 0% { transform:translateX(-100%) } 100% { transform:translateX(200%) } }
@keyframes promo-in { from { opacity:0 } to { opacity:1 } }

.spin { width:13px; height:13px; border:2px solid rgba(255,255,255,.2); border-top-color:currentColor; border-radius:50%; animation:sp .6s linear infinite; display:inline-block; flex-shrink:0 }
.fade-in { animation:fade-in-up .25s cubic-bezier(.16,1,.3,1) }

/* ── SHELL GRID ── */
.shell {
  display: grid;
  grid-template-areas: "brand promo" "rail main";
  grid-template-columns: var(--rail-w) 1fr;
  grid-template-rows: 48px 1fr;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
}

/* ── BRAND CELL ── */
.brand-cell {
  grid-area: brand;
  background: var(--bg-1);
  border-right: 1px solid var(--bdr);
  border-bottom: 1px solid var(--bdr);
  display: flex;
  align-items: center;
  padding: 0 14px;
}
.brand-mark {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  user-select: none;
}
.brand-glyph {
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 4px 12px -4px rgba(124,92,255,.55);
}
.brand-name {
  font-family: var(--serif);
  font-size: 21px;
  color: var(--t1);
  letter-spacing: -.3px;
  line-height: 1;
}
.brand-name em { color: var(--accent-h); font-style: italic; }

/* ── PROMO STRIP ── */
.promo-cell {
  grid-area: promo;
  background: var(--accent-d);
  border-bottom: 1px solid var(--accent-b);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  font-size: 14.5px;
  color: var(--t2);
  padding: 0 14px;
  animation: promo-in .3s ease;
}
.promo-cell strong { color: var(--t1) }
.promo-close {
  background: none; border: none; color: var(--t3);
  display: flex; align-items: center; cursor: pointer;
  padding: 2px; border-radius: 4px; transition: color .12s;
  margin-left: 8px;
}
.promo-close:hover { color: var(--t1) }

/* ── RAIL ── */
.rail {
  grid-area: rail;
  background: var(--bg-1);
  border-right: 1px solid var(--bdr);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 8px 0;
}
.rail-nav { flex: 1; display: flex; flex-direction: column; gap: 1px; padding: 0 8px }
.rail-bottom { display: flex; flex-direction: column; gap: 1px; padding: 0 8px 4px; border-top: 1px solid var(--bdr); padding-top: 8px; margin-top: 4px }
.rail-item {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 10px 13px;
  border-radius: 9px;
  cursor: pointer;
  color: var(--t3);
  font-size: 15.5px;
  font-weight: 500;
  transition: background .12s, color .12s;
  position: relative;
  user-select: none;
}
.rail-icon { width: 18px; height: 18px; }
.rail-item:hover { background: var(--bg-3); color: var(--t2) }
.rail-item.active { background: var(--accent-d); color: var(--accent-h) }
.rail-icon { width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0 }
.lbl { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis }
.rail-count {
  font-size: 13px; font-weight: 600; font-family: var(--mono);
  background: var(--bg-3); color: var(--t3); padding: 1px 5px; border-radius: 4px;
}
.rail-badge {
  font-size: 13px; font-weight: 600;
  background: var(--accent-d); color: var(--accent-h); padding: 1px 6px; border-radius: 10px;
}

/* ── MAIN ── */
.main { grid-area: main; overflow: hidden; display: flex; flex-direction: column }

/* ── PAGE HEAD ── */
.page-head {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 28px;
  height: 64px;
  border-bottom: 1px solid var(--bdr);
  background: var(--bg-1);
  flex-shrink: 0;
}
.page-title { font-size: 13px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--t3); font-family: var(--mono) }
.page-title-big { font-size: 22px; font-weight: 700; color: var(--t1); letter-spacing: -.02em; font-family: var(--serif); line-height: 1 }
.page-tab-sep { color: var(--t4); font-size: 22px }
.page-tabs { display: flex; gap: 4px }
.page-tab {
  display: flex; align-items: center; gap: 7px;
  padding: 8px 13px; border-radius: 8px; border: none; background: none;
  font-size: 15.5px; font-weight: 500; color: var(--t3); cursor: pointer; transition: all .12s;
}
.page-tab:hover { color: var(--t2); background: var(--bg-3) }
.page-tab.active { color: var(--t1); background: var(--bg-3) }
.tab-count { font-size: 13px; font-family: var(--mono); background: var(--bg-2); color: var(--t3); padding: 1px 5px; border-radius: 4px }
.head-spacer { flex: 1 }
.head-search {
  display: flex; align-items: center; gap: 9px;
  background: var(--bg-2); border: 1px solid var(--bdr); border-radius: 9px;
  padding: 8px 13px; width: 260px;
}
.head-search input { background: none; border: none; outline: none; color: var(--t1); font-size: 15.5px; width: 100%; font-family: var(--sans) }
.head-search input::placeholder { color: var(--t4) }
.head-cta {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 18px; border-radius: 9px; border: none;
  background: var(--accent); color: #fff; font-size: 15.5px; font-weight: 600;
  cursor: pointer; transition: all .15s; white-space: nowrap;
  box-shadow: 0 4px 14px -6px rgba(124,92,255,.55);
  letter-spacing: -.005em;
}
.head-cta:hover { background: var(--accent-h); transform: translateY(-1px); box-shadow: 0 8px 20px -6px rgba(124,92,255,.7), 0 0 0 1px rgba(34,229,255,.25) }
.head-cta:disabled { opacity: .5; cursor: not-allowed; transform: none }

/* Refresh confirmation pill — appears for ~3.5s after a refresh completes
   so the user has a concrete signal that the click did something even when
   no new rows came back. Two flavors: 'new' (cyan, "+N new") and 'ok'
   (muted, "Up to date"). Slides in from the left of the button. */
.refresh-toast {
  display: inline-flex; align-items: center; gap: 6px;
  margin-left: 10px;
  padding: 6px 10px;
  border-radius: 999px;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: .02em;
  white-space: nowrap;
  animation: refresh-toast-in .35s cubic-bezier(.22,1,.36,1);
  pointer-events: none;
}
.refresh-toast.new {
  color: var(--accent2);
  background: var(--accent2-d);
  border: 1px solid var(--accent2-b);
  box-shadow: 0 0 0 1px rgba(34,229,255,.15), 0 4px 14px -4px rgba(34,229,255,.35);
}
.refresh-toast.ok {
  color: var(--good);
  background: var(--good-d);
  border: 1px solid var(--good-b);
}
@keyframes refresh-toast-in {
  from { opacity: 0; transform: translateX(-6px) scale(.95); }
  to   { opacity: 1; transform: none; }
}

/* ── PAGE BODY ── */
.page-body {
  flex: 1; overflow: hidden;
  display: grid; grid-template-columns: 1fr 320px; gap: 28px;
  padding: 28px; overflow-y: auto;
}
.page-body.solo { display: flex; flex-direction: column; gap: 22px }
.col-main { min-width: 0; display: flex; flex-direction: column; gap: 18px }
.col-rail { display: flex; flex-direction: column; gap: 16px }

/* ── BUTTONS ── */
.btn-primary {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 16px; border-radius: 9px; border: 1px solid var(--accent);
  background: var(--accent); color: #fff; font-size: 15.5px; font-weight: 600;
  cursor: pointer; transition: all .12s; white-space: nowrap;
  letter-spacing: -.005em;
}
.btn-primary:hover { background: var(--accent-h); border-color: var(--accent-h) }
.btn-primary:disabled { opacity: .45; cursor: not-allowed }
.btn-ghost {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 15px; border-radius: 9px; border: 1px solid var(--bdr);
  background: transparent; color: var(--t2); font-size: 15.5px; font-weight: 500;
  cursor: pointer; transition: all .12s; white-space: nowrap;
}
.btn-ghost:hover { background: var(--bg-3); color: var(--t1); border-color: var(--bdr2) }
.btn-ghost:disabled { opacity: .4; cursor: not-allowed }
.icon-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--bdr);
  background: transparent; color: var(--t3); cursor: pointer; transition: all .12s; flex-shrink: 0;
}
.icon-btn:hover { background: var(--bg-3); color: var(--t1); border-color: var(--bdr2) }
.icon-btn.active { color: var(--accent-h); background: var(--accent-d); border-color: var(--accent-b) }
.lp-btn-p {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 8px 18px; border-radius: 9px; border: none;
  background: var(--accent); color: #fff; font-size: 16.5px; font-weight: 600;
  cursor: pointer; transition: all .15s;
}
.lp-btn-p:hover { background: var(--accent-h); transform: translateY(-1px); box-shadow: 0 6px 22px rgba(124,92,255,.55), 0 0 0 1px rgba(34,229,255,.25) }
.lp-btn-p:disabled { opacity: .5; cursor: not-allowed; transform: none }

/* ── BADGES ── */
.badge { font-size: 13px; font-weight: 600; padding: 2px 7px; border-radius: 4px; font-family: var(--mono) }
.b-accent { background: var(--accent-d); color: var(--accent-h) }
.b-good { background: var(--good-d); color: var(--good) }

/* ── NOTICE STRIP ── */
.notice-strip {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px; border-radius: 10px;
  background: var(--accent-d); border: 1px solid var(--accent-b);
  font-size: 15px; color: var(--t2); margin-bottom: 4px; line-height: 1.5;
}

/* ── DATA CARD ── */
.data-card {
  background: var(--surface); border: 1px solid var(--bdr); border-radius: 12px; overflow: hidden;
}
.dt-head {
  display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 48px;
  padding: 12px 22px; background: var(--bg-2);
  font-size: 12.5px; font-weight: 600; color: var(--t3);
  text-transform: uppercase; letter-spacing: .08em; font-family: var(--mono);
  border-bottom: 1px solid var(--bdr);
}
.dt-row {
  display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 48px;
  padding: 16px 22px; align-items: center;
  border-bottom: 1px solid var(--bdr); font-size: 15.5px;
  transition: background .1s;
}
.dt-row:last-child { border-bottom: none }
.dt-row:hover { background: var(--bg-2) }
.dt-name { display: flex; align-items: center; gap: 11px; min-width: 0 }
.dt-icon {
  width: 36px; height: 36px; border-radius: 8px; background: var(--accent-d);
  color: var(--accent-h); display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700; flex-shrink: 0;
}
.dt-name span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
.dt-empty { padding: 36px; text-align: center; color: var(--t3); font-size: 15.5px }

/* ── PROFILE TABS ── */
.prof-tabs { display: flex; gap: 4px }
.prof-tab {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px; border-radius: 9px; border: none; background: none;
  font-size: 15.5px; font-weight: 500; color: var(--t3); cursor: pointer; transition: all .12s;
}
.prof-tab:hover { color: var(--t2); background: var(--bg-3) }
.prof-tab.active { color: var(--t1); background: var(--bg-3) }
.prof-nav-tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--bdr); padding: 0 2px }
.prof-nav-tab {
  padding: 10px 16px; border: none; background: none;
  font-size: 15.5px; font-weight: 500; color: var(--t3); cursor: pointer; transition: all .12s;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
}
.prof-nav-tab:hover { color: var(--t2) }
.prof-nav-tab.active { color: var(--t1); border-bottom-color: var(--accent) }

/* ── ACTION MENU ── */
.action-menu-wrap { position: relative }
/* Menu uses position: fixed via inline styles from React (top/right computed
   from the trigger's rect) so it cannot be clipped by ancestor overflow. */
.action-menu {
  z-index: 1000;
  background: var(--surface); border: 1px solid var(--bdr2); border-radius: 10px;
  padding: 4px; min-width: 180px; box-shadow: 0 12px 32px rgba(0,0,0,.5);
}
.menu-item {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 7px 10px; border-radius: 7px; border: none; background: none;
  font-size: 15.5px; color: var(--t2); cursor: pointer; transition: all .1s; text-align: left;
}
.menu-item:hover { background: var(--bg-3); color: var(--t1) }
.menu-item.danger { color: var(--bad) }
.menu-item.danger:hover { background: var(--bad-d) }

/* ── SETTINGS ── */
.settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px }
@media (max-width: 900px) { .settings-grid { grid-template-columns: 1fr } }
.set-sec { display: flex; flex-direction: column; gap: 12px }
.set-sec-h {
  display: flex; align-items: center; gap: 7px;
  font-size: 14px; font-weight: 600; color: var(--t3);
  text-transform: uppercase; letter-spacing: .07em; font-family: var(--mono);
  padding-bottom: 8px; border-bottom: 1px solid var(--bdr);
}
.set-field { display: flex; flex-direction: column; gap: 5px }
.set-label { font-size: 14.5px; font-weight: 500; color: var(--t2) }
.set-helper { font-size: 14px; color: var(--t3); line-height: 1.5 }

/* ── Ollama server-side status banner ─────────────────────────────────── */
.ollama-banner {
  display: flex; flex-direction: column; gap: 8px;
  padding: 10px 12px; margin-bottom: 8px;
  border-radius: 9px; border: 1px solid var(--bdr);
  background: var(--bg-2);
  font-family: var(--mono); font-size: 11px;
  transition: border-color .2s, background .2s;
}
.ollama-banner.ob-loading { border-color: var(--bdr2) }
.ollama-banner.ob-down    { border-color: var(--bad-b);    background: var(--bad-d) }
.ollama-banner.ob-missing { border-color: var(--warn-b);   background: var(--warn-d) }
.ollama-banner.ob-pulling { border-color: var(--accent-b); background: var(--accent-d) }
.ollama-banner.ob-ok      { border-color: var(--good-b);   background: var(--good-d) }

.ob-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap }
.ob-tag {
  font-family: var(--mono); font-size: 9.5px; letter-spacing: .22em;
  font-weight: 700; padding: 2px 8px; border-radius: 4px;
  background: rgba(255,255,255,.06); color: var(--t1);
  border: 1px solid var(--bdr2);
}
.ob-host {
  font-family: var(--mono); font-size: 11px; color: var(--t2);
  background: rgba(0,0,0,.18); padding: 2px 7px; border-radius: 4px;
}
.ob-state {
  margin-left: auto;
  font-family: var(--mono); font-size: 10px; letter-spacing: .18em;
  font-weight: 700; text-transform: uppercase;
  display: inline-flex; align-items: center; gap: 6px;
}
.ob-down    .ob-state { color: var(--bad)      }
.ob-missing .ob-state { color: var(--warn)     }
.ob-pulling .ob-state { color: var(--accent-h) }
.ob-ok      .ob-state { color: var(--good)     }
.ob-loading .ob-state { color: var(--t3)       }

.ob-progress {
  display: flex; flex-direction: column; gap: 5px;
  background: rgba(0,0,0,.22); border-radius: 6px;
  padding: 7px 9px;
}
.ob-progress-bar {
  height: 4px; border-radius: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent-h));
  transition: width .25s ease;
  position: relative; overflow: hidden;
}
.ob-progress-bar::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.3), transparent);
  animation: ob-shimmer 1.4s linear infinite;
}
@keyframes ob-shimmer {
  0%   { transform: translateX(-100%) }
  100% { transform: translateX(100%) }
}
.ob-progress-stage {
  font-family: var(--mono); font-size: 10.5px; color: var(--t2);
  letter-spacing: .04em;
}
.ob-progress-stage code {
  color: var(--accent-h); background: none; padding: 0; font-family: var(--mono);
}
.ob-help {
  font-family: var(--sans); font-size: 12px; line-height: 1.5;
  color: var(--t2);
}
.ob-help code {
  font-family: var(--mono); font-size: 11px;
  background: rgba(0,0,0,.22); padding: 1px 6px; border-radius: 3px;
  color: var(--t1);
}

/* ── RESUME ANALYSIS — hero, metric tiles, insight rows ── */
.rs-analysis { display: flex; flex-direction: column; gap: 22px }
.rs-hero {
  display: flex; align-items: center; gap: 28px;
  padding: 22px 26px;
  background: linear-gradient(135deg, var(--bg-2) 0%, var(--surface) 100%);
  border: 1px solid var(--bdr);
  border-radius: 14px;
  position: relative; overflow: hidden;
}
.rs-hero::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(circle at 0% 50%, var(--accent-d) 0%, transparent 55%);
  opacity: .55;
}
.rs-hero-ring { position: relative; flex-shrink: 0; z-index: 1 }
.rs-hero-num {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.rs-hero-text { display: flex; flex-direction: column; gap: 6px; z-index: 1; min-width: 0 }
.rs-hero-rating {
  font-family: var(--serif); font-size: 32px; line-height: 1.1; letter-spacing: -.5px;
}
.rs-hero-tag { font-size: 15.5px; color: var(--t2); line-height: 1.5; max-width: 460px }
.rs-verify {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 14px; font-family: var(--mono); padding: 4px 10px;
  border-radius: 999px; width: fit-content; margin-top: 4px;
  border: 1px solid var(--bdr2);
}
.rs-verify.ok    { color: var(--good); background: var(--good-d); border-color: var(--good-b) }
.rs-verify.warn  { color: var(--warn); background: var(--warn-d); border-color: var(--warn-b) }
.rs-verify.info  { color: var(--t2);    background: var(--bg-3);   border-color: var(--bdr2) }
.rs-verify code  { font-family: var(--mono); font-size: 14px; padding: 0 4px;
                   background: rgba(255,255,255,.06); border-radius: 4px; margin-left: 2px; }
.rs-verify-notes { font-size: 14px; color: var(--t3); font-style: italic; max-width: 460px; line-height: 1.5 }

.rs-tile-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 10px;
}
.rs-tile {
  padding: 14px 14px 12px; background: var(--surface);
  border: 1px solid var(--bdr); border-radius: 10px;
  display: flex; flex-direction: column; gap: 2px;
  transition: border-color .15s, transform .15s;
}
.rs-tile:hover { border-color: var(--bdr2); transform: translateY(-1px) }
.rs-tile-val  { font-size: 25px; font-weight: 700; line-height: 1; font-family: var(--mono) }
.rs-tile-lbl  { font-size: 14px; color: var(--t2); margin-top: 4px; text-transform: uppercase;
                letter-spacing: .05em; font-weight: 500 }
.rs-tile-hint { font-size: 13px; color: var(--t3); margin-top: 2px; line-height: 1.45 }

.rs-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
}
@media (max-width: 900px) { .rs-grid { grid-template-columns: 1fr } }

.rs-insight {
  display: flex; align-items: flex-start; gap: 9px;
  padding: 9px 12px; border-radius: 8px;
  border: 1px solid; font-size: 15px; line-height: 1.55;
  color: var(--t1);
  margin-top: 8px;
}
.rs-insight:first-of-type { margin-top: 4px }
.rs-insight-icon { display: inline-flex; align-items: center; padding-top: 2px; flex-shrink: 0 }
.rs-insight-text { flex: 1 }

.rs-rerun { display: flex; justify-content: center; margin-top: 4px }

/* ── RESUME PAGE — refined detail area, sub-nav, paginated analysis ── */
.rs-detail-area { margin-top: 28px }

/* "Now viewing" banner */
.rs-viewing {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 16px; margin-bottom: 16px;
  background: linear-gradient(135deg, var(--surface) 0%, var(--bg-2) 100%);
  border: 1px solid var(--bdr); border-radius: 12px;
  position: relative; overflow: hidden;
}
.rs-viewing::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(circle at 0% 50%, var(--accent-d) 0%, transparent 55%);
  opacity: .5;
}
.rs-viewing-icon {
  flex-shrink: 0; width: 40px; height: 40px; border-radius: 10px;
  background: var(--accent-d); border: 1px solid var(--accent-b);
  color: var(--accent-h); font-family: var(--mono); font-size: 18px; font-weight: 600;
  display: inline-flex; align-items: center; justify-content: center;
  z-index: 1;
}
.rs-viewing-meta-col { display: flex; flex-direction: column; gap: 2px; min-width: 0; flex: 1; z-index: 1 }
.rs-viewing-name {
  font-family: var(--serif); font-size: 19px; line-height: 1.15; letter-spacing: -.01em;
  color: var(--t1);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.rs-viewing-meta {
  font-family: var(--mono); font-size: 13px; letter-spacing: .14em;
  text-transform: uppercase; color: var(--t3);
  display: inline-flex; align-items: center; gap: 6px; flex-wrap: wrap;
}
.rs-viewing-dot { color: var(--t4); font-family: var(--sans) }
.rs-viewing-action { z-index: 1; flex-shrink: 0 }

/* Paginated analysis sub-nav (segmented control) */
.rs-subnav-row {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  margin-bottom: 14px;
}
.rs-subnav {
  display: inline-flex; align-items: center; gap: 2px; padding: 4px;
  background: var(--bg-2); border: 1px solid var(--bdr); border-radius: 12px;
  flex-wrap: wrap;
}
.rs-subnav-pill {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 7px 13px; border-radius: 9px; border: none;
  background: transparent; color: var(--t3);
  font-family: var(--sans); font-size: 15px; font-weight: 500;
  letter-spacing: -.005em; cursor: pointer;
  transition: color .15s, background .15s, box-shadow .15s;
}
.rs-subnav-pill:hover { color: var(--t1) }
.rs-subnav-pill.active {
  background: var(--surface); color: var(--t1);
  box-shadow: 0 1px 2px rgba(0,0,0,.18), inset 0 0 0 1px var(--bdr2);
}
.rs-subnav-pill.active .ic { color: var(--accent-h) }
.rs-subnav-step {
  font-family: var(--mono); font-size: 13px; letter-spacing: .22em;
  text-transform: uppercase; color: var(--t3); white-space: nowrap;
}

/* Overview view */
.rs-overview { display: flex; flex-direction: column; gap: 22px }
.rs-overview-top {
  display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1.05fr); gap: 18px;
  align-items: stretch;
}
@media (max-width: 1100px) { .rs-overview-top { grid-template-columns: 1fr } }
.rs-overview-top .rs-hero { height: 100% }

.rs-tldr {
  background: var(--surface); border: 1px solid var(--bdr); border-radius: 14px;
  padding: 22px;
  display: flex; flex-direction: column; gap: 14px;
}
.rs-tldr-h {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: var(--mono); font-size: 13px; letter-spacing: .22em;
  text-transform: uppercase; color: var(--t3); font-weight: 500;
}
.rs-tldr-h::before { content: ''; width: 18px; height: 1px; background: var(--accent-h) }
.rs-tldr-list { display: flex; flex-direction: column; gap: 8px }
.rs-tldr-item {
  display: grid; grid-template-columns: 26px 1fr; gap: 12px; align-items: flex-start;
  padding: 11px 13px; border-radius: 10px;
  background: var(--bg-2); border: 1px solid var(--bdr);
  transition: border-color .15s, transform .15s;
}
.rs-tldr-item:hover { border-color: var(--bdr2); transform: translateX(2px) }
.rs-tldr-num {
  display: inline-flex; align-items: center; justify-content: center;
  width: 24px; height: 24px; border-radius: 7px;
  background: var(--accent-d); color: var(--accent-h);
  border: 1px solid var(--accent-b);
  font-family: var(--mono); font-size: 14px; font-weight: 600;
}
.rs-tldr-num.flag { background: var(--bad-d); color: var(--bad); border-color: var(--bad-b) }
.rs-tldr-text { font-size: 15.5px; color: var(--t1); line-height: 1.55 }
.rs-tldr-empty {
  display: flex; align-items: flex-start; gap: 9px;
  padding: 12px 13px; border-radius: 9px;
  background: var(--good-d); border: 1px solid var(--good-b);
  color: var(--good); font-size: 15px; line-height: 1.55;
}

.rs-keysec { display: flex; flex-direction: column; gap: 10px }
.rs-keystrip {
  display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px;
}
@media (max-width: 700px) { .rs-keystrip { grid-template-columns: repeat(2, 1fr) } }

/* Metrics view (grouped) */
.rs-metric-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px }
.rs-metric-group:last-child { margin-bottom: 0 }
.rs-metric-group-h {
  display: flex; align-items: baseline; gap: 12px;
  padding-bottom: 10px; border-bottom: 1px solid var(--bdr);
  font-family: var(--mono); font-size: 13px; letter-spacing: .22em;
  text-transform: uppercase; color: var(--t2); font-weight: 500;
}
.rs-metric-group-hint {
  margin-left: auto;
  font-family: var(--sans); font-size: 14px; letter-spacing: 0;
  text-transform: none; color: var(--t3); font-weight: 400;
}

/* Insights view (full-width sections) */
.rs-insights-page { display: flex; flex-direction: column; gap: 18px }
.rs-insights-sec {
  background: var(--surface); border: 1px solid var(--bdr);
  border-radius: 14px; padding: 22px 24px;
}
.rs-insights-sec-h {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--mono); font-size: 14px; letter-spacing: .18em;
  text-transform: uppercase; font-weight: 500;
  margin-bottom: 14px; padding-bottom: 14px;
  border-bottom: 1px solid var(--bdr);
}
.rs-insights-sec-h span:not(.rs-insights-sec-count) { color: inherit }
.rs-insights-sec-count {
  margin-left: auto; padding: 2px 9px; border-radius: 999px;
  background: var(--bg-3); color: var(--t3);
  font-family: var(--mono); font-size: 13px; letter-spacing: 0;
  font-weight: 500;
}
.rs-insights-list { display: flex; flex-direction: column; gap: 8px }
.rs-insights-list .rs-insight { margin-top: 0 }

/* Deep dive view */
.rs-deep { display: flex; flex-direction: column; gap: 22px }
.rs-narrative {
  background: var(--surface); border: 1px solid var(--bdr);
  border-radius: 16px; padding: 32px 36px;
  max-width: 760px;
}
.rs-narrative-sub {
  font-family: var(--mono); font-size: 13px; letter-spacing: .22em;
  text-transform: uppercase; color: var(--accent-h); margin-bottom: 12px;
  display: inline-flex; align-items: center; gap: 10px;
}
.rs-narrative-sub::before { content: ''; width: 18px; height: 1px; background: var(--accent-h) }
.rs-narrative-h {
  font-family: var(--serif); font-size: 30px; line-height: 1.2;
  letter-spacing: -.02em; color: var(--t1); font-weight: 400; margin-bottom: 22px;
}
.rs-narrative-h em { color: var(--accent-h); font-style: italic; font-family: var(--serif) }
.rs-narrative-text {
  font-size: 16.5px; color: var(--t2); line-height: 1.85; white-space: pre-wrap;
  font-family: var(--sans);
}
.rs-narrative-text::first-letter {
  font-family: var(--serif); font-size: 46px; float: left;
  line-height: 1; padding-right: 12px; padding-top: 4px;
  color: var(--accent-h);
}
.rs-deep-pillsec { display: flex; flex-direction: column; gap: 10px; max-width: 760px }
.rs-deep-pills { display: flex; flex-wrap: wrap; gap: 6px }

/* Empty / not-analyzed state */
.rs-empty {
  background: linear-gradient(135deg, var(--bg-2), var(--surface));
  border: 1px solid var(--bdr); border-radius: 16px;
  padding: 56px 32px; text-align: center;
  display: flex; flex-direction: column; align-items: center;
}
.rs-empty-icon {
  width: 52px; height: 52px; border-radius: 13px;
  background: var(--accent-d); border: 1px solid var(--accent-b);
  display: inline-flex; align-items: center; justify-content: center;
  margin-bottom: 18px;
}
.rs-empty-h {
  font-family: var(--serif); font-size: 25px; font-weight: 400;
  letter-spacing: -.01em; color: var(--t1); margin-bottom: 8px;
}
.rs-empty-sub {
  color: var(--t3); font-size: 15.5px; line-height: 1.6;
  max-width: 380px; margin: 0 auto 20px;
}

.set-row { display: flex; align-items: center; justify-content: space-between; gap: 12px }
.set-select {
  padding: 11px 13px; border-radius: 9px; border: 1px solid var(--bdr);
  background: var(--bg-2); color: var(--t1); font-size: 15.5px; outline: none; cursor: pointer; width: 100%;
  font-family: var(--sans);
}
.set-select:focus { border-color: var(--accent) }
.set-input {
  padding: 11px 14px; border-radius: 9px; border: 1px solid var(--bdr);
  background: var(--bg-2); color: var(--t1); font-size: 15.5px; outline: none; width: 100%;
  transition: border-color .15s;
  font-family: var(--sans);
}
.set-input:focus { border-color: var(--accent) }
.set-toggle {
  width: 44px; height: 24px; border-radius: 12px; border: none;
  background: var(--bg-3); position: relative; cursor: pointer; transition: background .2s; flex-shrink: 0;
}
.set-toggle.on { background: var(--accent) }
.set-toggle::after {
  content: ''; position: absolute; top: 3px; left: 3px;
  width: 18px; height: 18px; border-radius: 50%; background: #fff; transition: transform .2s;
}
.set-toggle.on::after { transform: translateX(20px) }
.set-range { width: 100%; accent-color: var(--accent) }
.set-range-val { font-family: var(--mono); font-size: 15.5px; color: var(--accent-h); font-weight: 500; white-space: nowrap }

/* ── PROFILE INPUTS ── */
.profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px }
.profile-input {
  padding: 11px 14px; border-radius: 9px; border: 1px solid var(--bdr);
  background: var(--bg-2); color: var(--t1); font-size: 15.5px; outline: none; width: 100%;
  transition: border-color .15s; font-family: var(--sans);
}
.profile-input:focus { border-color: var(--accent) }
.profile-textarea { min-height: 110px; resize: vertical; line-height: 1.6 }

/* Native <select> styled to match .profile-input. Custom chevron via
   inline SVG so the dropdown caret matches the dark theme. Themed
   variants for dark / light. */
.profile-select {
  appearance: none; -webkit-appearance: none; -moz-appearance: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%238186ad' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
  background-repeat: no-repeat;
  background-position: right 14px center;
  background-size: 14px 14px;
  padding-right: 38px;
  cursor: pointer;
  text-overflow: ellipsis;
}
:root[data-theme="light"] .profile-select {
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%236c708e' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
}
.profile-select option {
  background: var(--bg-2); color: var(--t1);
}
.profile-select option[value=""] { color: var(--t3); }

/* ── CHIP TOGGLE — multi-select control used by Search Preferences ── */
.chip-toggle-row {
  display: flex; flex-wrap: wrap; gap: 8px;
  margin-top: 4px;
}
.chip-toggle {
  appearance: none;
  font-family: var(--sans); font-size: 14px; font-weight: 500;
  padding: 8px 14px;
  border-radius: 999px;
  border: 1px solid var(--bdr);
  background: var(--bg-2);
  color: var(--t2);
  cursor: pointer;
  transition: background .15s, border-color .15s, color .15s, box-shadow .15s;
  letter-spacing: -.005em;
}
.chip-toggle:hover {
  border-color: var(--bdr2);
  color: var(--t1);
}
.chip-toggle.on {
  background: var(--accent-d);
  border-color: var(--accent-b);
  color: var(--accent-h);
  box-shadow: inset 0 0 0 1px rgba(124,92,255,.3);
}
.chip-toggle.on:hover { background: var(--accent-d); }

/* ── SEARCH PREFERENCES card emphasis on the Personal tab ── */
.search-prefs {
  border-color: var(--accent-b);
  background: linear-gradient(180deg, var(--accent-d) 0%, var(--bg-1) 22%);
}
.search-prefs-pill {
  font-family: var(--mono); font-size: 10.5px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .08em;
  padding: 3px 8px; border-radius: 6px;
  color: var(--accent-h);
  background: var(--accent-d);
  border: 1px solid var(--accent-b);
}

/* ────────────────────────────────────────────────────────────────
   PROFILE LINKS — industry-curated profile sites card.
   Editorial directory layout: each category is a collapsible row
   with a tinted icon-square; expanded categories reveal a stack of
   inputs, each fronted by a brand-colored monogram chip so the site
   is identifiable at a glance.
   ──────────────────────────────────────────────────────────────── */
.profile-links-card { border-color: var(--bdr); }
.profile-links-count {
  font-family: var(--mono); font-size: 10.5px; font-weight: 600;
  letter-spacing: .04em;
  padding: 3px 8px; border-radius: 6px;
  color: var(--t3);
  background: var(--bg-3);
  border: 1px solid var(--bdr);
}

.profile-link-group {
  border-top: 1px solid var(--bdr);
  margin-top: 4px;
}
.profile-link-group:first-of-type { border-top: 0; margin-top: 0; }
.profile-link-group-head {
  width: 100%;
  display: flex; align-items: center; gap: 12px;
  padding: 14px 4px;
  background: transparent; border: 0; cursor: pointer;
  text-align: left;
  font-family: var(--sans);
  color: var(--t1);
  transition: background .15s;
  border-radius: 7px;
}
.profile-link-group-head:hover { background: var(--bg-2); }
.profile-link-group-icon {
  width: 28px; height: 28px;
  border-radius: 7px;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--accent-d);
  color: var(--accent-h);
  border: 1px solid var(--accent-b);
  flex-shrink: 0;
}
.profile-link-group-name {
  flex: 1;
  font-size: 15.5px; font-weight: 600;
  letter-spacing: -.005em;
}
.profile-link-group-count {
  font-family: var(--mono); font-size: 11.5px; font-weight: 500;
  color: var(--t3);
}
.profile-link-group-chevron {
  display: inline-flex; align-items: center;
  color: var(--t3);
  transition: transform .25s cubic-bezier(.16,1,.3,1), color .15s;
}
.profile-link-group.open .profile-link-group-chevron {
  transform: rotate(180deg);
  color: var(--accent-h);
}
.profile-link-group-body {
  padding: 4px 4px 18px 4px;
  animation: pl-group-reveal .35s cubic-bezier(.22,1,.36,1);
}
@keyframes pl-group-reveal {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: none; }
}
.profile-link-group-desc {
  font-size: 13.5px; color: var(--t3);
  line-height: 1.55;
  margin: 0 0 12px 40px;
  font-style: italic;
}
.profile-link-rows {
  display: flex; flex-direction: column;
  gap: 10px;
}
.profile-link-row {
  display: flex; align-items: center; gap: 12px;
}
.profile-link-mono {
  width: 36px; height: 36px;
  flex-shrink: 0;
  border-radius: 9px;
  display: inline-flex; align-items: center; justify-content: center;
  font-family: var(--mono);
  font-size: 12px; font-weight: 700;
  letter-spacing: .02em;
  text-transform: uppercase;
  box-shadow: 0 1px 0 rgba(255,255,255,.05) inset, 0 4px 10px -6px rgba(0,0,0,.4);
  user-select: none;
}
.profile-link-row-body {
  flex: 1;
  display: flex; flex-direction: column;
  gap: 3px;
  min-width: 0;
}
.profile-link-row-label {
  font-size: 13px; font-weight: 500;
  color: var(--t2);
  letter-spacing: -.005em;
}
.profile-link-input {
  font-size: 14.5px;
  padding: 9px 12px;
  font-family: var(--mono);
}
.profile-link-input::placeholder {
  color: var(--t4);
  font-style: italic;
}
@media (max-width: 720px) {
  .profile-link-group-desc { margin-left: 0; }
}

/* Skill / role pills used across Profile + Resume Analysis */
.skill-pill {
  display: inline-flex; align-items: center;
  padding: 6px 12px; border-radius: 999px;
  font-size: 14px; font-weight: 500; line-height: 1.2;
  background: var(--bg-3); color: var(--t2);
  border: 1px solid var(--bdr); white-space: nowrap;
  transition: background .12s, border-color .12s, color .12s;
}
.skill-pill.hard { background: var(--accent-d); color: var(--accent-h); border-color: var(--accent-b) }
.skill-pill.soft { background: var(--bg-2); color: var(--t2) }
.skill-pill:hover { border-color: var(--bdr2) }
.profile-stack { display: flex; flex-direction: column; gap: 16px }
.profile-edit-row {
  padding: 16px; border-radius: 10px; border: 1px solid var(--bdr);
  background: var(--bg-2); position: relative; display: flex; flex-direction: column; gap: 10px;
}
.profile-edit-row.compact { gap: 8px }
.edit-trigger {
  position: absolute; top: 10px; right: 10px;
  display: none; align-items: center; justify-content: center;
  width: 26px; height: 26px; border-radius: 6px; border: 1px solid var(--bdr);
  background: var(--bg-3); color: var(--t3); cursor: pointer; transition: all .12s;
}
.edit-trigger.always { display: flex }
.profile-edit-row:hover .edit-trigger { display: flex }
.edit-trigger:hover { background: var(--bad-d); color: var(--bad); border-color: var(--bad-b) }

/* ══════════════════════════════════════════════════════════
   AGENT PAGE — refined pipeline + Atlas chat sidebar
   ══════════════════════════════════════════════════════════ */
.agent-shell {
  flex: 1; min-height: 0;
  display: flex; flex-direction: column;
  background: var(--bg);
  overflow: hidden;
}

/* Slim header */
.agent-head {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 18px; flex-wrap: wrap;
  padding: 22px 24px 16px;
  border-bottom: 1px solid var(--bdr);
}
.agent-head-l { min-width: 0 }
.agent-eyebrow {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: var(--mono); font-size: 10.5px; letter-spacing: .22em;
  text-transform: uppercase; color: var(--accent-h); font-weight: 500; margin-bottom: 8px;
}
.agent-eyebrow::before { content: ''; width: 18px; height: 1px; background: var(--accent-h) }
.agent-h {
  font-family: var(--serif); font-size: 28px; line-height: 1.15; letter-spacing: -.02em;
  color: var(--t1); font-weight: 400; margin: 0;
}
.agent-h em { color: var(--accent-h); font-style: italic; font-family: var(--serif) }
.agent-head-r { display: inline-flex; align-items: center; gap: 8px; flex-shrink: 0 }
.agent-runall { padding: 9px 18px }

/* 2-col layout: pipeline + chat */
.agent-grid {
  flex: 1; min-height: 0; overflow: hidden;
  display: grid; grid-template-columns: minmax(0, 1fr) 380px;
}
@media (max-width: 1100px) {
  .agent-grid { grid-template-columns: 1fr; grid-template-rows: 1fr auto }
}

/* Pipeline column */
.agent-pipeline {
  overflow-y: auto;
  padding: 22px 24px 32px;
  display: flex; flex-direction: column; gap: 18px;
}

/* Meter card */
.agent-meter {
  display: grid; grid-template-columns: 132px 1fr; gap: 22px; align-items: center;
  padding: 18px 22px;
  background: linear-gradient(135deg, var(--surface), var(--bg-2));
  border: 1px solid var(--bdr); border-radius: 14px;
  position: relative; overflow: hidden;
  animation: agent-rise .55s cubic-bezier(.16,1,.3,1) both;
}
.agent-meter::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(circle at 0% 50%, var(--accent-d), transparent 55%);
  opacity: .5;
}
.agent-meter-ring { position: relative; width: 120px; height: 120px; z-index: 1 }
.agent-meter-pct {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-family: var(--mono);
}
.agent-meter-pct b { font-size: 30px; font-weight: 700; line-height: 1 }
.agent-meter-pct b i { font-style: normal; font-size: 14px; color: var(--t3); margin-left: 1px }
.agent-meter-pct span { font-size: 11px; color: var(--t3); margin-top: 4px; letter-spacing: .14em }

.agent-meter-stats {
  display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 14px;
  z-index: 1;
}
@media (max-width: 720px) { .agent-meter-stats { grid-template-columns: repeat(2, 1fr) } }
.agent-meter-stat { display: flex; flex-direction: column; gap: 4px }
.agent-meter-stat i {
  font-style: normal; font-family: var(--mono); font-size: 10px; letter-spacing: .22em;
  text-transform: uppercase; color: var(--t3); font-weight: 500;
}
.agent-meter-stat b {
  font-family: var(--mono); font-size: 18px; font-weight: 600; color: var(--t1);
  letter-spacing: -.005em;
}

/* Phase 2 cap dial — sits between the meter and the phase list. Mirrors
   set-range/set-helper styling so it reads as a sibling of the Settings
   page sliders without importing those classes' positioning. */
.agent-tune {
  background: var(--bg-2); border: 1px solid var(--bdr); border-radius: 12px;
  padding: 14px 16px; margin: 14px 0 10px;
  display: flex; flex-direction: column; gap: 10px;
}
.agent-tune-row {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.agent-tune-label {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  text-transform: uppercase; letter-spacing: .14em; color: var(--t3);
}
.agent-tune-val {
  display: inline-flex; align-items: baseline; gap: 6px;
  font-family: var(--mono);
}
.agent-tune-val b {
  font-size: 22px; font-weight: 700; color: var(--accent-h); letter-spacing: -.02em;
}
.agent-tune-val i {
  font-style: normal; font-size: 10.5px; text-transform: uppercase; letter-spacing: .14em;
  color: var(--t3); font-weight: 500;
}
.agent-tune-range { width: 100%; }
.agent-tune-range:disabled { opacity: .55; cursor: not-allowed; }
.agent-tune-helper {
  font-size: 12.5px; line-height: 1.5; color: var(--t3);
  font-family: var(--sans);
}

/* Phase list */
.agent-phases { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 6px }

@keyframes agent-rise {
  from { opacity: 0; transform: translateY(8px) }
  to   { opacity: 1; transform: none }
}

.aph {
  background: var(--surface); border: 1px solid var(--bdr);
  border-radius: 11px; overflow: hidden;
  transition: border-color .2s, background .2s;
  animation: agent-rise .45s cubic-bezier(.16,1,.3,1) both;
}
.aph:hover { border-color: var(--bdr2) }
.aph-done    { border-left: 2px solid var(--good) }
.aph-run     { border-left: 2px solid var(--warn) }
.aph-err     { border-left: 2px solid var(--bad)  }
.aph-idle    { border-left: 2px solid transparent }
.aph-open    { background: var(--bg-1) }

.aph-hd {
  display: grid;
  grid-template-columns: 36px minmax(0, 1fr) auto auto;
  align-items: center; gap: 14px;
  padding: 12px 16px;
  cursor: pointer; user-select: none;
}
.aph-hd:hover { background: var(--bg-2) }
.aph-num {
  font-family: var(--mono); font-size: 12px; font-weight: 600;
  color: var(--t4); letter-spacing: .04em;
  display: inline-flex; align-items: center; justify-content: center;
  width: 36px; height: 28px; border-radius: 6px;
  background: var(--bg-3); border: 1px solid var(--bdr);
  transition: color .2s, background .2s, border-color .2s;
}
.aph-done .aph-num { color: var(--good); background: var(--good-d); border-color: var(--good-b) }
.aph-run  .aph-num { color: var(--warn); background: var(--warn-d); border-color: var(--warn-b) }
.aph-err  .aph-num { color: var(--bad);  background: var(--bad-d);  border-color: var(--bad-b)  }

.aph-info { display: flex; flex-direction: column; gap: 2px; min-width: 0 }
.aph-name {
  font-family: var(--sans); font-size: 14.5px; font-weight: 500; color: var(--t1);
  letter-spacing: -.005em;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.aph-sub {
  font-family: var(--sans); font-size: 12.5px; color: var(--t3);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

.aph-status { display: inline-flex; align-items: center; gap: 10px }
.aph-elapsed {
  font-family: var(--mono); font-size: 11px; color: var(--t3);
  letter-spacing: .04em; padding-left: 8px;
  border-left: 1px solid var(--bdr);
}

/* Status pills */
.aph-pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 9px; border-radius: 999px;
  font-family: var(--mono); font-size: 10.5px; font-weight: 600;
  letter-spacing: .14em; text-transform: uppercase;
  border: 1px solid;
}
.aph-pill-good { color: var(--good); background: var(--good-d); border-color: var(--good-b) }
.aph-pill-mid  { color: var(--t3);   background: var(--bg-3);   border-color: var(--bdr2)   }
.aph-pill-bad  { color: var(--bad);  background: var(--bad-d);  border-color: var(--bad-b)  }

/* Running pulse — focused indicator, not a glow on the whole card */
.aph-pulse {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 3px 10px; border-radius: 999px;
  font-family: var(--mono); font-size: 10.5px; font-weight: 600;
  letter-spacing: .14em; text-transform: uppercase;
  color: var(--warn); background: var(--warn-d);
  border: 1px solid var(--warn-b);
}
.aph-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--warn);
  animation: aph-pulse 1.4s ease-in-out infinite;
}
@keyframes aph-pulse {
  0%, 100% { opacity: 1;  box-shadow: 0 0 0 0 rgba(251,191,36,.65) }
  50%      { opacity: .6; box-shadow: 0 0 0 6px transparent }
}

.aph-actions { display: inline-flex; align-items: center; gap: 4px }
.aph-runbtn {
  width: 30px; height: 30px; border-radius: 7px;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--bg-3); color: var(--t2);
  border: 1px solid var(--bdr); cursor: pointer;
  transition: color .12s, background .12s, border-color .12s;
}
.aph-runbtn:hover:not(:disabled) {
  color: var(--accent-h); background: var(--accent-d); border-color: var(--accent-b);
}
.aph-runbtn:disabled { opacity: .45; cursor: not-allowed }
.aph-chev {
  display: inline-flex; align-items: center; color: var(--t3);
  transition: transform .25s cubic-bezier(.16,1,.3,1);
}
.aph-open .aph-chev { transform: rotate(180deg); color: var(--accent-h) }

/* Indeterminate progress bar — smooth slide */
.aph-bar {
  height: 2px; background: var(--bg-3); overflow: hidden; position: relative;
}
.aph-bar-fill {
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, var(--warn), transparent);
  background-size: 40% 100%; background-repeat: no-repeat;
  animation: aph-bar-slide 1.6s cubic-bezier(.4, 0, .6, 1) infinite;
}
@keyframes aph-bar-slide {
  0%   { background-position: -40% 0 }
  100% { background-position: 140%  0 }
}

.aph-body {
  border-top: 1px solid var(--bdr);
  padding: 16px 18px 18px;
  animation: agent-rise .25s cubic-bezier(.16,1,.3,1) both;
}

.agent-log {
  background: #08080d; border: 1px solid var(--bdr); border-radius: 8px;
  padding: 12px 14px;
  font-family: var(--mono); font-size: 12.5px; line-height: 1.75;
  color: #cfd0d8; margin-bottom: 12px;
  max-height: 240px; overflow-y: auto;
}
.agent-log .ok { color: var(--good) }

/* ── Atlas chat sidebar ─────────────────────────────────── */
.atlas-panel {
  display: flex; flex-direction: column;
  min-width: 0; min-height: 0;
  background: linear-gradient(180deg, var(--bg-1), var(--bg));
  border-left: 1px solid var(--bdr);
  overflow: hidden;
}
@media (max-width: 1100px) {
  .atlas-panel {
    border-left: none; border-top: 1px solid var(--bdr);
    max-height: 60vh;
  }
}

.atlas-head {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--bdr);
  background: linear-gradient(180deg, var(--bg-1), transparent);
}
.atlas-head-l { display: flex; align-items: center; gap: 10px; min-width: 0 }
.atlas-mark {
  width: 28px; height: 28px; border-radius: 7px;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--accent-d); border: 1px solid var(--accent-b);
  color: var(--accent-h); font-size: 14px; flex-shrink: 0;
}
.atlas-head-text { display: flex; flex-direction: column; gap: 1px; min-width: 0 }
.atlas-name {
  font-family: var(--serif); font-size: 16px; line-height: 1.1; color: var(--t1);
  letter-spacing: -.01em;
}
.atlas-name em { color: var(--accent-h); font-style: italic; font-family: var(--serif) }
.atlas-sub {
  font-family: var(--mono); font-size: 10px; letter-spacing: .14em;
  text-transform: uppercase; color: var(--t3);
}
.atlas-sub code {
  font-family: var(--mono); color: var(--accent-h); background: none; padding: 0;
}
.atlas-iconbtn {
  width: 28px; height: 28px; border-radius: 7px;
  background: transparent; border: 1px solid var(--bdr);
  color: var(--t3); cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  transition: color .12s, background .12s, border-color .12s;
}
.atlas-iconbtn:hover:not(:disabled) { color: var(--t1); background: var(--bg-2); border-color: var(--bdr2) }
.atlas-iconbtn:disabled { opacity: .4; cursor: not-allowed }

.atlas-transcript {
  flex: 1; min-height: 0; overflow-y: auto;
  padding: 16px 16px 8px;
  display: flex; flex-direction: column; gap: 10px;
}

.atlas-empty {
  display: flex; flex-direction: column; align-items: flex-start; gap: 12px;
  padding: 22px 4px;
}
.atlas-empty-mark { font-size: 22px; color: var(--accent-h); margin-bottom: 4px }
.atlas-empty-h {
  font-family: var(--serif); font-size: 18px; line-height: 1.3; color: var(--t1);
  letter-spacing: -.01em;
}
.atlas-empty-sub { font-size: 12.5px; color: var(--t3); line-height: 1.55 }
.atlas-suggestions { display: flex; flex-direction: column; gap: 6px; width: 100%; margin-top: 6px }
.atlas-sug {
  display: flex; align-items: flex-start; gap: 9px;
  padding: 9px 12px; border-radius: 9px;
  background: var(--bg-2); border: 1px solid var(--bdr);
  color: var(--t1); font-family: var(--sans); font-size: 12.5px; line-height: 1.5;
  text-align: left; cursor: pointer;
  transition: border-color .12s, transform .12s, background .12s;
}
.atlas-sug:hover { border-color: var(--accent-b); transform: translateX(2px); background: var(--surface) }
.atlas-sug-arrow { color: var(--accent-h); flex-shrink: 0; font-family: var(--mono) }

.atlas-msg {
  display: flex; align-items: flex-start; gap: 8px;
  animation: atlas-msg-in .3s cubic-bezier(.16,1,.3,1) both;
}
@keyframes atlas-msg-in {
  from { opacity: 0; transform: translateY(4px) }
  to   { opacity: 1; transform: none }
}
.atlas-msg-user { justify-content: flex-end }
.atlas-msg-mark {
  width: 22px; height: 22px; flex-shrink: 0;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 6px; background: var(--accent-d); border: 1px solid var(--accent-b);
  color: var(--accent-h); font-size: 12px;
  margin-top: 2px;
}
.atlas-msg-bubble {
  max-width: 88%;
  padding: 10px 13px;
  border-radius: 11px;
  font-family: var(--sans); font-size: 13px; line-height: 1.6;
  color: var(--t1); white-space: pre-wrap; word-break: break-word;
}
.atlas-msg-user      .atlas-msg-bubble {
  background: var(--accent-d); border: 1px solid var(--accent-b);
  border-bottom-right-radius: 4px;
}
.atlas-msg-assistant .atlas-msg-bubble {
  background: var(--surface); border: 1px solid var(--bdr);
  border-bottom-left-radius: 4px;
}
.atlas-msg.error .atlas-msg-bubble { background: var(--bad-d); border-color: var(--bad-b); color: var(--bad) }
.atlas-msg-err { display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px }

.atlas-cursor {
  display: inline-block; width: 8px; color: var(--accent-h);
  animation: atlas-blink .9s steps(2) infinite; margin-left: 1px;
}
@keyframes atlas-blink { 50% { opacity: 0 } }

/* ── Inline-Markdown block rendered inside chat bubbles ──────────────── */
.md { white-space: normal; }
.md > :first-child { margin-top: 0 }
.md > :last-child  { margin-bottom: 0 }
.md .md-p { margin: 0 0 8px 0; line-height: 1.6 }
.md .md-h { margin: 14px 0 6px; font-weight: 600; line-height: 1.3 }
.md .md-h1 { font-size: 1.18em }
.md .md-h2 { font-size: 1.10em }
.md .md-h3 { font-size: 1.04em; color: var(--t1) }
.md .md-h4 { font-size: 1.00em; color: var(--t2); font-weight: 600 }
.md .md-ul, .md .md-ol {
  margin: 4px 0 10px 0;
  padding-left: 22px;
}
.md .md-ul li, .md .md-ol li { margin: 3px 0; line-height: 1.55 }
.md .md-ul { list-style: disc }
.md .md-ol { list-style: decimal }
.md strong { font-weight: 600; color: var(--t1) }
.md em { font-style: italic }
.md a { color: var(--accent-h); text-decoration: underline; text-underline-offset: 2px }
.md a:hover { text-decoration: underline; opacity: .85 }
.md .md-code {
  font-family: var(--mono, "JetBrains Mono", Menlo, monospace);
  font-size: 0.92em;
  background: var(--bg-3, rgba(255,255,255,0.06));
  border: 1px solid var(--bdr, rgba(255,255,255,0.08));
  border-radius: 4px;
  padding: 1px 5px;
}
.md .md-pre {
  margin: 8px 0; padding: 10px 12px;
  background: var(--bg-2, #14141a);
  border: 1px solid var(--bdr);
  border-radius: 8px;
  overflow-x: auto;
  font-family: var(--mono, "JetBrains Mono", Menlo, monospace);
  font-size: 12.5px;
  line-height: 1.55;
  white-space: pre;
}
.md .md-pre code { background: transparent; border: 0; padding: 0 }
.md .md-quote {
  margin: 6px 0 10px;
  padding: 4px 0 4px 12px;
  border-left: 3px solid var(--accent-b);
  color: var(--t2);
  font-style: italic;
}
/* Override the pre-wrap on the bubble so paragraph margins work as
   intended. The Markdown component itself emits <br>-equivalent breaks
   only via paragraph boundaries. */
.atlas-msg-bubble:has(.md) { white-space: normal }
.ask-msg-body:has(.md)     { white-space: normal }

.atlas-thinking { display: inline-flex; align-items: center; gap: 4px }
.atlas-thinking span {
  width: 5px; height: 5px; border-radius: 50%; background: var(--t3);
  animation: atlas-think 1.2s ease-in-out infinite;
}
.atlas-thinking span:nth-child(2) { animation-delay: .15s }
.atlas-thinking span:nth-child(3) { animation-delay: .3s }
@keyframes atlas-think {
  0%, 80%, 100% { opacity: .3; transform: translateY(0) }
  40%           { opacity: 1;  transform: translateY(-3px) }
}

.atlas-composer {
  display: flex; align-items: flex-end; gap: 8px;
  padding: 12px 12px 14px;
  border-top: 1px solid var(--bdr);
  background: var(--bg-1);
}
.atlas-input {
  flex: 1; min-height: 38px; max-height: 160px;
  padding: 9px 12px; border-radius: 10px;
  background: var(--bg-2); border: 1px solid var(--bdr);
  color: var(--t1); font-family: var(--sans); font-size: 13px; line-height: 1.5;
  outline: none; resize: none;
  transition: border-color .15s, box-shadow .15s, background .15s;
}
.atlas-input::placeholder { color: var(--t3) }
.atlas-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-d);
  background: var(--surface);
}
.atlas-send {
  width: 38px; height: 38px; border-radius: 10px;
  display: inline-flex; align-items: center; justify-content: center;
  background: linear-gradient(180deg, var(--accent-h), var(--accent));
  color: #fff; border: none; cursor: pointer; flex-shrink: 0;
  transition: filter .12s, transform .12s, opacity .12s;
  box-shadow: 0 4px 12px rgba(94,106,210,.32);
}
.atlas-send:hover:not(:disabled)  { filter: brightness(1.08); transform: translateY(-1px) }
.atlas-send:active:not(:disabled) { transform: translateY(0) }
.atlas-send:disabled { opacity: .35; cursor: not-allowed; box-shadow: none }

/* Light theme tone-down */
:root[data-theme="light"] .agent-log { background: #15151c; color: #e8e8f0 }
:root[data-theme="light"] .atlas-msg-assistant .atlas-msg-bubble { background: var(--surface) }

.phase-detail { display: flex; flex-direction: column; gap: 14px }
.metrics { display: flex; gap: 10px; flex-wrap: wrap }
.met {
  background: var(--bg-2); border: 1px solid var(--bdr); border-radius: 9px;
  padding: 11px 14px; min-width: 80px;
}
.met b { display: block; font-family: var(--mono); font-size: 22px; font-weight: 700; color: var(--t1); letter-spacing: -.04em }
.met span { font-size: 13px; color: var(--t3); text-transform: uppercase; letter-spacing: .05em; margin-top: 3px; display: block }
.detail-kv { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px }
.detail-kv > div { display: flex; gap: 6px; font-size: 14.5px }
.detail-kv span { color: var(--t3); flex-shrink: 0 }
.detail-kv b { color: var(--t1); word-break: break-all }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px }
.detail-grid h4 { font-size: 14px; color: var(--t3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px }
.csv-text { font-size: 14.5px; color: var(--t2); line-height: 1.6 }
.detail-table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid var(--bdr) }
.detail-table { width: 100%; border-collapse: collapse; font-size: 14.5px }
.detail-table th { padding: 7px 10px; text-align: left; font-size: 13px; font-weight: 600; color: var(--t3); text-transform: uppercase; letter-spacing: .06em; background: var(--bg-2); border-bottom: 1px solid var(--bdr) }
.detail-table td { padding: 8px 10px; color: var(--t2); border-bottom: 1px solid rgba(255,255,255,.03) }
.detail-table tr:last-child td { border: none }
.detail-table tr:hover td { background: rgba(255,255,255,.02) }
.detail-table td.t1 { color: var(--t1); font-weight: 600 }
.detail-file {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 13px; border-radius: 8px; border: 1px solid var(--bdr);
  background: var(--bg-2); color: var(--accent-h); font-size: 15.5px; text-decoration: none;
}
.detail-file:hover { background: var(--accent-d) }

/* ── Phase 4 — tailored-resume cards (jobright.ai-style preview) ─────── */
.tr-list { display: flex; flex-direction: column; gap: 14px }
.tr-card {
  background: var(--bg-1);
  border: 1px solid var(--bdr);
  border-radius: 12px;
  overflow: hidden;
  transition: border-color .18s ease;
}
.tr-card:hover { border-color: var(--bdr2) }
.tr-card-err { border-color: var(--bad-b); background: var(--bad-d) }

.tr-head {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; padding: 14px 16px;
  background: none; border: none; cursor: pointer; text-align: left;
  border-bottom: 1px solid transparent;
  transition: background .15s ease, border-color .15s ease;
}
.tr-head:hover { background: var(--bg-2) }
.tr-head[aria-expanded="true"] { border-bottom-color: var(--bdr) }
.tr-head-l { display: flex; align-items: center; gap: 12px; min-width: 0 }
.tr-head-titles { min-width: 0 }
.tr-head-co { font-size: 16px; font-weight: 600; color: var(--t1); letter-spacing: -.01em }
.tr-head-role { font-size: 13.5px; color: var(--t3); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 360px }
.tr-head-r { display: flex; align-items: center; gap: 16px; flex-shrink: 0 }

.tr-stat { display: flex; flex-direction: column; align-items: flex-end; gap: 2px }
.tr-stat i { font-style: normal; font-family: var(--mono); font-size: 10px; font-weight: 600; color: var(--t3); text-transform: uppercase; letter-spacing: .12em }
.tr-stat b { font-family: var(--mono); font-size: 18px; font-weight: 700; color: var(--t1); letter-spacing: -.02em; display: inline-flex; align-items: center; gap: 6px }
.tr-stat-ats b { font-size: 14.5px; gap: 5px }
.tr-ats-num { color: var(--t2) }
.tr-ats-after { color: var(--t1) }
.tr-ats-arrow { color: var(--t4); font-size: 12px }
.tr-ats-delta {
  font-size: 11.5px; font-weight: 600; padding: 1px 6px; border-radius: 4px;
  background: var(--bg-3); margin-left: 2px;
}
.tr-ats-delta.good { background: var(--good-d); color: var(--good); border: 1px solid var(--good-b) }
.tr-ats-delta.bad  { background: var(--bad-d);  color: var(--bad);  border: 1px solid var(--bad-b) }
.tr-chev { display: inline-flex; color: var(--t3); padding-left: 4px }

.tr-err-note {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px; font-size: 13.5px; color: var(--bad);
  background: var(--bad-d); border-top: 1px solid var(--bad-b);
}

.tr-body { padding: 4px 16px 18px; display: flex; flex-direction: column; gap: 16px }
.tr-sec { display: flex; flex-direction: column; gap: 10px; padding-top: 14px; border-top: 1px solid var(--bdr) }
.tr-sec:first-child { border-top: none; padding-top: 8px }
.tr-sec-h {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--mono); font-size: 11.5px; font-weight: 600;
  color: var(--accent-h); text-transform: uppercase; letter-spacing: .12em;
}
.tr-sec-h em { font-style: normal; margin-left: auto; color: var(--t3); font-weight: 500; letter-spacing: .04em }

/* Skills comparison table */
.tr-cmp { display: flex; flex-direction: column; border: 1px solid var(--bdr); border-radius: 8px; overflow: hidden }
.tr-cmp-row {
  display: grid; grid-template-columns: 1.4fr 0.7fr 0.9fr;
  gap: 12px; align-items: center;
  padding: 9px 13px; border-bottom: 1px solid var(--bdr);
  font-size: 13.5px;
}
.tr-cmp-row:last-child { border-bottom: none }
.tr-cmp-row.tr-cmp-head {
  background: var(--bg-2); color: var(--t3); font-family: var(--mono);
  font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em;
}
.tr-cmp-row.hit  { background: rgba(61,255,154,.04) }
.tr-cmp-row.miss { background: rgba(255,77,109,.05) }
.tr-cmp-kw { color: var(--t1); font-weight: 500 }
.tr-cmp-act.keep { color: var(--good); font-size: 12.5px }
.tr-cmp-act.add  { color: var(--bad);  font-size: 12.5px; font-weight: 500 }
.tr-pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 10px; font-size: 11.5px; font-weight: 500;
  font-family: var(--mono); letter-spacing: .04em;
}
.tr-pill-good { background: var(--good-d); color: var(--good); border: 1px solid var(--good-b) }
.tr-pill-bad  { background: var(--bad-d);  color: var(--bad);  border: 1px solid var(--bad-b) }

/* Skill / gap chips */
.tr-chips { display: flex; flex-wrap: wrap; gap: 6px }
.tr-chip {
  display: inline-flex; padding: 4px 10px; border-radius: 6px;
  font-size: 12.5px; font-weight: 500;
  background: var(--bg-2); color: var(--t2); border: 1px solid var(--bdr);
}
.tr-chip-top { background: var(--accent-d); color: var(--accent-h); border-color: var(--accent-b) }
.tr-chip-gap { background: var(--warn-d); color: var(--warn); border-color: var(--warn-b) }

/* Per-role tailored bullets */
.tr-roles { display: flex; flex-direction: column; gap: 14px }
.tr-role { background: var(--bg-2); border: 1px solid var(--bdr); border-radius: 8px; padding: 12px 14px }
.tr-role-h { font-size: 13.5px; font-weight: 600; color: var(--t1); margin-bottom: 6px }
.tr-role-bullets { margin: 0; padding-left: 18px; display: flex; flex-direction: column; gap: 4px }
.tr-role-bullets li { font-size: 13.5px; color: var(--t2); line-height: 1.55 }

.tr-cl {
  background: var(--bg-2); border: 1px solid var(--bdr); border-radius: 8px;
  padding: 14px 16px; font-family: var(--sans); font-size: 13.5px; line-height: 1.6;
  color: var(--t2); white-space: pre-wrap; max-height: 280px; overflow-y: auto;
}

/* Action row */
.tr-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px }
.tr-dl {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 8px 14px; border-radius: 8px;
  font-size: 13.5px; font-weight: 500; text-decoration: none;
  background: var(--bg-2); border: 1px solid var(--bdr); color: var(--t1);
  transition: background .15s ease, border-color .15s ease;
}
.tr-dl:hover { background: var(--bg-3); border-color: var(--bdr2); text-decoration: none }
.tr-dl-primary {
  background: var(--accent); border-color: var(--accent); color: #fff;
  box-shadow: 0 4px 14px -6px rgba(124,92,255,.55);
}
.tr-dl-primary:hover { background: var(--accent-h); border-color: var(--accent-h) }
.tr-dl-ghost { background: none; color: var(--t3); border-color: transparent }
.tr-dl-ghost:hover { background: var(--bg-2); color: var(--t1); border-color: var(--bdr) }

@media (max-width: 720px) {
  .tr-head { flex-direction: column; align-items: flex-start; gap: 10px }
  .tr-head-r { width: 100%; justify-content: space-between }
  .tr-head-role { max-width: none }
  .tr-cmp-row { grid-template-columns: 1fr; gap: 4px }
  .tr-cmp-row.tr-cmp-head { display: none }
  .tr-cmp-mark { justify-self: start }
}
.report-pre {
  background: var(--bg); border: 1px solid var(--bdr); border-radius: 8px;
  padding: 16px; font-family: var(--mono); font-size: 14.5px; line-height: 1.8;
  color: var(--t2); white-space: pre-wrap; max-height: 500px; overflow-y: auto;
}
.wait-state {
  padding: 24px; text-align: center; font-size: 15.5px; color: var(--t3);
  border: 1.5px dashed var(--bdr); border-radius: 10px;
}
.err-block {
  background: var(--bad-d); border: 1px solid var(--bad-b); border-radius: 8px;
  padding: 12px 14px; font-size: 15.5px; color: var(--bad);
}

/* ── ONBOARDING ── */
.onboard-wrap {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 48px 24px; background: var(--bg); overflow-y: auto;
}
.ob-card {
  width: 100%; max-width: 540px; background: var(--surface);
  border: 1px solid var(--bdr2); border-radius: 18px; padding: 36px;
  box-shadow: 0 24px 64px rgba(0,0,0,.5);
}
.ob-eyebrow {
  font-size: 13px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
  color: var(--accent-h); font-family: var(--mono); margin-bottom: 14px;
}
.ob-h1 {
  font-family: var(--serif); font-size: 34px; color: var(--t1);
  letter-spacing: -.03em; margin-bottom: 10px; line-height: 1.2;
}
.ob-h1 em { color: var(--accent-h); font-style: italic }
.ob-sub { font-size: 16.5px; color: var(--t2); line-height: 1.6; margin-bottom: 24px }
.ob-tab-row { display: flex; gap: 4px; margin-bottom: 14px }
.ob-tab {
  flex: 1; padding: 8px; border-radius: 8px; border: 1px solid var(--bdr);
  background: var(--bg-2); color: var(--t3); font-size: 15.5px; font-weight: 500;
  cursor: pointer; transition: all .12s;
}
.ob-tab.active, .ob-tab:hover { background: var(--bg-3); color: var(--t1); border-color: var(--bdr2) }
.ob-area {
  width: 100%; min-height: 220px; resize: vertical;
  padding: 16px; border-radius: 10px; border: 1px solid var(--bdr);
  background: var(--bg-2); color: var(--t1); font-family: var(--mono);
  font-size: 15px; line-height: 1.75; outline: none; margin-bottom: 14px; display: block;
  transition: border-color .15s;
}
.ob-area:focus { border-color: var(--accent) }
.ob-drop {
  border: 1.5px dashed var(--bdr2); border-radius: 12px; padding: 28px;
  text-align: center; cursor: pointer; transition: all .15s; margin-bottom: 14px;
}
.ob-drop:hover, .ob-drop.drag { border-color: var(--accent); background: var(--accent-d) }
.ob-cta {
  width: 100%; padding: 13px; border-radius: 10px; border: none;
  background: var(--accent); color: #fff; font-size: 17px; font-weight: 600;
  cursor: pointer; transition: all .15s; display: flex; align-items: center;
  justify-content: center; gap: 8px; margin-bottom: 10px;
}
.ob-cta:hover { background: var(--accent-h); transform: translateY(-1px); box-shadow: 0 10px 28px rgba(124,92,255,.55), 0 0 0 1px rgba(34,229,255,.28) }
.ob-cta:disabled { opacity: .55; cursor: not-allowed; transform: none }
.ob-demo {
  width: 100%; padding: 8px; background: none; border: none;
  font-size: 15.5px; color: var(--t3); cursor: pointer; transition: color .12s; text-align: center;
}
.ob-demo:hover { color: var(--t2) }

/* ── DASHBOARD ── */
.dash-hero {
  background: linear-gradient(135deg, var(--accent-d), var(--bg-1));
  border: 1px solid var(--accent-b); border-radius: 16px;
  padding: 32px; margin-bottom: 8px;
}
.dash-hero-h { font-family: var(--serif); font-size: 27px; color: var(--t1); margin-bottom: 8px; letter-spacing: -.03em }
.dash-hero-p { font-size: 16.5px; color: var(--t2); line-height: 1.6; margin-bottom: 20px }
.dash-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px }
.dash-card {
  background: var(--surface); border: 1px solid var(--bdr); border-radius: 12px; padding: 18px 20px;
}
.dash-h { display: flex; align-items: center; gap: 7px; font-size: 14px; color: var(--t3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px }
.dash-n { font-family: var(--mono); font-size: 32px; font-weight: 700; color: var(--t1); letter-spacing: -.04em }
.dash-sub { font-size: 14px; color: var(--t3); margin-top: 3px }

/* ── JOB CARDS ── */
.job-list { display: flex; flex-direction: column; gap: 10px }
.job-card {
  background: var(--surface); border: 1px solid var(--bdr); border-radius: 14px;
  overflow: hidden; transition: border-color .15s, box-shadow .15s;
}
.job-card:hover { border-color: var(--bdr2); box-shadow: 0 4px 20px rgba(0,0,0,.2) }
.job-card.score-high { border-left: 3px solid var(--good) }
.job-card.score-mid  { border-left: 3px solid var(--accent-h) }
.job-card.score-low  { border-left: 3px solid var(--t4) }
.job-card-inner { display: flex; align-items: stretch }
.job-body { flex: 1; padding: 16px; min-width: 0 }
.job-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px }
.co-logo {
  width: 38px; height: 38px; border-radius: 9px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 16.5px; font-weight: 700; color: #fff;
}
.co-logo.v1 { background: linear-gradient(135deg,#7c5cff,#22e5ff) }
.co-logo.v2 { background: linear-gradient(135deg,#0ea5e9,#06b6d4) }
.co-logo.v3 { background: linear-gradient(135deg,#f97316,#ef4444) }
.co-logo.v4 { background: linear-gradient(135deg,#14b8a6,#4ade80) }
.co-logo.v5 { background: linear-gradient(135deg,#a855f7,#ec4899) }
.co-logo.logo-img {
  background: #fff; padding: 4px;
  box-shadow: 0 1px 0 rgba(255,255,255,.06) inset, 0 2px 6px rgba(0,0,0,.25);
  overflow: hidden;
}
.co-logo.logo-img img {
  width: 100%; height: 100%; object-fit: contain; display: block; border-radius: 4px;
}
.co-logo.logo-img.mq-logo { padding: 3px }
.job-header-text { flex: 1; min-width: 0 }
.job-posted { font-size: 14px; color: var(--t4); margin-bottom: 3px }
.job-title { font-size: 17px; font-weight: 600; color: var(--t1); letter-spacing: -.01em; line-height: 1.3 }
.job-title:hover { color: var(--accent-h) }
.job-company { display: flex; align-items: center; gap: 5px; font-size: 15px; color: var(--t2); margin-top: 3px }
.job-co-name { color: var(--t2) }
.job-sep { color: var(--t4) }
.job-industry { color: var(--t3) }
.job-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px }
.job-chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 9px; border-radius: 20px; font-size: 14px;
  background: var(--bg-3); border: 1px solid var(--bdr); color: var(--t3);
}
.job-footer { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px }
.job-app-count { font-size: 14px; color: var(--t4); flex-shrink: 0 }
.job-footer-actions { display: flex; align-items: center; flex-wrap: wrap; justify-content: flex-end; gap: 6px; row-gap: 6px }
.job-score-col {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 16px 20px; border-left: 1px solid var(--bdr); flex-shrink: 0; gap: 4px;
}
.score-ring { position: relative; display: flex; align-items: center; justify-content: center }
.score-pct {
  position: absolute; font-family: var(--mono); font-size: 15.5px;
  font-weight: 700; color: var(--t1);
}
.score-label { font-size: 13px; color: var(--t3); font-weight: 500 }
.job-score-col.score-high .score-label { color: var(--good) }
.job-score-col.score-mid  .score-label { color: var(--accent-h) }

/* filters bar */
.filters { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 4px }
.f-chip {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 8px 14px; border-radius: 22px; border: 1px solid var(--bdr);
  background: var(--bg-2); color: var(--t3); font-size: 14.5px; font-weight: 500;
  cursor: pointer; transition: all .12s;
}
.f-chip:hover { border-color: var(--bdr2); color: var(--t2) }
.f-chip.on { background: var(--accent-d); border-color: var(--accent-b); color: var(--accent-h) }
.f-divider { width: 1px; height: 22px; background: var(--bdr); flex-shrink: 0 }
.f-action {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 8px 14px; border-radius: 22px; border: 1px solid var(--bdr);
  font-size: 14.5px; font-weight: 500; cursor: pointer; transition: all .12s;
}
.f-action.secondary { background: none; color: var(--t3) }
.f-action.secondary:hover { color: var(--t2); background: var(--bg-3) }
.f-action.primary { background: var(--accent-d); color: var(--accent-h); border-color: var(--accent-b) }
.filter-dropdown {
  position: absolute; top: calc(100% + 6px); left: 0; z-index: 50;
  background: var(--surface); border: 1px solid var(--bdr2); border-radius: 10px;
  padding: 4px; min-width: 160px; box-shadow: 0 8px 24px rgba(0,0,0,.4);
}
.f-opt-head { font-size: 13px; font-weight: 600; color: var(--t3); text-transform: uppercase; letter-spacing: .07em; padding: 6px 10px 4px }
.f-opt {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; padding: 7px 10px; border-radius: 7px; border: none; background: none;
  font-size: 15.5px; color: var(--t2); cursor: pointer; transition: all .1s;
}
.f-opt:hover { background: var(--bg-3); color: var(--t1) }
.f-opt.active { color: var(--accent-h) }

/* ── FilterDropdown (real, searchable) ── */
.fd-wrap { position: relative; display: inline-flex }
.fd-trigger.f-chip { gap: 6px; padding: 5px 9px 5px 11px; transition: all .15s; user-select: none }
.fd-trigger.f-chip.open {
  background: var(--bg-3); border-color: var(--bdr2); color: var(--t1);
  box-shadow: 0 0 0 3px rgba(94,106,210,.08);
}
.fd-trigger-lbl { max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
.fd-trigger.f-chip.on .fd-trigger-lbl { font-weight: 600 }
.fd-clear-x {
  display: inline-flex; align-items: center; justify-content: center;
  width: 14px; height: 14px; border-radius: 50%;
  background: rgba(123,132,232,.18); color: var(--accent-h);
  margin-left: 2px; transition: background .12s;
}
.fd-clear-x:hover { background: rgba(248,113,113,.25); color: var(--bad) }

.fd-pop {
  position: absolute; top: calc(100% + 6px); z-index: 80;
  background: var(--surface); border: 1px solid var(--bdr2); border-radius: 12px;
  padding: 6px; width: 256px;
  box-shadow: 0 12px 32px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.02) inset;
  animation: fd-in .16s cubic-bezier(.16,1,.3,1);
  display: flex; flex-direction: column; gap: 4px;
}
.fd-left  { left: 0 }
.fd-right { right: 0 }
@keyframes fd-in { from { opacity: 0; transform: translateY(-4px) scale(.97) } to { opacity: 1; transform: none } }

.fd-search {
  display: flex; align-items: center; gap: 7px;
  padding: 6px 10px; border-radius: 8px;
  background: var(--bg-2); border: 1px solid var(--bdr);
  margin-bottom: 2px;
}
.fd-search:focus-within { border-color: var(--accent-b); background: var(--bg-3) }
.fd-search input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--t1); font-size: 15px;
}
.fd-search input::placeholder { color: var(--t4) }
.fd-search-x {
  display: inline-flex; align-items: center; justify-content: center;
  width: 16px; height: 16px; border-radius: 50%; border: none;
  background: rgba(255,255,255,.06); color: var(--t3); cursor: pointer;
}
.fd-search-x:hover { background: rgba(255,255,255,.12); color: var(--t1) }

.fd-list {
  display: flex; flex-direction: column; gap: 1px;
  max-height: 280px; overflow-y: auto;
  padding: 2px 0;
}
.fd-list::-webkit-scrollbar { width: 5px }
.fd-list::-webkit-scrollbar-thumb { background: var(--bdr2); border-radius: 3px }

.fd-opt {
  display: flex; align-items: center; gap: 8px;
