<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Jobs AI — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.454.0/dist/umd/lucide.min.js" crossorigin="anonymous"></script>
<style>
/* ── TOKENS ── */
:root {
  /* deep ink stage so the accents read as electric */
  --bg:       #07070e;
  --bg-1:     #0e0e1c;
  --bg-2:     #161628;
  --bg-3:     #212138;
  --surface:  #1f1f33;
  --sur2:     #2b2b48;

  /* assertive separators — cards now feel discrete */
  --bdr:      rgba(255,255,255,.11);
  --bdr2:     rgba(255,255,255,.22);

  /* high-contrast text ladder; t2/t3 no longer wash out */
  /* Text tones — bumped lighter so secondary/tertiary copy reads cleanly
     against the near-black background.  Old values (#b9bee0 / #8186ad /
     #50547a) made t3 hints feel muted and t4 microcopy fail WCAG AA;
     these brighten the ladder without losing the brand's lavender tint.
     t1 stays near-white so the relative hierarchy is preserved. */
  --t1:       #fafbff;
  --t2:       #dadef0;
  --t3:       #b1b6d4;
  --t4:       #8084a8;

  /* primary: electric violet */
  --accent:   #7c5cff;
  --accent-h: #a78bff;
  --accent-d: rgba(124,92,255,.18);
  --accent-b: rgba(124,92,255,.45);

  /* secondary pop: neon cyan — used in highlights and gradient sweeps */
  --accent2:   #22e5ff;
  --accent2-d: rgba(34,229,255,.14);
  --accent2-b: rgba(34,229,255,.42);

  /* tertiary kicker: hot magenta for streaks/badges */
  --accent3:   #ff3d9a;
  --accent3-d: rgba(255,61,154,.14);
  --accent3-b: rgba(255,61,154,.42);

  /* status: saturated, semantic, awake */
  --good:     #3dff9a;
  --good-d:   rgba(61,255,154,.14);
  --good-b:   rgba(61,255,154,.36);
  --warn:     #ffd23d;
  --warn-d:   rgba(255,210,61,.14);
  --warn-b:   rgba(255,210,61,.36);
  --bad:      #ff4d6d;
  --bad-d:    rgba(255,77,109,.14);
  --bad-b:    rgba(255,77,109,.38);

  /* electric halo applied to primary CTAs and active rings */
  --glow:     0 0 0 1px rgba(124,92,255,.55), 0 12px 28px -10px rgba(124,92,255,.65);
  --glow-cy:  0 0 0 1px rgba(34,229,255,.5), 0 10px 26px -10px rgba(34,229,255,.55);

  --mono:     'JetBrains Mono', monospace;
  --sans:     'Inter', system-ui, -apple-system, sans-serif;
  /* Headlines used to be Literata italic; user found that hard to read so
     the "serif" token now resolves to Inter and italic is normalised
     globally below. The variable name is preserved so existing selectors
     don't need to be rewired. */
  --serif:    'Inter', system-ui, -apple-system, sans-serif;
  --rail-w:   210px;
}

/* Light theme overrides — applied when <html data-theme="light"> */
:root[data-theme="light"] {
  --bg:       #f3f4fc;
  --bg-1:     #ffffff;
  --bg-2:     #eaecf7;
  --bg-3:     #dbdef0;
  --surface:  #ffffff;
  --sur2:     #f1f2fb;
  --bdr:      rgba(20,20,40,.13);
  --bdr2:     rgba(20,20,40,.24);
  --t1:       #0a0b1d;
  --t2:       #3a3d5b;
  --t3:       #6c708e;
  --t4:       #9ea2bd;
  --accent:   #6a3dff;
  --accent-h: #4a1cdc;
  --accent-d: rgba(106,61,255,.12);
  --accent-b: rgba(106,61,255,.42);
  --accent2:   #00b8d4;
  --accent2-d: rgba(0,184,212,.12);
  --accent2-b: rgba(0,184,212,.40);
  --accent3:   #e02e8a;
  --accent3-d: rgba(224,46,138,.12);
  --accent3-b: rgba(224,46,138,.40);
  --good:     #0fb86b;
  --good-d:   rgba(15,184,107,.12);
  --good-b:   rgba(15,184,107,.36);
  --warn:     #c98700;
  --warn-d:   rgba(201,135,0,.12);
  --warn-b:   rgba(201,135,0,.36);
  --bad:      #d63152;
  --bad-d:    rgba(214,49,82,.12);
  --bad-b:    rgba(214,49,82,.38);
  --glow:     0 0 0 1px rgba(106,61,255,.40), 0 10px 24px -10px rgba(106,61,255,.45);
  --glow-cy:  0 0 0 1px rgba(0,184,212,.40), 0 10px 24px -10px rgba(0,184,212,.45);
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0 }
html { scroll-behavior:smooth; font-size:16px }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--t1);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  font-size: 15.5px;
  line-height: 1.55;
  letter-spacing: -0.005em;     /* Inter reads cleaner with a hair of negative tracking */
  font-feature-settings: "ss01", "ss02", "cv11";  /* friendlier 'a' / 'g' / numbers */
  overflow: hidden;
  height: 100vh;
}
/* Per the user: solid letters, never cursive. Browser defaults italicise
   <em>, <i>, <cite>, <var>, <address>, <dfn> — neutralise globally so a
   stray Markdown emphasis or unstyled tag can't sneak a slant in. Specific
   rules can still set their own font-style when needed. */
em, i, cite, var, address, dfn { font-style: normal }
::-webkit-scrollbar { width:5px; height:5px }
::-webkit-scrollbar-track { background:transparent }
::-webkit-scrollbar-thumb { background:var(--bdr2); border-radius:3px }
a { color:var(--accent-h); text-decoration:none }
a:hover { text-decoration:underline }
button { font-family:var(--sans); cursor:pointer }
input, select, textarea { font-family:var(--sans) }

/* ── ICON HELPER ── */
.ic { display:inline-flex; align-items:center; justify-content:center; flex-shrink:0 }

/* ── ANIMATIONS ── */
@keyframes sp { to { transform:rotate(360deg) } }
@keyframes fade-in-up { from { opacity:0; transform:translateY(8px) } to { opacity:1; transform:none } }
@keyframes lsweep { 0% { transform:translateX(-100%) } 100% { transform:translateX(200%) } }
@keyframes promo-in { from { opacity:0 } to { opacity:1 } }

.spin { width:13px; height:13px; border:2px solid rgba(255,255,255,.2); border-top-color:currentColor; border-radius:50%; animation:sp .6s linear infinite; display:inline-block; flex-shrink:0 }
.fade-in { animation:fade-in-up .25s cubic-bezier(.16,1,.3,1) }

/* ── SHELL GRID ── */
.shell {
  display: grid;
  grid-template-areas: "brand promo" "rail main";
  grid-template-columns: var(--rail-w) 1fr;
  grid-template-rows: 48px 1fr;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
}

/* ── BRAND CELL ── */
.brand-cell {
  grid-area: brand;
  background: var(--bg-1);
  border-right: 1px solid var(--bdr);
  border-bottom: 1px solid var(--bdr);
  display: flex;
  align-items: center;
  padding: 0 14px;
}
.brand-mark {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  user-select: none;
}
.brand-glyph {
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 4px 12px -4px rgba(124,92,255,.55);
}
.brand-name {
  font-family: var(--serif);
  font-size: 21px;
  color: var(--t1);
  letter-spacing: -.3px;
  line-height: 1;
}
.brand-name em { color: var(--accent-h); font-style: normal; }

/* ── PROMO STRIP ── */
.promo-cell {
  grid-area: promo;
  background: var(--accent-d);
  border-bottom: 1px solid var(--accent-b);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  font-size: 14.5px;
  color: var(--t2);
  padding: 0 14px;
  animation: promo-in .3s ease;
}
.promo-cell strong { color: var(--t1) }
.promo-close {
  background: none; border: none; color: var(--t3);
  display: flex; align-items: center; cursor: pointer;
  padding: 2px; border-radius: 4px; transition: color .12s;
  margin-left: 8px;
}
.promo-close:hover { color: var(--t1) }

/* ── RAIL ── */
.rail {
  grid-area: rail;
  background: var(--bg-1);
  border-right: 1px solid var(--bdr);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 8px 0;
}
.rail-nav { flex: 1; display: flex; flex-direction: column; gap: 1px; padding: 0 8px }
.rail-bottom { display: flex; flex-direction: column; gap: 1px; padding: 0 8px 4px; border-top: 1px solid var(--bdr); padding-top: 8px; margin-top: 4px }
.rail-item {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 10px 13px;
  border-radius: 9px;
  cursor: pointer;
  color: var(--t3);
  font-size: 15.5px;
  font-weight: 500;
  transition: background .12s, color .12s;
  position: relative;
  user-select: none;
}
.rail-icon { width: 18px; height: 18px; }
.rail-item:hover { background: var(--bg-3); color: var(--t2) }
.rail-item.active { background: var(--accent-d); color: var(--accent-h) }
.rail-icon { width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0 }
.lbl { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis }
.rail-count {
  font-size: 13px; font-weight: 600; font-family: var(--mono);
  background: var(--bg-3); color: var(--t3); padding: 1px 5px; border-radius: 4px;
}
.rail-badge {
  font-size: 13px; font-weight: 600;
  background: var(--accent-d); color: var(--accent-h); padding: 1px 6px; border-radius: 10px;
}

/* ── MAIN ── */
.main { grid-area: main; overflow: hidden; display: flex; flex-direction: column }

/* ── PAGE HEAD ── */
.page-head {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 28px;
  height: 64px;
  border-bottom: 1px solid var(--bdr);
  background: var(--bg-1);
  flex-shrink: 0;
}
.page-title { font-size: 13px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--t3); font-family: var(--mono) }
.page-title-big { font-size: 22px; font-weight: 700; color: var(--t1); letter-spacing: -.02em; font-family: var(--serif); line-height: 1 }
.page-tab-sep { color: var(--t4); font-size: 22px }
.page-tabs { display: flex; gap: 4px }
.page-tab {
  display: flex; align-items: center; gap: 7px;
  padding: 8px 13px; border-radius: 8px; border: none; background: none;
  font-size: 15.5px; font-weight: 500; color: var(--t3); cursor: pointer; transition: all .12s;
}
.page-tab:hover { color: var(--t2); background: var(--bg-3) }
.page-tab.active { color: var(--t1); background: var(--bg-3) }
.tab-count { font-size: 13px; font-family: var(--mono); background: var(--bg-2); color: var(--t3); padding: 1px 5px; border-radius: 4px }
.head-spacer { flex: 1 }

/* ────────────────────────────────────────────────────────────
   AUTO-SAVE BADGE — Profile page
   Compact inline status that replaces the manual "Save profile"
   button. Five visual states (idle / pending / saving / saved /
   error), each with its own accent color and motion treatment.
   Sits in the page-head row next to the page title, so the user
   sees the persistence state without breaking gaze from the form.
   ──────────────────────────────────────────────────────────── */
.auto-save {
  display: inline-flex; align-items: center; gap: 7px;
  margin-left: 14px;
  padding: 4px 11px;
  border-radius: 999px;
  border: 1px solid var(--bdr);
  background: var(--bg-2);
  font-family: var(--mono); font-size: 11.5px; font-weight: 600;
  letter-spacing: .04em;
  color: var(--t3);
  white-space: nowrap;
  transition: color .15s, background .15s, border-color .15s;
}
.auto-save > svg { flex-shrink: 0 }
/* Reset native button look when badge is interactive (error → retry) */
button.auto-save { cursor: pointer; font: inherit; }

/* Idle — minimal, just enough to remind the user autosave is on */
.auto-save-idle { color: var(--t4) }
.auto-save-glyph {
  position: relative;
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--t4);
}
.auto-save-glyph::after {
  content: ''; position: absolute; inset: -3px;
  border-radius: 50%; border: 1px solid var(--t4); opacity: .35;
}

/* Pending — amber breathing dot says "we're going to save very soon" */
.auto-save-pending {
  color: #f5c463;
  background: rgba(245,196,99,.06);
  border-color: rgba(245,196,99,.22);
}
.auto-save-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #f5c463;
  box-shadow: 0 0 0 0 rgba(245,196,99,.55);
  animation: auto-save-pulse 1.2s ease-out infinite;
}
@keyframes auto-save-pulse {
  0%   { box-shadow: 0 0 0 0 rgba(245,196,99,.55) }
  70%  { box-shadow: 0 0 0 6px rgba(245,196,99,0) }
  100% { box-shadow: 0 0 0 0 rgba(245,196,99,0) }
}

/* Saving — spinner with cyan accent, the "doing it right now" state */
.auto-save-saving {
  color: var(--accent2);
  background: var(--accent2-d, rgba(34,229,255,.08));
  border-color: var(--accent2-b, rgba(34,229,255,.32));
}

/* Saved — green check, fades back to idle after ~1.8s */
.auto-save-saved {
  color: var(--good);
  background: rgba(61,255,154,.06);
  border-color: rgba(61,255,154,.30);
  animation: auto-save-saved-in .25s cubic-bezier(.22,1,.36,1) both;
}
@keyframes auto-save-saved-in {
  from { opacity: 0; transform: translateY(-3px) scale(.96) }
  to   { opacity: 1; transform: none }
}
.auto-save-saved svg { color: var(--good) }

/* Error — clickable to retry */
.auto-save-error {
  color: #ff8094;
  background: rgba(255, 90, 110, .07);
  border-color: rgba(255, 90, 110, .30);
}
.auto-save-error:hover {
  color: #ffb1bd;
  background: rgba(255, 90, 110, .12);
  border-color: rgba(255, 90, 110, .50);
}
.auto-save-error svg { color: #ff8094 }

/* Light theme — the badge stays legible on light backgrounds */
:root[data-theme="light"] .auto-save-idle    { background: rgba(20,20,40,.04) }
:root[data-theme="light"] .auto-save-pending { background: rgba(201,135,0,.07); color: #b87600 }
:root[data-theme="light"] .auto-save-pending .auto-save-dot { background: #c98700 }
:root[data-theme="light"] .auto-save-saved   { background: rgba(15,184,107,.08); color: #0fb86b }
:root[data-theme="light"] .auto-save-saved svg { color: #0fb86b }
.head-search {
  display: flex; align-items: center; gap: 9px;
  background: var(--bg-2); border: 1px solid var(--bdr); border-radius: 9px;
  padding: 8px 13px; width: 260px;
}
.head-search input { background: none; border: none; outline: none; color: var(--t1); font-size: 15.5px; width: 100%; font-family: var(--sans) }
.head-search input::placeholder { color: var(--t4) }
.head-cta {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 18px; border-radius: 9px; border: none;
  background: var(--accent); color: #fff; font-size: 15.5px; font-weight: 600;
  cursor: pointer; transition: all .15s; white-space: nowrap;
  box-shadow: 0 4px 14px -6px rgba(124,92,255,.55);
  letter-spacing: -.005em;
}
.head-cta:hover { background: var(--accent-h); transform: translateY(-1px); box-shadow: 0 8px 20px -6px rgba(124,92,255,.7), 0 0 0 1px rgba(34,229,255,.25) }
.head-cta:disabled { opacity: .5; cursor: not-allowed; transform: none }

/* Refresh confirmation pill — appears for ~3.5s after a refresh completes
   so the user has a concrete signal that the click did something even when
   no new rows came back. Two flavors: 'new' (cyan, "+N new") and 'ok'
   (muted, "Up to date"). Slides in from the left of the button. */
.refresh-toast {
  display: inline-flex; align-items: center; gap: 6px;
  margin-left: 10px;
  padding: 6px 10px;
  border-radius: 999px;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: .02em;
  white-space: nowrap;
  animation: refresh-toast-in .35s cubic-bezier(.22,1,.36,1);
  pointer-events: none;
}
.refresh-toast.new {
  color: var(--accent2);
  background: var(--accent2-d);
  border: 1px solid var(--accent2-b);
  box-shadow: 0 0 0 1px rgba(34,229,255,.15), 0 4px 14px -4px rgba(34,229,255,.35);
}
.refresh-toast.ok {
  color: var(--good);
  background: var(--good-d);
  border: 1px solid var(--good-b);
}
@keyframes refresh-toast-in {
  from { opacity: 0; transform: translateX(-6px) scale(.95); }
  to   { opacity: 1; transform: none; }
}

/* ── PAGE BODY ── */
.page-body {
  flex: 1; overflow: hidden;
  display: grid; grid-template-columns: 1fr 320px; gap: 28px;
  padding: 28px; overflow-y: auto;
}
.page-body.solo { display: flex; flex-direction: column; gap: 22px }
.col-main { min-width: 0; display: flex; flex-direction: column; gap: 18px }
.col-rail { display: flex; flex-direction: column; gap: 16px }

/* ── BUTTONS ── */
.btn-primary {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 16px; border-radius: 9px; border: 1px solid var(--accent);
  background: var(--accent); color: #fff; font-size: 15.5px; font-weight: 600;
  cursor: pointer; transition: all .12s; white-space: nowrap;
  letter-spacing: -.005em;
}
.btn-primary:hover { background: var(--accent-h); border-color: var(--accent-h) }
.btn-primary:disabled { opacity: .45; cursor: not-allowed }
.btn-ghost {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 15px; border-radius: 9px; border: 1px solid var(--bdr);
  background: transparent; color: var(--t2); font-size: 15.5px; font-weight: 500;
  cursor: pointer; transition: all .12s; white-space: nowrap;
}
.btn-ghost:hover { background: var(--bg-3); color: var(--t1); border-color: var(--bdr2) }
.btn-ghost:disabled { opacity: .4; cursor: not-allowed }
.icon-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--bdr);
  background: transparent; color: var(--t3); cursor: pointer; transition: all .12s; flex-shrink: 0;
}
.icon-btn:hover { background: var(--bg-3); color: var(--t1); border-color: var(--bdr2) }
.icon-btn.active { color: var(--accent-h); background: var(--accent-d); border-color: var(--accent-b) }
.lp-btn-p {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 8px 18px; border-radius: 9px; border: none;
  background: var(--accent); color: #fff; font-size: 16.5px; font-weight: 600;
  cursor: pointer; transition: all .15s;
}
.lp-btn-p:hover { background: var(--accent-h); transform: translateY(-1px); box-shadow: 0 6px 22px rgba(124,92,255,.55), 0 0 0 1px rgba(34,229,255,.25) }
.lp-btn-p:disabled { opacity: .5; cursor: not-allowed; transform: none }

/* ── BADGES ── */
.badge { font-size: 13px; font-weight: 600; padding: 2px 7px; border-radius: 4px; font-family: var(--mono) }
.b-accent { background: var(--accent-d); color: var(--accent-h) }
.b-good { background: var(--good-d); color: var(--good) }

/* ── NOTICE STRIP ── */
.notice-strip {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px; border-radius: 10px;
  background: var(--accent-d); border: 1px solid var(--accent-b);
  font-size: 15px; color: var(--t2); margin-bottom: 4px; line-height: 1.5;
}

/* ── DATA CARD ── */
.data-card {
  background: var(--surface); border: 1px solid var(--bdr); border-radius: 12px; overflow: hidden;
}
.dt-head {
  display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 48px;
  padding: 12px 22px; background: var(--bg-2);
  font-size: 12.5px; font-weight: 600; color: var(--t3);
  text-transform: uppercase; letter-spacing: .08em; font-family: var(--mono);
  border-bottom: 1px solid var(--bdr);
}
.dt-row {
  display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 48px;
  padding: 16px 22px; align-items: center;
  border-bottom: 1px solid var(--bdr); font-size: 15.5px;
  transition: background .1s;
}
.dt-row:last-child { border-bottom: none }
.dt-row:hover { background: var(--bg-2) }
.dt-name { display: flex; align-items: center; gap: 11px; min-width: 0 }
.dt-icon {
  width: 36px; height: 36px; border-radius: 8px; background: var(--accent-d);
  color: var(--accent-h); display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700; flex-shrink: 0;
}
.dt-name span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
.dt-empty { padding: 36px; text-align: center; color: var(--t3); font-size: 15.5px }

/* ── PROFILE TABS ── */
.prof-tabs { display: flex; gap: 4px }
.prof-tab {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px; border-radius: 9px; border: none; background: none;
  font-size: 15.5px; font-weight: 500; color: var(--t3); cursor: pointer; transition: all .12s;
}
.prof-tab:hover { color: var(--t2); background: var(--bg-3) }
.prof-tab.active { color: var(--t1); background: var(--bg-3) }
.prof-nav-tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--bdr); padding: 0 2px }
.prof-nav-tab {
  padding: 10px 16px; border: none; background: none;
  font-size: 15.5px; font-weight: 500; color: var(--t3); cursor: pointer; transition: all .12s;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
}
.prof-nav-tab:hover { color: var(--t2) }
.prof-nav-tab.active { color: var(--t1); border-bottom-color: var(--accent) }

/* ── ACTION MENU ── */
.action-menu-wrap { position: relative }
/* Menu uses position: fixed via inline styles from React (top/right computed
   from the trigger's rect) so it cannot be clipped by ancestor overflow. */
.action-menu {
  z-index: 1000;
  background: var(--surface); border: 1px solid var(--bdr2); border-radius: 10px;
  padding: 4px; min-width: 180px; box-shadow: 0 12px 32px rgba(0,0,0,.5);
}
.menu-item {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 7px 10px; border-radius: 7px; border: none; background: none;
  font-size: 15.5px; color: var(--t2); cursor: pointer; transition: all .1s; text-align: left;
}
.menu-item:hover { background: var(--bg-3); color: var(--t1) }
.menu-item.danger { color: var(--bad) }
.menu-item.danger:hover { background: var(--bad-d) }

/* ── SETTINGS ── */
.settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px }
@media (max-width: 900px) { .settings-grid { grid-template-columns: 1fr } }
.set-sec { display: flex; flex-direction: column; gap: 12px }
.set-sec-h {
  display: flex; align-items: center; gap: 7px;
  font-size: 14px; font-weight: 600; color: var(--t3);
  text-transform: uppercase; letter-spacing: .07em; font-family: var(--mono);
  padding-bottom: 8px; border-bottom: 1px solid var(--bdr);
}
.set-field { display: flex; flex-direction: column; gap: 5px }
.set-label { font-size: 14.5px; font-weight: 500; color: var(--t2) }
.set-helper { font-size: 14px; color: var(--t3); line-height: 1.5 }

/* ── Ollama server-side status banner ─────────────────────────────────── */
.ollama-banner {
  display: flex; flex-direction: column; gap: 8px;
  padding: 10px 12px; margin-bottom: 8px;
  border-radius: 9px; border: 1px solid var(--bdr);
  background: var(--bg-2);
  font-family: var(--mono); font-size: 11px;
  transition: border-color .2s, background .2s;
}
.ollama-banner.ob-loading { border-color: var(--bdr2) }
.ollama-banner.ob-down    { border-color: var(--bad-b);    background: var(--bad-d) }
.ollama-banner.ob-missing { border-color: var(--warn-b);   background: var(--warn-d) }
.ollama-banner.ob-pulling { border-color: var(--accent-b); background: var(--accent-d) }
.ollama-banner.ob-ok      { border-color: var(--good-b);   background: var(--good-d) }

.ob-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap }
.ob-tag {
  font-family: var(--mono); font-size: 9.5px; letter-spacing: .22em;
  font-weight: 700; padding: 2px 8px; border-radius: 4px;
  background: rgba(255,255,255,.06); color: var(--t1);
  border: 1px solid var(--bdr2);
}
.ob-host {
  font-family: var(--mono); font-size: 11px; color: var(--t2);
  background: rgba(0,0,0,.18); padding: 2px 7px; border-radius: 4px;
}
.ob-state {
  margin-left: auto;
  font-family: var(--mono); font-size: 10px; letter-spacing: .18em;
  font-weight: 700; text-transform: uppercase;
  display: inline-flex; align-items: center; gap: 6px;
}
.ob-down    .ob-state { color: var(--bad)      }
.ob-missing .ob-state { color: var(--warn)     }
.ob-pulling .ob-state { color: var(--accent-h) }
.ob-ok      .ob-state { color: var(--good)     }
.ob-loading .ob-state { color: var(--t3)       }

.ob-progress {
  display: flex; flex-direction: column; gap: 5px;
  background: rgba(0,0,0,.22); border-radius: 6px;
  padding: 7px 9px;
}
.ob-progress-bar {
  height: 4px; border-radius: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent-h));
  transition: width .25s ease;
  position: relative; overflow: hidden;
}
.ob-progress-bar::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.3), transparent);
  animation: ob-shimmer 1.4s linear infinite;
}
@keyframes ob-shimmer {
  0%   { transform: translateX(-100%) }
  100% { transform: translateX(100%) }
}
.ob-progress-stage {
  font-family: var(--mono); font-size: 10.5px; color: var(--t2);
  letter-spacing: .04em;
}
.ob-progress-stage code {
  color: var(--accent-h); background: none; padding: 0; font-family: var(--mono);
}
.ob-help {
  font-family: var(--sans); font-size: 12px; line-height: 1.5;
  color: var(--t2);
}
.ob-help code {
  font-family: var(--mono); font-size: 11px;
  background: rgba(0,0,0,.22); padding: 1px 6px; border-radius: 3px;
  color: var(--t1);
}

/* ── RESUME ANALYSIS — hero, metric tiles, insight rows ── */
.rs-analysis { display: flex; flex-direction: column; gap: 22px }
.rs-hero {
  display: flex; align-items: center; gap: 28px;
  padding: 22px 26px;
  background: linear-gradient(135deg, var(--bg-2) 0%, var(--surface) 100%);
  border: 1px solid var(--bdr);
  border-radius: 14px;
  position: relative; overflow: hidden;
}
.rs-hero::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(circle at 0% 50%, var(--accent-d) 0%, transparent 55%);
  opacity: .55;
}
.rs-hero-ring { position: relative; flex-shrink: 0; z-index: 1 }
.rs-hero-num {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.rs-hero-text { display: flex; flex-direction: column; gap: 6px; z-index: 1; min-width: 0 }
.rs-hero-rating {
  font-family: var(--serif); font-size: 32px; line-height: 1.1; letter-spacing: -.5px;
}
.rs-hero-tag { font-size: 15.5px; color: var(--t2); line-height: 1.5; max-width: 460px }
.rs-verify {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 14px; font-family: var(--mono); padding: 4px 10px;
  border-radius: 999px; width: fit-content; margin-top: 4px;
  border: 1px solid var(--bdr2);
}
.rs-verify.ok    { color: var(--good); background: var(--good-d); border-color: var(--good-b) }
.rs-verify.warn  { color: var(--warn); background: var(--warn-d); border-color: var(--warn-b) }
.rs-verify.info  { color: var(--t2);    background: var(--bg-3);   border-color: var(--bdr2) }
.rs-verify code  { font-family: var(--mono); font-size: 14px; padding: 0 4px;
                   background: rgba(255,255,255,.06); border-radius: 4px; margin-left: 2px; }
.rs-verify-notes { font-size: 14px; color: var(--t3); font-style: normal; max-width: 460px; line-height: 1.5 }

.rs-tile-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 10px;
}
.rs-tile {
  padding: 14px 14px 12px; background: var(--surface);
  border: 1px solid var(--bdr); border-radius: 10px;
  display: flex; flex-direction: column; gap: 2px;
  transition: border-color .15s, transform .15s;
}
.rs-tile:hover { border-color: var(--bdr2); transform: translateY(-1px) }
.rs-tile-val  { font-size: 25px; font-weight: 700; line-height: 1; font-family: var(--mono) }
.rs-tile-lbl  { font-size: 14px; color: var(--t2); margin-top: 4px; text-transform: uppercase;
                letter-spacing: .05em; font-weight: 500 }
.rs-tile-hint { font-size: 13px; color: var(--t3); margin-top: 2px; line-height: 1.45 }

.rs-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
}
@media (max-width: 900px) { .rs-grid { grid-template-columns: 1fr } }

.rs-insight {
  display: flex; align-items: flex-start; gap: 9px;
  padding: 9px 12px; border-radius: 8px;
  border: 1px solid; font-size: 15px; line-height: 1.55;
  color: var(--t1);
  margin-top: 8px;
}
.rs-insight:first-of-type { margin-top: 4px }
.rs-insight-icon { display: inline-flex; align-items: center; padding-top: 2px; flex-shrink: 0 }
.rs-insight-text { flex: 1 }

.rs-rerun { display: flex; justify-content: center; margin-top: 4px }

/* ── RESUME PAGE — refined detail area, sub-nav, paginated analysis ── */
.rs-detail-area { margin-top: 28px }

/* "Now viewing" banner */
.rs-viewing {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 16px; margin-bottom: 16px;
  background: linear-gradient(135deg, var(--surface) 0%, var(--bg-2) 100%);
  border: 1px solid var(--bdr); border-radius: 12px;
  position: relative; overflow: hidden;
}
.rs-viewing::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(circle at 0% 50%, var(--accent-d) 0%, transparent 55%);
  opacity: .5;
}
.rs-viewing-icon {
  flex-shrink: 0; width: 40px; height: 40px; border-radius: 10px;
  background: var(--accent-d); border: 1px solid var(--accent-b);
  color: var(--accent-h); font-family: var(--mono); font-size: 18px; font-weight: 600;
  display: inline-flex; align-items: center; justify-content: center;
  z-index: 1;
}
.rs-viewing-meta-col { display: flex; flex-direction: column; gap: 2px; min-width: 0; flex: 1; z-index: 1 }
.rs-viewing-name {
  font-family: var(--serif); font-size: 19px; line-height: 1.15; letter-spacing: -.01em;
  color: var(--t1);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.rs-viewing-meta {
  font-family: var(--mono); font-size: 13px; letter-spacing: .14em;
  text-transform: uppercase; color: var(--t3);
  display: inline-flex; align-items: center; gap: 6px; flex-wrap: wrap;
}
.rs-viewing-dot { color: var(--t4); font-family: var(--sans) }
.rs-viewing-action { z-index: 1; flex-shrink: 0 }

/* Paginated analysis sub-nav (segmented control) */
.rs-subnav-row {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  margin-bottom: 14px;
}
.rs-subnav {
  display: inline-flex; align-items: center; gap: 2px; padding: 4px;
  background: var(--bg-2); border: 1px solid var(--bdr); border-radius: 12px;
  flex-wrap: wrap;
}
.rs-subnav-pill {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 7px 13px; border-radius: 9px; border: none;
  background: transparent; color: var(--t3);
  font-family: var(--sans); font-size: 15px; font-weight: 500;
  letter-spacing: -.005em; cursor: pointer;
  transition: color .15s, background .15s, box-shadow .15s;
}
.rs-subnav-pill:hover { color: var(--t1) }
.rs-subnav-pill.active {
  background: var(--surface); color: var(--t1);
  box-shadow: 0 1px 2px rgba(0,0,0,.18), inset 0 0 0 1px var(--bdr2);
}
.rs-subnav-pill.active .ic { color: var(--accent-h) }
.rs-subnav-step {
  font-family: var(--mono); font-size: 13px; letter-spacing: .22em;
  text-transform: uppercase; color: var(--t3); white-space: nowrap;
}

/* Overview view */
.rs-overview { display: flex; flex-direction: column; gap: 22px }
.rs-overview-top {
  display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1.05fr); gap: 18px;
  align-items: stretch;
}
@media (max-width: 1100px) { .rs-overview-top { grid-template-columns: 1fr } }
.rs-overview-top .rs-hero { height: 100% }

.rs-tldr {
  background: var(--surface); border: 1px solid var(--bdr); border-radius: 14px;
  padding: 22px;
  display: flex; flex-direction: column; gap: 14px;
}
.rs-tldr-h {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: var(--mono); font-size: 13px; letter-spacing: .22em;
  text-transform: uppercase; color: var(--t3); font-weight: 500;
}
.rs-tldr-h::before { content: ''; width: 18px; height: 1px; background: var(--accent-h) }
.rs-tldr-list { display: flex; flex-direction: column; gap: 8px }
.rs-tldr-item {
  display: grid; grid-template-columns: 26px 1fr; gap: 12px; align-items: flex-start;
  padding: 11px 13px; border-radius: 10px;
  background: var(--bg-2); border: 1px solid var(--bdr);
  transition: border-color .15s, transform .15s;
}
.rs-tldr-item:hover { border-color: var(--bdr2); transform: translateX(2px) }
.rs-tldr-num {
  display: inline-flex; align-items: center; justify-content: center;
  width: 24px; height: 24px; border-radius: 7px;
  background: var(--accent-d); color: var(--accent-h);
  border: 1px solid var(--accent-b);
  font-family: var(--mono); font-size: 14px; font-weight: 600;
}
.rs-tldr-num.flag { background: var(--bad-d); color: var(--bad); border-color: var(--bad-b) }
.rs-tldr-text { font-size: 15.5px; color: var(--t1); line-height: 1.55 }
.rs-tldr-empty {
  display: flex; align-items: flex-start; gap: 9px;
  padding: 12px 13px; border-radius: 9px;
  background: var(--good-d); border: 1px solid var(--good-b);
  color: var(--good); font-size: 15px; line-height: 1.55;
}

.rs-keysec { display: flex; flex-direction: column; gap: 10px }
.rs-keystrip {
  display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px;
}
@media (max-width: 700px) { .rs-keystrip { grid-template-columns: repeat(2, 1fr) } }

/* Metrics view (grouped) */
.rs-metric-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px }
.rs-metric-group:last-child { margin-bottom: 0 }
.rs-metric-group-h {
  display: flex; align-items: baseline; gap: 12px;
  padding-bottom: 10px; border-bottom: 1px solid var(--bdr);
  font-family: var(--mono); font-size: 13px; letter-spacing: .22em;
  text-transform: uppercase; color: var(--t2); font-weight: 500;
}
.rs-metric-group-hint {
  margin-left: auto;
  font-family: var(--sans); font-size: 14px; letter-spacing: 0;
  text-transform: none; color: var(--t3); font-weight: 400;
}

/* Insights view (full-width sections) */
.rs-insights-page { display: flex; flex-direction: column; gap: 18px }
.rs-insights-sec {
  background: var(--surface); border: 1px solid var(--bdr);
  border-radius: 14px; padding: 22px 24px;
}
.rs-insights-sec-h {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--mono); font-size: 14px; letter-spacing: .18em;
  text-transform: uppercase; font-weight: 500;
  margin-bottom: 14px; padding-bottom: 14px;
  border-bottom: 1px solid var(--bdr);
}
.rs-insights-sec-h span:not(.rs-insights-sec-count) { color: inherit }
.rs-insights-sec-count {
  margin-left: auto; padding: 2px 9px; border-radius: 999px;
  background: var(--bg-3); color: var(--t3);
  font-family: var(--mono); font-size: 13px; letter-spacing: 0;
  font-weight: 500;
}
.rs-insights-list { display: flex; flex-direction: column; gap: 8px }
.rs-insights-list .rs-insight { margin-top: 0 }

/* ── Deep-dive view — editorial magazine spread ───────────────────────
   Two-column layout: narrative on the left at a readable column width
   (~640-720px) for typographic comfort, supporting metrics + strengths +
   red-flags + actions in a sidecar on the right that fills what was
   previously empty space. Collapses to a single column at <=980px. */
.rs-deep {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.rs-deep-head {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.rs-narrative-sub {
  font-family: var(--mono); font-size: 12.5px; letter-spacing: .22em;
  text-transform: uppercase; color: var(--accent-h);
  display: inline-flex; align-items: center; gap: 10px;
  font-weight: 700;
}
.rs-narrative-sub::before { content: ''; width: 18px; height: 1px; background: var(--accent-h); }
.rs-narrative-h {
  font-family: var(--serif); font-size: 34px; line-height: 1.15;
  letter-spacing: -.025em; color: var(--t1); font-weight: 600;
}
.rs-narrative-h em { color: var(--accent-h); font-style: normal; font-family: var(--serif); }

/* Editorial folio strip — the small "section · author · folio" line that
   sits under a magazine headline. Mirrors that convention with a thin
   accent rule + verification status + score chip. */
.rs-deep-folio {
  display: flex; align-items: center; gap: 14px;
  font-family: var(--mono); font-size: 11.5px; letter-spacing: .14em;
  text-transform: uppercase; color: var(--t3); font-weight: 600;
  flex-wrap: wrap;
  margin-top: 6px;
}
.rs-deep-folio-rule {
  flex: 1; min-width: 60px;
  height: 1px;
  background: linear-gradient(90deg, var(--accent-b), transparent);
  max-width: 220px;
}
.rs-deep-folio-label { letter-spacing: .12em; }
.rs-deep-folio-score {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 11px; letter-spacing: .1em;
  display: inline-flex; align-items: baseline; gap: 2px;
  padding: 4px 10px; border-radius: 999px;
  background: var(--accent-d); border: 1px solid var(--accent-b);
}
.rs-deep-folio-score b {
  color: var(--accent-h); font-size: 14px; letter-spacing: 0;
}
.rs-deep-folio-score i {
  color: var(--t3); font-style: normal; font-size: 11px;
}

/* The two-column grid — narrative left, sidecar right.
   Sidecar at 380px gives multi-word target roles ("Embedded Systems
   Engineer", "Analog / Mixed-Signal Design Engineer") room to live on
   one line and stops the strength/red-flag bullets from wrapping every
   2-3 words. */
.rs-deep-grid {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 380px;
  gap: 32px;
  align-items: start;
}

/* Narrative card — magazine column, drop-cap on first paragraph */
.rs-narrative {
  background: var(--surface);
  border: 1px solid var(--bdr);
  border-radius: 18px;
  padding: 36px 44px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  position: relative;
  overflow: hidden;
}
.rs-narrative::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 80px;
  background: linear-gradient(180deg, var(--accent), transparent);
  opacity: .85;
}
.rs-narrative-p {
  font-size: 16.5px;
  color: var(--t2);
  line-height: 1.8;
  font-family: var(--sans);
  letter-spacing: -.005em;
  margin: 0;
}
.rs-narrative-p.rs-lede::first-letter {
  font-family: var(--serif);
  font-size: 60px;
  float: left;
  line-height: .9;
  padding-right: 12px;
  padding-top: 6px;
  padding-bottom: 2px;
  color: var(--accent-h);
  font-weight: 600;
}

/* Pull quote — magazine-style highlight inline in the narrative */
.rs-narrative-pull {
  position: relative;
  margin: 8px 0 4px;
  padding: 18px 22px 18px 28px;
  background: linear-gradient(135deg, var(--accent-d) 0%, transparent 100%);
  border-left: 3px solid var(--accent);
  border-radius: 0 12px 12px 0;
  font-family: var(--serif);
  font-size: 18.5px;
  line-height: 1.45;
  color: var(--t1);
  font-weight: 500;
  letter-spacing: -.01em;
}
.rs-narrative-pull-mark {
  position: absolute;
  top: -2px; left: 8px;
  font-family: var(--serif);
  font-size: 56px;
  line-height: 1;
  color: var(--accent);
  opacity: .5;
}

/* Empty narrative state — kept inside the same card so the layout doesn't shift */
.rs-narrative-empty {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 18px 0;
}
.rs-narrative-empty-h {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 600;
  color: var(--t1);
  margin-bottom: 4px;
}
.rs-narrative-empty-p {
  font-size: 14.5px;
  color: var(--t3);
  line-height: 1.6;
  max-width: 480px;
}

/* ── Sidecar — magazine "deck" with score tile + lists + action.
   Designed for a 380px column. Tight but never cramped: stats live in a
   2×2 mono grid (no per-stat hint to keep height down), bullet lists run
   13px / 1.5, target roles flow as a vertical chevron list so multi-word
   titles never wrap mid-phrase. */
.rs-deep-aside {
  display: flex;
  flex-direction: column;
  gap: 12px;
  position: sticky;
  top: 20px;
  align-self: start;
  max-height: calc(100vh - 40px);
  overflow-y: auto;
  padding: 4px;       /* lets focus rings breathe at the edge */
  margin: -4px;
  scrollbar-width: thin;
}
.rs-deep-aside::-webkit-scrollbar { width: 4px; }
.rs-deep-aside::-webkit-scrollbar-thumb { background: var(--bdr2); border-radius: 2px; }

.rs-aside-block {
  background: var(--surface);
  border: 1px solid var(--bdr);
  border-radius: 14px;
  padding: 16px 18px;
  display: flex;
  flex-direction: column;
  gap: 11px;
}
.rs-aside-h {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--t3);
  font-weight: 700;
  margin-bottom: 1px;
}
.rs-aside-h::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--bdr);
  margin-left: 4px;
}
.rs-aside-h .ic { color: var(--accent-h); }

/* Score block — anchors the sidecar */
.rs-aside-score {
  background: linear-gradient(135deg, var(--surface) 0%, var(--bg-2) 100%);
  position: relative;
  overflow: hidden;
}
.rs-aside-score::before {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: radial-gradient(circle at 100% 0%, var(--accent-d) 0%, transparent 60%);
}
.rs-aside-score > * { position: relative; }
.rs-aside-score-body {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
}
.rs-aside-score-num {
  font-family: var(--mono);
  font-size: 40px;
  font-weight: 700;
  color: var(--t1);
  line-height: 1;
  letter-spacing: -.025em;
}
.rs-aside-score-num i {
  font-style: normal;
  font-size: 16px;
  color: var(--t4);
  margin-left: 1px;
  font-weight: 600;
}
.rs-aside-score-tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  border-radius: 999px;
  font-family: var(--mono);
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  border: 1px solid;
  white-space: nowrap;
}
.rs-aside-score-tag.ok   { color: var(--good);     background: var(--good-d);   border-color: var(--good-b); }
.rs-aside-score-tag.info { color: var(--accent-h); background: var(--accent-d); border-color: var(--accent-b); }

/* 2×2 stat grid — each cell shows label + big mono value */
.rs-aside-stats {
  list-style: none;
  padding: 0;
  margin: 0;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.rs-aside-stats li {
  background: var(--bg-2);
  border: 1px solid var(--bdr);
  border-radius: 9px;
  padding: 9px 11px;
  display: flex;
  flex-direction: column;
  gap: 1px;
  min-width: 0;
}
.rs-aside-stat-l {
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--t3);
  font-weight: 700;
}
.rs-aside-stat-v {
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 700;
  color: var(--t1);
  line-height: 1.05;
  letter-spacing: -.02em;
}
.rs-aside-stat-h { display: none; }
.rs-aside-stats li.tone-good .rs-aside-stat-v { color: var(--good); }
.rs-aside-stats li.tone-warn .rs-aside-stat-v { color: var(--warn); }
.rs-aside-stats li.tone-bad  .rs-aside-stat-v { color: var(--bad);  }

/* Target-roles list — vertical chevron rows so each multi-word title
   gets a full row of text. Way more legible than wrapped pills. */
.rs-aside-pills {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.rs-aside-pills .skill-pill {
  display: flex;
  align-items: center;
  width: 100%;
  font-size: 13px;
  font-weight: 500;
  padding: 7px 10px 7px 26px;
  border-radius: 8px;
  background: var(--bg-2);
  border: 1px solid var(--bdr);
  color: var(--t1);
  letter-spacing: -.005em;
  position: relative;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: background .12s, border-color .12s, transform .12s;
}
.rs-aside-pills .skill-pill::before {
  content: '›';
  position: absolute;
  left: 11px;
  top: 50%;
  transform: translateY(-52%);
  color: var(--accent-h);
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 700;
  line-height: 1;
}
.rs-aside-pills .skill-pill:hover {
  background: var(--bg-3);
  border-color: var(--accent-b);
  transform: translateX(2px);
}

/* Color-coded bullet lists (green/red/accent) */
.rs-aside-list {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: 9px;
}
.rs-aside-list li {
  font-size: 13px;
  line-height: 1.5;
  color: var(--t2);
  padding-left: 18px;
  position: relative;
  letter-spacing: -.005em;
}
.rs-aside-list li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 7px;
  width: 6px;
  height: 6px;
  border-radius: 50%;
}
.rs-aside-list.good   li::before { background: var(--good);     box-shadow: 0 0 8px var(--good-d);    }
.rs-aside-list.bad    li::before { background: var(--bad);      box-shadow: 0 0 8px var(--bad-d);     }
.rs-aside-list.accent li::before { background: var(--accent-h); box-shadow: 0 0 8px var(--accent-d);  }

/* Action card — distinguished by accent border + gradient */
.rs-aside-action {
  background: linear-gradient(135deg, var(--surface), var(--bg-2));
  border-color: var(--accent-b);
  position: relative;
  overflow: hidden;
}
.rs-aside-action::before {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: radial-gradient(ellipse 200px 120px at 100% 100%, var(--accent-d) 0%, transparent 70%);
}
.rs-aside-action > * { position: relative; }
.rs-aside-rescan {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  padding: 11px 14px;
  border-radius: 9px;
  background: linear-gradient(135deg, var(--accent), var(--accent3));
  color: #fff;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 600;
  letter-spacing: -.005em;
  border: none;
  cursor: pointer;
  transition: all .15s;
  box-shadow:
    0 4px 14px -4px rgba(124, 92, 255, .55),
    inset 0 0 0 1px rgba(255, 255, 255, .08);
  width: 100%;
}
.rs-aside-rescan:hover {
  transform: translateY(-1px);
  box-shadow:
    0 8px 22px -4px rgba(124, 92, 255, .68),
    inset 0 0 0 1px rgba(255, 255, 255, .14);
}
.rs-aside-rescan:disabled {
  opacity: .55;
  cursor: not-allowed;
  transform: none;
}
.rs-aside-action-hint {
  font-size: 12.5px;
  color: var(--t3);
  line-height: 1.55;
}

/* Tablet: trim the sidecar to keep the narrative wide. 340px still keeps
   "Embedded Systems Engineer" on one line and the 2×2 stats compact. */
@media (max-width: 1280px) {
  .rs-deep-grid { grid-template-columns: minmax(0, 1fr) 340px; gap: 26px; }
}
@media (max-width: 1100px) {
  .rs-deep-grid { grid-template-columns: minmax(0, 1fr) 320px; gap: 22px; }
  .rs-narrative { padding: 30px 32px; }
}

/* Below 980px: collapse to single column, sidecar below narrative.
   The sidecar transforms into a 2-col responsive grid so it's not a tall
   stack of half-empty narrow cards. The score and action cards span the
   full width because they're the dominant CTAs. */
@media (max-width: 980px) {
  .rs-deep-grid { grid-template-columns: 1fr; gap: 20px; }
  .rs-deep-aside {
    position: static;
    max-height: none;
    overflow: visible;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .rs-aside-score,
  .rs-aside-action { grid-column: 1 / -1; }
  /* In the wider responsive sidecar, score body can spread out more */
  .rs-aside-score-body { gap: 16px; }
  /* Target-role pills go horizontal again now that we have width */
  .rs-aside-pills {
    flex-direction: row;
    flex-wrap: wrap;
    gap: 6px;
  }
  .rs-aside-pills .skill-pill {
    width: auto;
    padding: 5px 10px 5px 24px;
  }
}

/* Phone */
@media (max-width: 720px) {
  .rs-narrative-h { font-size: 26px; }
  .rs-narrative { padding: 22px 22px; border-radius: 14px; }
  .rs-narrative-p { font-size: 15.5px; line-height: 1.7; }
  .rs-narrative-p.rs-lede::first-letter { font-size: 46px; padding-right: 10px; }
  .rs-narrative-pull { font-size: 16px; padding: 14px 18px 14px 24px; }
  .rs-deep-folio { font-size: 10.5px; }
  .rs-deep-folio-rule { display: none; }
  .rs-deep-folio-score { margin-left: 0; }
  .rs-aside-block { padding: 14px 14px; }
  .rs-deep-aside {
    grid-template-columns: 1fr;
    gap: 10px;
  }
  /* On phone, target-role pills go back to vertical chevrons (cleaner) */
  .rs-aside-pills {
    flex-direction: column;
    gap: 5px;
  }
  .rs-aside-pills .skill-pill {
    width: 100%;
    padding: 7px 10px 7px 26px;
  }
  .rs-aside-score-num { font-size: 34px; }
  .rs-aside-stats { gap: 6px; }
  .rs-aside-stats li { padding: 8px 10px; }
  .rs-aside-stat-v { font-size: 16px; }
}

/* Empty / not-analyzed state */
.rs-empty {
  background: linear-gradient(135deg, var(--bg-2), var(--surface));
  border: 1px solid var(--bdr); border-radius: 16px;
  padding: 56px 32px; text-align: center;
  display: flex; flex-direction: column; align-items: center;
}
.rs-empty-icon {
  width: 52px; height: 52px; border-radius: 13px;
  background: var(--accent-d); border: 1px solid var(--accent-b);
  display: inline-flex; align-items: center; justify-content: center;
  margin-bottom: 18px;
}
.rs-empty-h {
  font-family: var(--serif); font-size: 25px; font-weight: 400;
  letter-spacing: -.01em; color: var(--t1); margin-bottom: 8px;
}
.rs-empty-sub {
  color: var(--t3); font-size: 15.5px; line-height: 1.6;
  max-width: 380px; margin: 0 auto 20px;
}

.set-row { display: flex; align-items: center; justify-content: space-between; gap: 12px }
.set-select {
  padding: 11px 13px; border-radius: 9px; border: 1px solid var(--bdr);
  background: var(--bg-2); color: var(--t1); font-size: 15.5px; outline: none; cursor: pointer; width: 100%;
  font-family: var(--sans);
}
.set-select:focus { border-color: var(--accent) }
.set-input {
  padding: 11px 14px; border-radius: 9px; border: 1px solid var(--bdr);
  background: var(--bg-2); color: var(--t1); font-size: 15.5px; outline: none; width: 100%;
  transition: border-color .15s;
  font-family: var(--sans);
}
.set-input:focus { border-color: var(--accent) }
.set-toggle {
  width: 44px; height: 24px; border-radius: 12px; border: none;
  background: var(--bg-3); position: relative; cursor: pointer; transition: background .2s; flex-shrink: 0;
}
.set-toggle.on { background: var(--accent) }
.set-toggle::after {
  content: ''; position: absolute; top: 3px; left: 3px;
  width: 18px; height: 18px; border-radius: 50%; background: #fff; transition: transform .2s;
}
.set-toggle.on::after { transform: translateX(20px) }
.set-range { width: 100%; accent-color: var(--accent) }
.set-range-val { font-family: var(--mono); font-size: 15.5px; color: var(--accent-h); font-weight: 500; white-space: nowrap }

/* ── PROFILE INPUTS ── */
.profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px }
.profile-input {
  padding: 11px 14px; border-radius: 9px; border: 1px solid var(--bdr);
  background: var(--bg-2); color: var(--t1); font-size: 15.5px; outline: none; width: 100%;
  transition: border-color .15s; font-family: var(--sans);
}
.profile-input:focus { border-color: var(--accent) }
.profile-textarea { min-height: 110px; resize: vertical; line-height: 1.6 }

/* Native <select> styled to match .profile-input. Custom chevron via
   inline SVG so the dropdown caret matches the dark theme. Themed
   variants for dark / light. */
.profile-select {
  appearance: none; -webkit-appearance: none; -moz-appearance: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%238186ad' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
  background-repeat: no-repeat;
  background-position: right 14px center;
  background-size: 14px 14px;
  padding-right: 38px;
  cursor: pointer;
  text-overflow: ellipsis;
}
:root[data-theme="light"] .profile-select {
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%236c708e' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
}
.profile-select option {
  background: var(--bg-2); color: var(--t1);
}
.profile-select option[value=""] { color: var(--t3); }

/* ── CHIP TOGGLE — multi-select control used by Search Preferences ── */
.chip-toggle-row {
  display: flex; flex-wrap: wrap; gap: 8px;
  margin-top: 4px;
}
.chip-toggle {
  appearance: none;
  font-family: var(--sans); font-size: 14px; font-weight: 500;
  padding: 8px 14px;
  border-radius: 999px;
  border: 1px solid var(--bdr);
  background: var(--bg-2);
  color: var(--t2);
  cursor: pointer;
  transition: background .15s, border-color .15s, color .15s, box-shadow .15s;
  letter-spacing: -.005em;
}
.chip-toggle:hover {
  border-color: var(--bdr2);
  color: var(--t1);
}
.chip-toggle.on {
  background: var(--accent-d);
  border-color: var(--accent-b);
  color: var(--accent-h);
  box-shadow: inset 0 0 0 1px rgba(124,92,255,.3);
}
.chip-toggle.on:hover { background: var(--accent-d); }

/* ── SEARCH PREFERENCES card emphasis on the Personal tab ── */
.search-prefs {
  border-color: var(--accent-b);
  background: linear-gradient(180deg, var(--accent-d) 0%, var(--bg-1) 22%);
}
.search-prefs-pill {
  font-family: var(--mono); font-size: 10.5px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .08em;
  padding: 3px 8px; border-radius: 6px;
  color: var(--accent-h);
  background: var(--accent-d);
  border: 1px solid var(--accent-b);
}

/* ────────────────────────────────────────────────────────────────
   PROFILE LINKS — industry-curated profile sites card.
   Editorial directory layout: each category is a collapsible row
   with a tinted icon-square; expanded categories reveal a stack of
   inputs, each fronted by a brand-colored monogram chip so the site
   is identifiable at a glance.
   ──────────────────────────────────────────────────────────────── */
.profile-links-card { border-color: var(--bdr); }
.profile-links-count {
  font-family: var(--mono); font-size: 10.5px; font-weight: 600;
  letter-spacing: .04em;
  padding: 3px 8px; border-radius: 6px;
  color: var(--t3);
  background: var(--bg-3);
  border: 1px solid var(--bdr);
}

.profile-link-group {
  border-top: 1px solid var(--bdr);
  margin-top: 4px;
}
.profile-link-group:first-of-type { border-top: 0; margin-top: 0; }
.profile-link-group-head {
  width: 100%;
  display: flex; align-items: center; gap: 12px;
  padding: 14px 4px;
  background: transparent; border: 0; cursor: pointer;
  text-align: left;
  font-family: var(--sans);
  color: var(--t1);
  transition: background .15s;
  border-radius: 7px;
}
.profile-link-group-head:hover { background: var(--bg-2); }
.profile-link-group-icon {
  width: 28px; height: 28px;
  border-radius: 7px;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--accent-d);
  color: var(--accent-h);
  border: 1px solid var(--accent-b);
  flex-shrink: 0;
}
.profile-link-group-name {
  flex: 1;
  font-size: 15.5px; font-weight: 600;
  letter-spacing: -.005em;
}
.profile-link-group-count {
  font-family: var(--mono); font-size: 11.5px; font-weight: 500;
  color: var(--t3);
}
.profile-link-group-chevron {
  display: inline-flex; align-items: center;
  color: var(--t3);
  transition: transform .25s cubic-bezier(.16,1,.3,1), color .15s;
}
.profile-link-group.open .profile-link-group-chevron {
  transform: rotate(180deg);
  color: var(--accent-h);
}
.profile-link-group-body {
  padding: 4px 4px 18px 4px;
  animation: pl-group-reveal .35s cubic-bezier(.22,1,.36,1);
}
@keyframes pl-group-reveal {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: none; }
}
.profile-link-group-desc {
  font-size: 13.5px; color: var(--t3);
  line-height: 1.55;
  margin: 0 0 12px 40px;
  font-style: normal;
}
.profile-link-rows {
  display: flex; flex-direction: column;
  gap: 10px;
}
.profile-link-row {
  display: flex; align-items: center; gap: 12px;
}
.profile-link-mono {
  position: relative; isolation: isolate;
  width: 38px; height: 38px;
  flex-shrink: 0;
  border-radius: 10px;
  display: inline-flex; align-items: center; justify-content: center;
  font-family: var(--mono);
  font-size: 12px; font-weight: 700;
  letter-spacing: .02em;
  text-transform: uppercase;
  box-shadow:
    0 1px 0 rgba(255,255,255,.10) inset,
    0 4px 10px -6px rgba(0,0,0,.40);
  overflow: hidden;
  user-select: none;
  transition: transform .14s cubic-bezier(.22,1,.36,1), box-shadow .14s;
}
/* Soft brand-color halo behind the chip so the icon "lifts" off the
   surface — pseudo-element rather than another shadow so the radial
   stays sharp at small sizes. */
.profile-link-mono::after {
  content: ''; position: absolute; inset: -2px;
  border-radius: inherit; z-index: -1;
  background: inherit; filter: blur(8px) saturate(1.2);
  opacity: .25; pointer-events: none;
}
.profile-link-row:hover .profile-link-mono {
  transform: translateY(-1px) scale(1.04);
  box-shadow:
    0 1px 0 rgba(255,255,255,.14) inset,
    0 8px 18px -8px rgba(0,0,0,.55);
}
/* When a real Simple Icons glyph is rendered, drop the text padding and
   center the SVG. White-on-brand-color is what Simple Icons returns when
   we ask for `/white`, so it reads cleanly on every brand chip. */
.profile-link-mono.has-logo { font-size: 0 }
.profile-link-mono img {
  width: 60%; height: 60%;
  object-fit: contain;
  filter: drop-shadow(0 1px 0 rgba(0,0,0,.20));
  pointer-events: none;
  animation: profile-logo-in .35s cubic-bezier(.22,1,.36,1) both;
}
@keyframes profile-logo-in {
  from { opacity: 0; transform: scale(.7) rotate(-6deg) }
  to   { opacity: 1; transform: none }
}
.profile-link-row-body {
  flex: 1;
  display: flex; flex-direction: column;
  gap: 3px;
  min-width: 0;
}
.profile-link-row-label {
  font-size: 13px; font-weight: 500;
  color: var(--t2);
  letter-spacing: -.005em;
}
.profile-link-input {
  font-size: 14.5px;
  padding: 9px 12px;
  font-family: var(--mono);
}
.profile-link-input::placeholder {
  color: var(--t4);
  font-style: normal;
}
@media (max-width: 720px) {
  .profile-link-group-desc { margin-left: 0; }
}

/* Skill / role pills used across Profile + Resume Analysis */
.skill-pill {
  display: inline-flex; align-items: center;
  padding: 6px 12px; border-radius: 999px;
  font-size: 14px; font-weight: 500; line-height: 1.2;
  background: var(--bg-3); color: var(--t2);
  border: 1px solid var(--bdr); white-space: nowrap;
  transition: background .12s, border-color .12s, color .12s;
}
.skill-pill.hard { background: var(--accent-d); color: var(--accent-h); border-color: var(--accent-b) }
.skill-pill.soft { background: var(--bg-2); color: var(--t2) }
.skill-pill:hover { border-color: var(--bdr2) }
.profile-stack { display: flex; flex-direction: column; gap: 16px }
.profile-edit-row {
  padding: 16px; border-radius: 10px; border: 1px solid var(--bdr);
  background: var(--bg-2); position: relative; display: flex; flex-direction: column; gap: 10px;
}
.profile-edit-row.compact { gap: 8px }
.edit-trigger {
  position: absolute; top: 10px; right: 10px;
  display: none; align-items: center; justify-content: center;
  width: 26px; height: 26px; border-radius: 6px; border: 1px solid var(--bdr);
  background: var(--bg-3); color: var(--t3); cursor: pointer; transition: all .12s;
}
.edit-trigger.always { display: flex }
.profile-edit-row:hover .edit-trigger { display: flex }
.edit-trigger:hover { background: var(--bad-d); color: var(--bad); border-color: var(--bad-b) }

/* ══════════════════════════════════════════════════════════
   AGENT PAGE — refined pipeline + Atlas chat sidebar
   ══════════════════════════════════════════════════════════ */
.agent-shell {
  flex: 1; min-height: 0;
  display: flex; flex-direction: column;
  background: var(--bg);
  overflow: hidden;
}

/* Slim header */
.agent-head {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 18px; flex-wrap: wrap;
  padding: 22px 24px 16px;
  border-bottom: 1px solid var(--bdr);
}
.agent-head-l { min-width: 0 }
.agent-eyebrow {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: var(--mono); font-size: 10.5px; letter-spacing: .22em;
  text-transform: uppercase; color: var(--accent-h); font-weight: 500; margin-bottom: 8px;
}
.agent-eyebrow::before { content: ''; width: 18px; height: 1px; background: var(--accent-h) }
.agent-h {
  font-family: var(--serif); font-size: 28px; line-height: 1.15; letter-spacing: -.02em;
  color: var(--t1); font-weight: 400; margin: 0;
}
.agent-h em { color: var(--accent-h); font-style: normal; font-family: var(--serif) }
.agent-head-r { display: inline-flex; align-items: center; gap: 8px; flex-shrink: 0 }
.agent-runall { padding: 9px 18px }

/* 2-col layout: pipeline + chat */
.agent-grid {
  flex: 1; min-height: 0; overflow: hidden;
  display: grid; grid-template-columns: minmax(0, 1fr) 380px;
}
@media (max-width: 1100px) {
  .agent-grid { grid-template-columns: 1fr; grid-template-rows: 1fr auto }
}

/* Pipeline column */
.agent-pipeline {
  overflow-y: auto;
  padding: 22px 24px 32px;
  display: flex; flex-direction: column; gap: 18px;
}
/* Without this, the flex column gives children flex-shrink:1, which collapses
   .agent-meter (clipping its 120px progress ring under overflow:hidden) and
   makes the Phase-2 cap card visually crowd into the ring. The parent already
   has overflow-y:auto, so children should keep their natural height and let
   the column scroll. */
.agent-pipeline > * { flex-shrink: 0 }

/* Meter card */
.agent-meter {
  display: grid; grid-template-columns: 132px 1fr; gap: 22px; align-items: center;
  padding: 18px 22px;
  background: linear-gradient(135deg, var(--surface), var(--bg-2));
  border: 1px solid var(--bdr); border-radius: 14px;
  position: relative; overflow: hidden;
  animation: agent-rise .55s cubic-bezier(.16,1,.3,1) both;
}
.agent-meter::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(circle at 0% 50%, var(--accent-d), transparent 55%);
  opacity: .5;
}
.agent-meter-ring { position: relative; width: 120px; height: 120px; z-index: 1 }
.agent-meter-pct {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-family: var(--mono);
}
.agent-meter-pct b { font-size: 30px; font-weight: 700; line-height: 1 }
.agent-meter-pct b i { font-style: normal; font-size: 14px; color: var(--t3); margin-left: 1px }
.agent-meter-pct span { font-size: 11px; color: var(--t3); margin-top: 4px; letter-spacing: .14em }

.agent-meter-stats {
  display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 14px;
  z-index: 1;
}
@media (max-width: 720px) { .agent-meter-stats { grid-template-columns: repeat(2, 1fr) } }
.agent-meter-stat { display: flex; flex-direction: column; gap: 4px }
.agent-meter-stat i {
  font-style: normal; font-family: var(--mono); font-size: 10px; letter-spacing: .22em;
  text-transform: uppercase; color: var(--t3); font-weight: 500;
}
.agent-meter-stat b {
  font-family: var(--mono); font-size: 18px; font-weight: 600; color: var(--t1);
  letter-spacing: -.005em;
}

/* Phase 2 cap dial — sits between the meter and the phase list. Mirrors
   set-range/set-helper styling so it reads as a sibling of the Settings
   page sliders without importing those classes' positioning. */
.agent-tune {
  background: var(--bg-2); border: 1px solid var(--bdr); border-radius: 12px;
  padding: 14px 16px; margin: 14px 0 10px;
  display: flex; flex-direction: column; gap: 10px;
}
.agent-tune-row {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.agent-tune-label {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  text-transform: uppercase; letter-spacing: .14em; color: var(--t3);
}
.agent-tune-val {
  display: inline-flex; align-items: baseline; gap: 6px;
  font-family: var(--mono);
}
.agent-tune-val b {
  font-size: 22px; font-weight: 700; color: var(--accent-h); letter-spacing: -.02em;
}
.agent-tune-val i {
  font-style: normal; font-size: 10.5px; text-transform: uppercase; letter-spacing: .14em;
  color: var(--t3); font-weight: 500;
}
.agent-tune-range { width: 100%; }
.agent-tune-range:disabled { opacity: .55; cursor: not-allowed; }
.agent-tune-helper {
  font-size: 12.5px; line-height: 1.5; color: var(--t3);
  font-family: var(--sans);
}

/* ── Past runs & outputs panel ─────────────────────────────────────────
   Lives at the top of the agent pipeline column so the user can grab
   tracker / résumé / report files without re-running the pipeline. */
.run-outputs {
  background: var(--bg-2);
  border: 1px solid var(--bdr);
  border-radius: 12px;
  margin-bottom: 14px;
  overflow: hidden;
}
.run-outputs-empty {
  border-style: dashed;
  background: rgba(255,255,255,.015);
}
.run-outputs-head {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; padding: 12px 14px; cursor: pointer;
  user-select: none;
  transition: background .12s ease;
}
.run-outputs-head:hover { background: var(--bg-3) }
.run-outputs-collapsed .run-outputs-head:hover { background: var(--bg-3) }
.run-outputs-head-l { display: flex; align-items: center; gap: 8px; min-width: 0; flex: 1 }
.run-outputs-head-l > svg { color: var(--accent-h); flex-shrink: 0 }
.run-outputs-h {
  font-size: 14px; font-weight: 600; color: var(--t1); letter-spacing: -.01em;
}
.run-outputs-count {
  font-family: var(--mono); font-size: 11px;
  background: var(--bg-3); border: 1px solid var(--bdr);
  color: var(--t3); padding: 1px 7px; border-radius: 4px;
}
.run-outputs-head-r { display: flex; align-items: center; gap: 6px; flex-shrink: 0 }
.run-outputs-quick {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 10px; border-radius: 7px;
  font-size: 12px; font-weight: 500; color: var(--cyan);
  background: rgba(34,229,255,.10); border: 1px solid rgba(34,229,255,.35);
  text-decoration: none; transition: all .12s;
}
.run-outputs-quick:hover { background: rgba(34,229,255,.18); border-color: rgba(34,229,255,.55); text-decoration: none }
.run-outputs-quick > svg { color: var(--cyan) }
.run-outputs-refresh {
  display: inline-flex; align-items: center; justify-content: center;
  width: 26px; height: 26px; border-radius: 6px;
  background: transparent; border: 1px solid var(--bdr);
  color: var(--t3); cursor: pointer; transition: all .12s;
}
.run-outputs-refresh:hover { background: var(--bg-3); color: var(--t1); border-color: var(--bdr2) }
.run-outputs-chev { display: inline-flex; color: var(--t3) }

.run-outputs-empty-body {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 18px 18px 22px;
}
.run-outputs-empty-h { font-size: 13.5px; color: var(--t1); font-weight: 600; margin-bottom: 3px }
.run-outputs-empty-sub { font-size: 12.5px; color: var(--t3); line-height: 1.55 }

.run-outputs-body {
  border-top: 1px solid var(--bdr);
  display: flex; flex-direction: column;
}
.run-bucket { border-bottom: 1px solid var(--bdr) }
.run-bucket:last-child { border-bottom: none }
.run-bucket-h {
  display: grid;
  grid-template-columns: auto auto auto 1fr auto;
  align-items: center; gap: 9px;
  width: 100%; padding: 10px 14px;
  background: none; border: none; cursor: pointer; text-align: left;
  color: var(--t2); transition: background .12s ease;
}
.run-bucket-h:hover { background: var(--bg-3) }
.run-bucket-h > svg:first-child { color: var(--t3) }
.run-bucket-t { font-size: 13px; font-weight: 600; color: var(--t1) }
.run-bucket-n {
  font-family: var(--mono); font-size: 10.5px; font-weight: 600;
  color: var(--accent-h); background: var(--accent-d);
  border: 1px solid var(--accent-b);
  padding: 1px 6px; border-radius: 4px;
}
.run-bucket-d {
  font-size: 12px; color: var(--t3);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.run-bucket-chev { color: var(--t3); justify-self: end }

.run-files {
  list-style: none; margin: 0; padding: 0 0 6px 0;
  background: rgba(255,255,255,.012);
}
.run-file {
  display: grid;
  grid-template-columns: auto 1fr auto auto;
  align-items: center; gap: 10px;
  padding: 7px 14px 7px 28px;
  border-top: 1px solid rgba(255,255,255,.025);
  font-size: 12.5px;
}
.run-file:first-child { border-top: 1px solid var(--bdr) }
.run-file-icon { color: var(--t3); display: inline-flex }
.run-file-name {
  color: var(--t1); font-family: var(--mono); font-size: 12px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.run-file-size {
  font-family: var(--mono); font-size: 11px; color: var(--t4);
  flex-shrink: 0;
}
.run-file-actions { display: flex; gap: 4px; flex-shrink: 0 }
.run-file-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 26px; height: 26px; border-radius: 6px;
  background: transparent; border: 1px solid var(--bdr);
  color: var(--t3); cursor: pointer; transition: all .12s;
  text-decoration: none;
}
.run-file-btn:hover { background: var(--bg-3); color: var(--t1); border-color: var(--bdr2); text-decoration: none }
.run-file-btn-primary {
  background: var(--accent-d); border-color: var(--accent-b); color: var(--accent-h);
}
.run-file-btn-primary:hover { background: rgba(124,92,255,.22); border-color: var(--accent-h); color: var(--t1) }

.run-files-more {
  padding: 6px 14px 4px 28px;
}
.run-files-more-btn {
  background: none; border: none; cursor: pointer;
  font-size: 12px; color: var(--accent-h); padding: 2px 0;
}
.run-files-more-btn:hover { color: var(--t1); text-decoration: underline }

/* Phase list */
.agent-phases { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 6px }

@keyframes agent-rise {
  from { opacity: 0; transform: translateY(8px) }
  to   { opacity: 1; transform: none }
}

.aph {
  background: var(--surface); border: 1px solid var(--bdr);
  border-radius: 11px; overflow: hidden;
  transition: border-color .2s, background .2s;
  animation: agent-rise .45s cubic-bezier(.16,1,.3,1) both;
}
.aph:hover { border-color: var(--bdr2) }
.aph-done    { border-left: 2px solid var(--good) }
.aph-run     { border-left: 2px solid var(--warn) }
.aph-err     { border-left: 2px solid var(--bad)  }
.aph-idle    { border-left: 2px solid transparent }
.aph-open    { background: var(--bg-1) }

.aph-hd {
  display: grid;
  grid-template-columns: 36px minmax(0, 1fr) auto auto;
  align-items: center; gap: 14px;
  padding: 12px 16px;
  cursor: pointer; user-select: none;
}
.aph-hd:hover { background: var(--bg-2) }
.aph-num {
  font-family: var(--mono); font-size: 12px; font-weight: 600;
  color: var(--t4); letter-spacing: .04em;
  display: inline-flex; align-items: center; justify-content: center;
  width: 36px; height: 28px; border-radius: 6px;
  background: var(--bg-3); border: 1px solid var(--bdr);
  transition: color .2s, background .2s, border-color .2s;
}
.aph-done .aph-num { color: var(--good); background: var(--good-d); border-color: var(--good-b) }
.aph-run  .aph-num { color: var(--warn); background: var(--warn-d); border-color: var(--warn-b) }
.aph-err  .aph-num { color: var(--bad);  background: var(--bad-d);  border-color: var(--bad-b)  }

.aph-info { display: flex; flex-direction: column; gap: 2px; min-width: 0 }
.aph-name {
  font-family: var(--sans); font-size: 14.5px; font-weight: 500; color: var(--t1);
  letter-spacing: -.005em;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.aph-sub {
  font-family: var(--sans); font-size: 12.5px; color: var(--t3);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

.aph-status { display: inline-flex; align-items: center; gap: 10px }
.aph-elapsed {
  font-family: var(--mono); font-size: 11px; color: var(--t3);
  letter-spacing: .04em; padding-left: 8px;
  border-left: 1px solid var(--bdr);
}

/* Status pills */
.aph-pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 9px; border-radius: 999px;
  font-family: var(--mono); font-size: 10.5px; font-weight: 600;
  letter-spacing: .14em; text-transform: uppercase;
  border: 1px solid;
}
.aph-pill-good { color: var(--good); background: var(--good-d); border-color: var(--good-b) }
.aph-pill-mid  { color: var(--t3);   background: var(--bg-3);   border-color: var(--bdr2)   }
.aph-pill-bad  { color: var(--bad);  background: var(--bad-d);  border-color: var(--bad-b)  }

/* Running pulse — focused indicator, not a glow on the whole card */
.aph-pulse {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 3px 10px; border-radius: 999px;
  font-family: var(--mono); font-size: 10.5px; font-weight: 600;
  letter-spacing: .14em; text-transform: uppercase;
  color: var(--warn); background: var(--warn-d);
  border: 1px solid var(--warn-b);
}
.aph-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--warn);
  animation: aph-pulse 1.4s ease-in-out infinite;
}
@keyframes aph-pulse {
  0%, 100% { opacity: 1;  box-shadow: 0 0 0 0 rgba(251,191,36,.65) }
  50%      { opacity: .6; box-shadow: 0 0 0 6px transparent }
}

.aph-actions { display: inline-flex; align-items: center; gap: 4px }
.aph-runbtn {
  width: 30px; height: 30px; border-radius: 7px;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--bg-3); color: var(--t2);
  border: 1px solid var(--bdr); cursor: pointer;
  transition: color .12s, background .12s, border-color .12s;
}
.aph-runbtn:hover:not(:disabled) {
  color: var(--accent-h); background: var(--accent-d); border-color: var(--accent-b);
}
.aph-runbtn:disabled { opacity: .45; cursor: not-allowed }
.aph-chev {
  display: inline-flex; align-items: center; color: var(--t3);
  transition: transform .25s cubic-bezier(.16,1,.3,1);
}
.aph-open .aph-chev { transform: rotate(180deg); color: var(--accent-h) }

/* Indeterminate progress bar — smooth slide */
.aph-bar {
  height: 2px; background: var(--bg-3); overflow: hidden; position: relative;
}
.aph-bar-fill {
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, var(--warn), transparent);
  background-size: 40% 100%; background-repeat: no-repeat;
  animation: aph-bar-slide 1.6s cubic-bezier(.4, 0, .6, 1) infinite;
}
@keyframes aph-bar-slide {
  0%   { background-position: -40% 0 }
  100% { background-position: 140%  0 }
}

.aph-body {
  border-top: 1px solid var(--bdr);
  padding: 16px 18px 18px;
  animation: agent-rise .25s cubic-bezier(.16,1,.3,1) both;
}

.agent-log {
  background: #08080d; border: 1px solid var(--bdr); border-radius: 8px;
  padding: 12px 14px;
  font-family: var(--mono); font-size: 12.5px; line-height: 1.75;
  color: #cfd0d8; margin-bottom: 12px;
  max-height: 240px; overflow-y: auto;
}
.agent-log .ok { color: var(--good) }

/* ── Atlas chat sidebar ─────────────────────────────────── */
.atlas-panel {
  display: flex; flex-direction: column;
  min-width: 0; min-height: 0;
  background: linear-gradient(180deg, var(--bg-1), var(--bg));
  border-left: 1px solid var(--bdr);
  overflow: hidden;
}
@media (max-width: 1100px) {
  .atlas-panel {
    border-left: none; border-top: 1px solid var(--bdr);
    max-height: 60vh;
  }
}

.atlas-head {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--bdr);
  background: linear-gradient(180deg, var(--bg-1), transparent);
}
.atlas-head-l { display: flex; align-items: center; gap: 10px; min-width: 0 }
.atlas-mark {
  width: 28px; height: 28px; border-radius: 7px;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--accent-d); border: 1px solid var(--accent-b);
  color: var(--accent-h); font-size: 14px; flex-shrink: 0;
}
.atlas-head-text { display: flex; flex-direction: column; gap: 1px; min-width: 0 }
.atlas-name {
  font-family: var(--serif); font-size: 16px; line-height: 1.1; color: var(--t1);
  letter-spacing: -.01em;
}
.atlas-name em { color: var(--accent-h); font-style: normal; font-family: var(--serif) }
.atlas-sub {
  font-family: var(--mono); font-size: 10px; letter-spacing: .14em;
  text-transform: uppercase; color: var(--t3);
}
.atlas-sub code {
  font-family: var(--mono); color: var(--accent-h); background: none; padding: 0;
}
.atlas-iconbtn {
  width: 28px; height: 28px; border-radius: 7px;
  background: transparent; border: 1px solid var(--bdr);
  color: var(--t3); cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  transition: color .12s, background .12s, border-color .12s;
}
.atlas-iconbtn:hover:not(:disabled) { color: var(--t1); background: var(--bg-2); border-color: var(--bdr2) }
.atlas-iconbtn:disabled { opacity: .4; cursor: not-allowed }

.atlas-transcript {
  flex: 1; min-height: 0; overflow-y: auto;
  padding: 16px 16px 8px;
  display: flex; flex-direction: column; gap: 10px;
}

.atlas-empty {
  display: flex; flex-direction: column; align-items: flex-start; gap: 12px;
  padding: 22px 4px;
}
.atlas-empty-mark { font-size: 22px; color: var(--accent-h); margin-bottom: 4px }
.atlas-empty-h {
  font-family: var(--serif); font-size: 18px; line-height: 1.3; color: var(--t1);
  letter-spacing: -.01em;
}
.atlas-empty-sub { font-size: 12.5px; color: var(--t3); line-height: 1.55 }
.atlas-suggestions { display: flex; flex-direction: column; gap: 6px; width: 100%; margin-top: 6px }
.atlas-sug {
  display: flex; align-items: flex-start; gap: 9px;
  padding: 9px 12px; border-radius: 9px;
  background: var(--bg-2); border: 1px solid var(--bdr);
  color: var(--t1); font-family: var(--sans); font-size: 12.5px; line-height: 1.5;
  text-align: left; cursor: pointer;
  transition: border-color .12s, transform .12s, background .12s;
}
.atlas-sug:hover { border-color: var(--accent-b); transform: translateX(2px); background: var(--surface) }
.atlas-sug-arrow { color: var(--accent-h); flex-shrink: 0; font-family: var(--mono) }

.atlas-msg {
  display: flex; align-items: flex-start; gap: 8px;
  animation: atlas-msg-in .3s cubic-bezier(.16,1,.3,1) both;
}
@keyframes atlas-msg-in {
  from { opacity: 0; transform: translateY(4px) }
  to   { opacity: 1; transform: none }
}
.atlas-msg-user { justify-content: flex-end }
.atlas-msg-mark {
  width: 22px; height: 22px; flex-shrink: 0;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 6px; background: var(--accent-d); border: 1px solid var(--accent-b);
  color: var(--accent-h); font-size: 12px;
  margin-top: 2px;
}
.atlas-msg-bubble {
  max-width: 88%;
  padding: 10px 13px;
  border-radius: 11px;
  font-family: var(--sans); font-size: 13px; line-height: 1.6;
  color: var(--t1); white-space: pre-wrap; word-break: break-word;
}
.atlas-msg-user      .atlas-msg-bubble {
  background: var(--accent-d); border: 1px solid var(--accent-b);
  border-bottom-right-radius: 4px;
}
.atlas-msg-assistant .atlas-msg-bubble {
  background: var(--surface); border: 1px solid var(--bdr);
  border-bottom-left-radius: 4px;
}
.atlas-msg.error .atlas-msg-bubble { background: var(--bad-d); border-color: var(--bad-b); color: var(--bad) }
.atlas-msg-err { display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px }

.atlas-cursor {
  display: inline-block; width: 8px; color: var(--accent-h);
  animation: atlas-blink .9s steps(2) infinite; margin-left: 1px;
}
@keyframes atlas-blink { 50% { opacity: 0 } }

/* ── Inline-Markdown block rendered inside chat bubbles ──────────────── */
.md { white-space: normal; }
.md > :first-child { margin-top: 0 }
.md > :last-child  { margin-bottom: 0 }
.md .md-p { margin: 0 0 8px 0; line-height: 1.6 }
.md .md-h { margin: 14px 0 6px; font-weight: 600; line-height: 1.3 }
.md .md-h1 { font-size: 1.18em }
.md .md-h2 { font-size: 1.10em }
.md .md-h3 { font-size: 1.04em; color: var(--t1) }
.md .md-h4 { font-size: 1.00em; color: var(--t2); font-weight: 600 }
.md .md-ul, .md .md-ol {
  margin: 4px 0 10px 0;
  padding-left: 22px;
}
.md .md-ul li, .md .md-ol li { margin: 3px 0; line-height: 1.55 }
.md .md-ul { list-style: disc }
.md .md-ol { list-style: decimal }
