<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Jobs AI — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
/* ── TOKENS ── */
:root {
  --bg:       #0a0a0f;
  --bg-1:     #0f0f17;
  --bg-2:     #141420;
  --bg-3:     #1a1a28;
  --surface:  #1e1e2e;
  --sur2:     #252538;
  --bdr:      rgba(255,255,255,.07);
  --bdr2:     rgba(255,255,255,.13);
  --t1:       #f0f0f8;
  --t2:       #8b8ba8;
  --t3:       #4a4a68;
  --t4:       #2e2e48;
  --accent:   #5e6ad2;
  --accent-h: #7b84e8;
  --accent-d: rgba(94,106,210,.14);
  --accent-b: rgba(94,106,210,.3);
  --good:     #4ade80;
  --good-d:   rgba(74,222,128,.12);
  --good-b:   rgba(74,222,128,.25);
  --warn:     #fbbf24;
  --warn-d:   rgba(251,191,36,.1);
  --warn-b:   rgba(251,191,36,.2);
  --bad:      #f87171;
  --bad-d:    rgba(248,113,113,.1);
  --bad-b:    rgba(248,113,113,.25);
  --mono:     'JetBrains Mono', monospace;
  --sans:     'DM Sans', sans-serif;
  --serif:    'DM Serif Display', Georgia, serif;
  --rail-w:   168px;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0 }
html { scroll-behavior:smooth }
body { font-family:var(--sans); background:var(--bg); color:var(--t1); -webkit-font-smoothing:antialiased; overflow:hidden; height:100vh }
::-webkit-scrollbar { width:5px; height:5px }
::-webkit-scrollbar-track { background:transparent }
::-webkit-scrollbar-thumb { background:var(--bdr2); border-radius:3px }
a { color:var(--accent-h); text-decoration:none }
a:hover { text-decoration:underline }
button { font-family:var(--sans); cursor:pointer }
input, select, textarea { font-family:var(--sans) }

/* ── ICON HELPER ── */
.ic { display:inline-flex; align-items:center; justify-content:center; flex-shrink:0 }

/* ── ANIMATIONS ── */
@keyframes sp { to { transform:rotate(360deg) } }
@keyframes fade-in-up { from { opacity:0; transform:translateY(8px) } to { opacity:1; transform:none } }
@keyframes lsweep { 0% { transform:translateX(-100%) } 100% { transform:translateX(200%) } }
@keyframes promo-in { from { opacity:0 } to { opacity:1 } }

.spin { width:13px; height:13px; border:2px solid rgba(255,255,255,.2); border-top-color:currentColor; border-radius:50%; animation:sp .6s linear infinite; display:inline-block; flex-shrink:0 }
.fade-in { animation:fade-in-up .25s cubic-bezier(.16,1,.3,1) }

/* ── SHELL GRID ── */
.shell {
  display: grid;
  grid-template-areas: "brand promo" "rail main";
  grid-template-columns: var(--rail-w) 1fr;
  grid-template-rows: 36px 1fr;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
}

/* ── BRAND CELL ── */
.brand-cell {
  grid-area: brand;
  background: var(--bg-1);
  border-right: 1px solid var(--bdr);
  border-bottom: 1px solid var(--bdr);
  display: flex;
  align-items: center;
  padding: 0 14px;
}
.brand-mark {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  user-select: none;
}
.brand-glyph {
  width: 22px; height: 22px;
  background: var(--accent);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.brand-name {
  font-family: var(--serif);
  font-size: 15px;
  color: var(--t1);
  letter-spacing: -.2px;
  line-height: 1;
}
.brand-name em { color: var(--accent-h); font-style: normal }

/* ── PROMO STRIP ── */
.promo-cell {
  grid-area: promo;
  background: var(--accent-d);
  border-bottom: 1px solid var(--accent-b);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  font-size: 12px;
  color: var(--t2);
  padding: 0 14px;
  animation: promo-in .3s ease;
}
.promo-cell strong { color: var(--t1) }
.promo-close {
  background: none; border: none; color: var(--t3);
  display: flex; align-items: center; cursor: pointer;
  padding: 2px; border-radius: 4px; transition: color .12s;
  margin-left: 8px;
}
.promo-close:hover { color: var(--t1) }

/* ── RAIL ── */
.rail {
  grid-area: rail;
  background: var(--bg-1);
  border-right: 1px solid var(--bdr);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 8px 0;
}
.rail-nav { flex: 1; display: flex; flex-direction: column; gap: 1px; padding: 0 8px }
.rail-bottom { display: flex; flex-direction: column; gap: 1px; padding: 0 8px 4px; border-top: 1px solid var(--bdr); padding-top: 8px; margin-top: 4px }
.rail-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 7px 10px;
  border-radius: 8px;
  cursor: pointer;
  color: var(--t3);
  font-size: 13px;
  font-weight: 500;
  transition: background .12s, color .12s;
  position: relative;
  user-select: none;
}
.rail-item:hover { background: var(--bg-3); color: var(--t2) }
.rail-item.active { background: var(--accent-d); color: var(--accent-h) }
.rail-icon { width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0 }
.lbl { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis }
.rail-count {
  font-size: 10px; font-weight: 600; font-family: var(--mono);
  background: var(--bg-3); color: var(--t3); padding: 1px 5px; border-radius: 4px;
}
.rail-badge {
  font-size: 10px; font-weight: 600;
  background: var(--accent-d); color: var(--accent-h); padding: 1px 6px; border-radius: 10px;
}

/* ── MAIN ── */
.main { grid-area: main; overflow: hidden; display: flex; flex-direction: column }

/* ── PAGE HEAD ── */
.page-head {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 24px;
  height: 52px;
  border-bottom: 1px solid var(--bdr);
  background: var(--bg-1);
  flex-shrink: 0;
}
.page-title { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--t3); font-family: var(--mono) }
.page-title-big { font-size: 15px; font-weight: 600; color: var(--t1); letter-spacing: -.02em }
.page-tab-sep { color: var(--t4); font-size: 16px }
.page-tabs { display: flex; gap: 2px }
.page-tab {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 10px; border-radius: 7px; border: none; background: none;
  font-size: 13px; font-weight: 500; color: var(--t3); cursor: pointer; transition: all .12s;
}
.page-tab:hover { color: var(--t2); background: var(--bg-3) }
.page-tab.active { color: var(--t1); background: var(--bg-3) }
.tab-count { font-size: 10px; font-family: var(--mono); background: var(--bg-2); color: var(--t3); padding: 1px 5px; border-radius: 4px }
.head-spacer { flex: 1 }
.head-search {
  display: flex; align-items: center; gap: 7px;
  background: var(--bg-2); border: 1px solid var(--bdr); border-radius: 8px;
  padding: 5px 10px; width: 220px;
}
.head-search input { background: none; border: none; outline: none; color: var(--t1); font-size: 13px; width: 100% }
.head-search input::placeholder { color: var(--t4) }
.head-cta {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 14px; border-radius: 8px; border: none;
  background: var(--accent); color: #fff; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.head-cta:hover { background: var(--accent-h); transform: translateY(-1px) }
.head-cta:disabled { opacity: .5; cursor: not-allowed; transform: none }

/* ── PAGE BODY ── */
.page-body {
  flex: 1; overflow: hidden;
  display: grid; grid-template-columns: 1fr 280px; gap: 24px;
  padding: 24px; overflow-y: auto;
}
.page-body.solo { display: flex; flex-direction: column; gap: 20px }
.col-main { min-width: 0; display: flex; flex-direction: column; gap: 16px }
.col-rail { display: flex; flex-direction: column; gap: 14px }

/* ── BUTTONS ── */
.btn-primary {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 13px; border-radius: 8px; border: 1px solid var(--accent);
  background: var(--accent); color: #fff; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all .12s; white-space: nowrap;
}
.btn-primary:hover { background: var(--accent-h); border-color: var(--accent-h) }
.btn-primary:disabled { opacity: .45; cursor: not-allowed }
.btn-ghost {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: 8px; border: 1px solid var(--bdr);
  background: transparent; color: var(--t2); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all .12s; white-space: nowrap;
}
.btn-ghost:hover { background: var(--bg-3); color: var(--t1); border-color: var(--bdr2) }
.btn-ghost:disabled { opacity: .4; cursor: not-allowed }
.icon-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; border-radius: 7px; border: 1px solid var(--bdr);
  background: transparent; color: var(--t3); cursor: pointer; transition: all .12s; flex-shrink: 0;
}
.icon-btn:hover { background: var(--bg-3); color: var(--t1); border-color: var(--bdr2) }
.icon-btn.active { color: var(--accent-h); background: var(--accent-d); border-color: var(--accent-b) }
.lp-btn-p {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 8px 18px; border-radius: 9px; border: none;
  background: var(--accent); color: #fff; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all .15s;
}
.lp-btn-p:hover { background: var(--accent-h); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(94,106,210,.35) }
.lp-btn-p:disabled { opacity: .5; cursor: not-allowed; transform: none }

/* ── BADGES ── */
.badge { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; font-family: var(--mono) }
.b-accent { background: var(--accent-d); color: var(--accent-h) }
.b-good { background: var(--good-d); color: var(--good) }

/* ── NOTICE STRIP ── */
.notice-strip {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 13px; border-radius: 8px;
  background: var(--accent-d); border: 1px solid var(--accent-b);
  font-size: 12.5px; color: var(--t2); margin-bottom: 4px;
}

/* ── DATA CARD ── */
.data-card {
  background: var(--surface); border: 1px solid var(--bdr); border-radius: 12px; overflow: hidden;
}
.dt-head {
  display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 40px;
  padding: 8px 16px; background: var(--bg-2);
  font-size: 10px; font-weight: 600; color: var(--t3);
  text-transform: uppercase; letter-spacing: .06em;
  border-bottom: 1px solid var(--bdr);
}
.dt-row {
  display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 40px;
  padding: 11px 16px; align-items: center;
  border-bottom: 1px solid var(--bdr); font-size: 13px;
  transition: background .1s;
}
.dt-row:last-child { border-bottom: none }
.dt-row:hover { background: var(--bg-2) }
.dt-name { display: flex; align-items: center; gap: 9px; min-width: 0 }
.dt-icon {
  width: 28px; height: 28px; border-radius: 7px; background: var(--accent-d);
  color: var(--accent-h); display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0;
}
.dt-name span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
.dt-empty { padding: 36px; text-align: center; color: var(--t3); font-size: 13px }

/* ── PROFILE TABS ── */
.prof-tabs { display: flex; gap: 4px }
.prof-tab {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 12px; border-radius: 8px; border: none; background: none;
  font-size: 13px; font-weight: 500; color: var(--t3); cursor: pointer; transition: all .12s;
}
.prof-tab:hover { color: var(--t2); background: var(--bg-3) }
.prof-tab.active { color: var(--t1); background: var(--bg-3) }
.prof-nav-tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--bdr); padding: 0 2px }
.prof-nav-tab {
  padding: 10px 16px; border: none; background: none;
  font-size: 13px; font-weight: 500; color: var(--t3); cursor: pointer; transition: all .12s;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
}
.prof-nav-tab:hover { color: var(--t2) }
.prof-nav-tab.active { color: var(--t1); border-bottom-color: var(--accent) }

/* ── ACTION MENU ── */
.action-menu-wrap { position: relative }
.action-menu {
  position: absolute; right: 0; top: calc(100% + 4px); z-index: 100;
  background: var(--surface); border: 1px solid var(--bdr2); border-radius: 10px;
  padding: 4px; min-width: 160px; box-shadow: 0 8px 24px rgba(0,0,0,.4);
}
.menu-item {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 7px 10px; border-radius: 7px; border: none; background: none;
  font-size: 13px; color: var(--t2); cursor: pointer; transition: all .1s; text-align: left;
}
.menu-item:hover { background: var(--bg-3); color: var(--t1) }
.menu-item.danger { color: var(--bad) }
.menu-item.danger:hover { background: var(--bad-d) }

/* ── SETTINGS ── */
.settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px }
@media (max-width: 900px) { .settings-grid { grid-template-columns: 1fr } }
.set-sec { display: flex; flex-direction: column; gap: 12px }
.set-sec-h {
  display: flex; align-items: center; gap: 7px;
  font-size: 11px; font-weight: 600; color: var(--t3);
  text-transform: uppercase; letter-spacing: .07em; font-family: var(--mono);
  padding-bottom: 8px; border-bottom: 1px solid var(--bdr);
}
.set-field { display: flex; flex-direction: column; gap: 5px }
.set-label { font-size: 12px; font-weight: 500; color: var(--t2) }
.set-helper { font-size: 11px; color: var(--t3); line-height: 1.5 }
.set-row { display: flex; align-items: center; justify-content: space-between; gap: 12px }
.set-select {
  padding: 7px 10px; border-radius: 8px; border: 1px solid var(--bdr);
  background: var(--bg-2); color: var(--t1); font-size: 13px; outline: none; cursor: pointer; width: 100%;
}
.set-select:focus { border-color: var(--accent) }
.set-input {
  padding: 7px 11px; border-radius: 8px; border: 1px solid var(--bdr);
  background: var(--bg-2); color: var(--t1); font-size: 13px; outline: none; width: 100%;
  transition: border-color .15s;
}
.set-input:focus { border-color: var(--accent) }
.set-toggle {
  width: 36px; height: 20px; border-radius: 10px; border: none;
  background: var(--bg-3); position: relative; cursor: pointer; transition: background .2s; flex-shrink: 0;
}
.set-toggle.on { background: var(--accent) }
.set-toggle::after {
  content: ''; position: absolute; top: 3px; left: 3px;
  width: 14px; height: 14px; border-radius: 50%; background: #fff; transition: transform .2s;
}
.set-toggle.on::after { transform: translateX(16px) }
.set-range { width: 100%; accent-color: var(--accent) }
.set-range-val { font-family: var(--mono); font-size: 13px; color: var(--accent-h); font-weight: 500; white-space: nowrap }

/* ── PROFILE INPUTS ── */
.profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px }
.profile-input {
  padding: 8px 11px; border-radius: 8px; border: 1px solid var(--bdr);
  background: var(--bg-2); color: var(--t1); font-size: 13px; outline: none; width: 100%;
  transition: border-color .15s;
}
.profile-input:focus { border-color: var(--accent) }
.profile-textarea { min-height: 90px; resize: vertical; line-height: 1.55 }
.profile-stack { display: flex; flex-direction: column; gap: 16px }
.profile-edit-row {
  padding: 16px; border-radius: 10px; border: 1px solid var(--bdr);
  background: var(--bg-2); position: relative; display: flex; flex-direction: column; gap: 10px;
}
.profile-edit-row.compact { gap: 8px }
.edit-trigger {
  position: absolute; top: 10px; right: 10px;
  display: none; align-items: center; justify-content: center;
  width: 26px; height: 26px; border-radius: 6px; border: 1px solid var(--bdr);
  background: var(--bg-3); color: var(--t3); cursor: pointer; transition: all .12s;
}
.edit-trigger.always { display: flex }
.profile-edit-row:hover .edit-trigger { display: flex }
.edit-trigger:hover { background: var(--bad-d); color: var(--bad); border-color: var(--bad-b) }

/* ── AGENT PAGE ── */
.agent-hero {
  display: flex; align-items: flex-start; gap: 32px;
  padding: 28px; border-radius: 14px;
  background: linear-gradient(135deg, var(--accent-d), transparent);
  border: 1px solid var(--accent-b); margin-bottom: 8px;
}
.agent-eyebrow { font-size: 10px; font-weight: 600; letter-spacing: .1em; color: var(--accent-h); text-transform: uppercase; font-family: var(--mono); margin-bottom: 8px }
.agent-h { font-family: var(--serif); font-size: 26px; color: var(--t1); letter-spacing: -.03em; margin-bottom: 8px; line-height: 1.2 }
.agent-p { font-size: 13.5px; color: var(--t2); line-height: 1.6 }
.agent-ring { position: relative; flex-shrink: 0 }
.agent-ring-pct {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.agent-ring-pct b { font-size: 22px; font-weight: 700; color: var(--t1); font-family: var(--mono) }
.agent-ring-pct span { font-size: 10px; color: var(--t3); font-family: var(--mono) }

.phases { display: flex; flex-direction: column; gap: 8px }
.ph {
  border-radius: 10px; border: 1px solid var(--bdr);
  background: var(--surface); overflow: hidden; transition: border-color .2s;
}
.ph.done { border-left: 3px solid var(--good) }
.ph.run  { border-left: 3px solid var(--warn); animation: ph-glow 2s ease-in-out infinite }
.ph.err  { border-left: 3px solid var(--bad) }
@keyframes ph-glow { 0%,100% { box-shadow: 0 0 0 0 rgba(251,191,36,.08) } 50% { box-shadow: 0 0 12px 0 rgba(251,191,36,.18) } }
.ph-hd {
  display: flex; align-items: center; gap: 10px; padding: 0 14px;
  height: 48px; cursor: pointer; user-select: none; transition: background .12s;
}
.ph-hd:hover { background: var(--bg-3) }
.ph-num {
  width: 26px; height: 26px; border-radius: 6px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-family: var(--mono); font-weight: 600;
  background: var(--bg-3); color: var(--t3); border: 1px solid var(--bdr); transition: all .2s;
}
.ph.done .ph-num { background: var(--good-d); color: var(--good); border-color: var(--good-b) }
.ph.run .ph-num  { background: var(--warn-d); color: var(--warn); border-color: var(--warn-b) }
.ph.err .ph-num  { background: var(--bad-d);  color: var(--bad);  border-color: var(--bad-b) }
.ph-name { font-size: 13px; font-weight: 600; color: var(--t1); letter-spacing: -.01em }
.ph-sub  { font-size: 11px; color: var(--t3); margin-top: 1px }
.ph-badge { font-size: 10px; font-weight: 600; font-family: var(--mono); padding: 2px 7px; border-radius: 4px; flex-shrink: 0 }
.ph-elapsed { font-family: var(--mono); font-size: 10px; color: var(--t3) }
.ph-chev { color: var(--t3); transition: transform .2s; display: flex; align-items: center }
.ph-chev.open { transform: rotate(180deg) }
.ph-loading-bar { height: 2px; background: var(--bg-3); overflow: hidden }
.ph-loading-fill { height: 100%; background: var(--warn); animation: lsweep 4s ease-in-out infinite }
.ph-body { border-top: 1px solid var(--bdr); padding: 16px }

.agent-log {
  background: var(--bg); border: 1px solid var(--bdr); border-radius: 8px;
  padding: 12px 14px; font-family: var(--mono); font-size: 11.5px; line-height: 1.9;
  color: var(--t3); margin-bottom: 12px; max-height: 220px; overflow-y: auto;
}
.agent-log .ok { color: var(--good) }

.phase-detail { display: flex; flex-direction: column; gap: 14px }
.metrics { display: flex; gap: 10px; flex-wrap: wrap }
.met {
  background: var(--bg-2); border: 1px solid var(--bdr); border-radius: 9px;
  padding: 11px 14px; min-width: 80px;
}
.met b { display: block; font-family: var(--mono); font-size: 20px; font-weight: 700; color: var(--t1); letter-spacing: -.04em }
.met span { font-size: 10px; color: var(--t3); text-transform: uppercase; letter-spacing: .05em; margin-top: 3px; display: block }
.detail-kv { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px }
.detail-kv > div { display: flex; gap: 6px; font-size: 12px }
.detail-kv span { color: var(--t3); flex-shrink: 0 }
.detail-kv b { color: var(--t1); word-break: break-all }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px }
.detail-grid h4 { font-size: 11px; color: var(--t3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px }
.csv-text { font-size: 12px; color: var(--t2); line-height: 1.6 }
.detail-table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid var(--bdr) }
.detail-table { width: 100%; border-collapse: collapse; font-size: 12px }
.detail-table th { padding: 7px 10px; text-align: left; font-size: 10px; font-weight: 600; color: var(--t3); text-transform: uppercase; letter-spacing: .06em; background: var(--bg-2); border-bottom: 1px solid var(--bdr) }
.detail-table td { padding: 8px 10px; color: var(--t2); border-bottom: 1px solid rgba(255,255,255,.03) }
.detail-table tr:last-child td { border: none }
.detail-table tr:hover td { background: rgba(255,255,255,.02) }
.detail-table td.t1 { color: var(--t1); font-weight: 600 }
.detail-file {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 13px; border-radius: 8px; border: 1px solid var(--bdr);
  background: var(--bg-2); color: var(--accent-h); font-size: 13px; text-decoration: none;
}
.detail-file:hover { background: var(--accent-d) }
.report-pre {
  background: var(--bg); border: 1px solid var(--bdr); border-radius: 8px;
  padding: 16px; font-family: var(--mono); font-size: 12px; line-height: 1.8;
  color: var(--t2); white-space: pre-wrap; max-height: 500px; overflow-y: auto;
}
.wait-state {
  padding: 24px; text-align: center; font-size: 13px; color: var(--t3);
  border: 1.5px dashed var(--bdr); border-radius: 10px;
}
.err-block {
  background: var(--bad-d); border: 1px solid var(--bad-b); border-radius: 8px;
  padding: 12px 14px; font-size: 13px; color: var(--bad);
}

/* ── ONBOARDING ── */
.onboard-wrap {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 48px 24px; background: var(--bg); overflow-y: auto;
}
.ob-card {
  width: 100%; max-width: 540px; background: var(--surface);
  border: 1px solid var(--bdr2); border-radius: 18px; padding: 36px;
  box-shadow: 0 24px 64px rgba(0,0,0,.5);
}
.ob-eyebrow {
  font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
  color: var(--accent-h); font-family: var(--mono); margin-bottom: 14px;
}
.ob-h1 {
  font-family: var(--serif); font-size: 30px; color: var(--t1);
  letter-spacing: -.03em; margin-bottom: 10px; line-height: 1.2;
}
.ob-h1 em { color: var(--accent-h); font-style: italic }
.ob-sub { font-size: 14px; color: var(--t2); line-height: 1.6; margin-bottom: 24px }
.ob-tab-row { display: flex; gap: 4px; margin-bottom: 14px }
.ob-tab {
  flex: 1; padding: 8px; border-radius: 8px; border: 1px solid var(--bdr);
  background: var(--bg-2); color: var(--t3); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all .12s;
}
.ob-tab.active, .ob-tab:hover { background: var(--bg-3); color: var(--t1); border-color: var(--bdr2) }
.ob-area {
  width: 100%; min-height: 160px; resize: vertical;
  padding: 12px; border-radius: 10px; border: 1px solid var(--bdr);
  background: var(--bg-2); color: var(--t1); font-family: var(--mono);
  font-size: 12px; line-height: 1.7; outline: none; margin-bottom: 14px; display: block;
  transition: border-color .15s;
}
.ob-area:focus { border-color: var(--accent) }
.ob-drop {
  border: 1.5px dashed var(--bdr2); border-radius: 12px; padding: 28px;
  text-align: center; cursor: pointer; transition: all .15s; margin-bottom: 14px;
}
.ob-drop:hover, .ob-drop.drag { border-color: var(--accent); background: var(--accent-d) }
.ob-cta {
  width: 100%; padding: 13px; border-radius: 10px; border: none;
  background: var(--accent); color: #fff; font-size: 15px; font-weight: 600;
  cursor: pointer; transition: all .15s; display: flex; align-items: center;
  justify-content: center; gap: 8px; margin-bottom: 10px;
}
.ob-cta:hover { background: var(--accent-h); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(94,106,210,.35) }
.ob-cta:disabled { opacity: .55; cursor: not-allowed; transform: none }
.ob-demo {
  width: 100%; padding: 8px; background: none; border: none;
  font-size: 13px; color: var(--t3); cursor: pointer; transition: color .12s; text-align: center;
}
.ob-demo:hover { color: var(--t2) }

/* ── DASHBOARD ── */
.dash-hero {
  background: linear-gradient(135deg, var(--accent-d), var(--bg-1));
  border: 1px solid var(--accent-b); border-radius: 16px;
  padding: 32px; margin-bottom: 8px;
}
.dash-hero-h { font-family: var(--serif); font-size: 24px; color: var(--t1); margin-bottom: 8px; letter-spacing: -.03em }
.dash-hero-p { font-size: 14px; color: var(--t2); line-height: 1.6; margin-bottom: 20px }
.dash-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px }
.dash-card {
  background: var(--surface); border: 1px solid var(--bdr); border-radius: 12px; padding: 18px 20px;
}
.dash-h { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--t3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px }
.dash-n { font-family: var(--mono); font-size: 28px; font-weight: 700; color: var(--t1); letter-spacing: -.04em }
.dash-sub { font-size: 11px; color: var(--t3); margin-top: 3px }

/* ── JOB CARDS ── */
.job-list { display: flex; flex-direction: column; gap: 10px }
.job-card {
  background: var(--surface); border: 1px solid var(--bdr); border-radius: 14px;
  overflow: hidden; transition: border-color .15s, box-shadow .15s;
}
.job-card:hover { border-color: var(--bdr2); box-shadow: 0 4px 20px rgba(0,0,0,.2) }
.job-card.score-high { border-left: 3px solid var(--good) }
.job-card.score-mid  { border-left: 3px solid var(--accent-h) }
.job-card.score-low  { border-left: 3px solid var(--t4) }
.job-card-inner { display: flex; align-items: stretch }
.job-body { flex: 1; padding: 16px; min-width: 0 }
.job-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px }
.co-logo {
  width: 38px; height: 38px; border-radius: 9px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: #fff;
}
.co-logo.v1 { background: linear-gradient(135deg,#5e6ad2,#8b5cf6) }
.co-logo.v2 { background: linear-gradient(135deg,#0ea5e9,#06b6d4) }
.co-logo.v3 { background: linear-gradient(135deg,#f97316,#ef4444) }
.co-logo.v4 { background: linear-gradient(135deg,#14b8a6,#4ade80) }
.co-logo.v5 { background: linear-gradient(135deg,#a855f7,#ec4899) }
.job-header-text { flex: 1; min-width: 0 }
.job-posted { font-size: 11px; color: var(--t4); margin-bottom: 3px }
.job-title { font-size: 14.5px; font-weight: 600; color: var(--t1); letter-spacing: -.01em; line-height: 1.3 }
.job-title:hover { color: var(--accent-h) }
.job-company { display: flex; align-items: center; gap: 5px; font-size: 12.5px; color: var(--t2); margin-top: 3px }
.job-co-name { color: var(--t2) }
.job-sep { color: var(--t4) }
.job-industry { color: var(--t3) }
.job-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px }
.job-chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 9px; border-radius: 20px; font-size: 11px;
  background: var(--bg-3); border: 1px solid var(--bdr); color: var(--t3);
}
.job-footer { display: flex; align-items: center; justify-content: space-between }
.job-app-count { font-size: 11px; color: var(--t4) }
.job-footer-actions { display: flex; align-items: center; gap: 6px }
.job-score-col {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 16px 20px; border-left: 1px solid var(--bdr); flex-shrink: 0; gap: 4px;
}
.score-ring { position: relative; display: flex; align-items: center; justify-content: center }
.score-pct {
  position: absolute; font-family: var(--mono); font-size: 13px;
  font-weight: 700; color: var(--t1);
}
.score-label { font-size: 10px; color: var(--t3); font-weight: 500 }
.job-score-col.score-high .score-label { color: var(--good) }
.job-score-col.score-mid  .score-label { color: var(--accent-h) }

/* filters bar */
.filters { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 4px }
.f-chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 10px; border-radius: 20px; border: 1px solid var(--bdr);
  background: var(--bg-2); color: var(--t3); font-size: 12px; cursor: pointer; transition: all .12s;
}
.f-chip:hover { border-color: var(--bdr2); color: var(--t2) }
.f-chip.on { background: var(--accent-d); border-color: var(--accent-b); color: var(--accent-h) }
.f-divider { width: 1px; height: 16px; background: var(--bdr); flex-shrink: 0 }
.f-action {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 10px; border-radius: 20px; border: 1px solid var(--bdr);
  font-size: 12px; cursor: pointer; transition: all .12s;
}
.f-action.secondary { background: none; color: var(--t3) }
.f-action.secondary:hover { color: var(--t2); background: var(--bg-3) }
.f-action.primary { background: var(--accent-d); color: var(--accent-h); border-color: var(--accent-b) }
.filter-dropdown {
  position: absolute; top: calc(100% + 6px); left: 0; z-index: 50;
  background: var(--surface); border: 1px solid var(--bdr2); border-radius: 10px;
  padding: 4px; min-width: 160px; box-shadow: 0 8px 24px rgba(0,0,0,.4);
}
.f-opt-head { font-size: 10px; font-weight: 600; color: var(--t3); text-transform: uppercase; letter-spacing: .07em; padding: 6px 10px 4px }
.f-opt {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; padding: 7px 10px; border-radius: 7px; border: none; background: none;
  font-size: 13px; color: var(--t2); cursor: pointer; transition: all .1s;
}
.f-opt:hover { background: var(--bg-3); color: var(--t1) }
.f-opt.active { color: var(--accent-h) }

/* ── RIGHT RAIL CARDS ── */
.rcard {
  background: var(--surface); border: 1px solid var(--bdr); border-radius: 12px; padding: 14px;
  display: flex; flex-direction: column; gap: 10px;
}
.user-row { display: flex; align-items: center; gap: 10px }
.user-avatar {
  width: 34px; height: 34px; border-radius: 50%; background: var(--accent-d);
  border: 1.5px solid var(--accent-b); color: var(--accent-h);
  display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0;
}
.user-name { font-size: 13px; font-weight: 600; color: var(--t1) }
.rcard-h {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 11px; font-weight: 600; color: var(--t3); text-transform: uppercase; letter-spacing: .07em;
}
.rcard-add {
  display: flex; align-items: center; justify-content: center;
  width: 20px; height: 20px; border-radius: 5px; border: 1px solid var(--bdr);
  color: var(--t3); cursor: pointer; transition: all .12s;
}
.rcard-add:hover { background: var(--bg-3); color: var(--t1) }
.saved-filter {
  display: flex; align-items: center; gap: 8px;
  font-size: 12.5px; color: var(--t2); padding: 4px 0;
}
.saved-filter > span { flex: 1 }
.saved-filter-edit {
  display: flex; align-items: center; justify-content: center;
  width: 22px; height: 22px; border-radius: 5px; border: 1px solid transparent;
  color: var(--t4); cursor: pointer; transition: all .12s;
}
.saved-filter-edit:hover { border-color: var(--bdr); color: var(--t2); background: var(--bg-3) }

/* ── PLACEHOLDER / EMPTY STATE ── */
.placeholder-page {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 10px; padding: 40px; text-align: center;
}
.placeholder-icon {
  width: 56px; height: 56px; border-radius: 14px;
  background: var(--bg-3); border: 1px solid var(--bdr);
  display: flex; align-items: center; justify-content: center; color: var(--t3);
  margin-bottom: 8px;
}

/* ── AUTH PAGE ── */
.auth-page {
  position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
  background: var(--bg); z-index: 999;
}
.auth-card {
  width: 100%; max-width: 420px; background: var(--surface);
  border: 1px solid var(--bdr2); border-radius: 18px; padding: 36px;
  box-shadow: 0 24px 64px rgba(0,0,0,.5);
  display: flex; flex-direction: column; gap: 4px;
}
.auth-card h2 { font-size: 20px; font-weight: 700; color: var(--t1); margin: 12px 0 2px }
.auth-sub { font-size: 13px; color: var(--t2); margin-bottom: 20px; line-height: 1.5 }
.auth-google {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 10px; border-radius: 9px; border: 1px solid var(--bdr2);
  background: var(--bg-2); color: var(--t1); font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all .12s; margin-bottom: 14px;
}
.auth-google:hover { background: var(--bg-3); border-color: var(--bdr2) }
.auth-divider {
  display: flex; align-items: center; gap: 12px; color: var(--t3); font-size: 12px; margin-bottom: 14px;
}
.auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: var(--bdr) }
.auth-form { display: flex; flex-direction: column; gap: 12px }
.auth-error { background: var(--bad-d); border: 1px solid var(--bad-b); border-radius: 7px; padding: 8px 12px; font-size: 12.5px; color: var(--bad) }
.auth-switch { text-align: center; font-size: 13px; color: var(--t3); margin-top: 16px }
.auth-switch button { background: none; border: none; color: var(--accent-h); cursor: pointer; font-size: 13px }
.auth-switch button:hover { text-decoration: underline }

/* ── COACHING ── */
.coach-hero { padding: 32px; border-radius: 16px; background: linear-gradient(135deg, var(--accent-d), transparent); border: 1px solid var(--accent-b); margin-bottom: 24px }
.coach-h { font-family: var(--serif); font-size: 26px; color: var(--t1); letter-spacing: -.03em; line-height: 1.25; margin-bottom: 14px }
.coach-h em { color: var(--accent-h); font-style: italic }
.coach-pills { display: flex; gap: 10px; flex-wrap: wrap }
.coach-pill { display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--t2) }
.pchk { width: 18px; height: 18px; border-radius: 50%; background: var(--good-d); border: 1px solid var(--good-b); display: flex; align-items: center; justify-content: center; color: var(--good); flex-shrink: 0 }
.coach-cards h3 { font-size: 15px; font-weight: 600; color: var(--t1); margin-bottom: 16px }
.coach-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px }
.coach-tile { background: var(--surface); border: 1px solid var(--bdr); border-radius: 14px; padding: 22px; display: flex; flex-direction: column; gap: 10px }
.coach-tile-icon { width: 44px; height: 44px; border-radius: 11px; background: var(--accent-d); border: 1px solid var(--accent-b); display: flex; align-items: center; justify-content: center; color: var(--accent-h) }
.coach-tile-h { font-size: 14px; font-weight: 600; color: var(--t1); line-height: 1.35 }
.coach-tile-p { font-size: 12.5px; color: var(--t2); line-height: 1.6; flex: 1 }
.coach-tile-btn { display: flex; align-items: center; gap: 7px; justify-content: center; padding: 9px; border-radius: 8px; border: none; background: var(--accent); color: #fff; font-size: 13px; font-weight: 500; cursor: pointer; transition: all .12s }
.coach-tile-btn:hover { background: var(--accent-h) }

/* ── INTERVIEW ── */
.iv-statbar { display: flex; gap: 28px; margin-bottom: 20px }
.iv-stat-num { font-family: var(--mono); font-size: 28px; font-weight: 700; color: var(--t1); letter-spacing: -.04em }
.iv-stat-num em { color: var(--accent-h); font-style: normal }
.iv-stat-lbl { font-size: 11px; color: var(--t3); margin-top: 2px }
.iv-search { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--bdr); border-radius: 10px; padding: 9px 14px; margin-bottom: 16px }
.iv-search input { background: none; border: none; outline: none; color: var(--t1); font-size: 14px; width: 100% }
.iv-pillbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px }
.iv-pill { display: flex; flex-direction: column; padding: 8px 13px; border-radius: 9px; background: var(--surface); border: 1px solid var(--bdr); cursor: pointer; transition: all .12s }
.iv-pill:hover { border-color: var(--bdr2) }
.iv-pill-co { font-size: 13px; font-weight: 600; color: var(--t1) }
.iv-pill-time { font-size: 10px; color: var(--t3); margin-top: 2px }
.iv-section { margin-bottom: 28px }
.iv-section-h { font-size: 15px; font-weight: 600; color: var(--t1); margin-bottom: 14px }
.iv-grid { display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 12px }
.iv-feature { grid-row: span 2; background: var(--surface); border: 1px solid var(--bdr); border-radius: 14px; padding: 22px; display: flex; flex-direction: column; gap: 12px }
.iv-feature-h { display: flex; align-items: center; gap: 10px }
.iv-feature-logo { width: 36px; height: 36px; border-radius: 9px; background: var(--accent-d); color: var(--accent-h); display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700 }
.iv-feature-name { font-size: 15px; font-weight: 600; color: var(--t1) }
.iv-feature-upd { font-size: 11px; color: var(--t3); margin-left: auto }
.iv-feature-p { font-size: 13px; color: var(--t2); line-height: 1.6; flex: 1 }
.iv-feature-stats { display: flex; gap: 20px }
.iv-feature-stat-n { font-family: var(--mono); font-size: 20px; font-weight: 700; color: var(--t1) }
.iv-feature-stat-n.delta { color: var(--good) }
.iv-feature-stat-l { font-size: 10px; color: var(--t3); margin-top: 2px }
.iv-card { background: var(--surface); border: 1px solid var(--bdr); border-radius: 12px; padding: 16px; cursor: pointer; transition: all .12s }
.iv-card:hover { border-color: var(--bdr2) }
.iv-card-h { display: flex; align-items: center; gap: 9px; margin-bottom: 12px }
.iv-card-logo { width: 30px; height: 30px; border-radius: 7px; background: var(--bg-3); color: var(--t2); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700 }
.iv-card-name { font-size: 14px; font-weight: 600; color: var(--t1); flex: 1 }
.iv-card-upd { font-size: 11px; color: var(--t4) }
.iv-card-q { display: flex; align-items: center; justify-content: space-between; font-size: 13px; color: var(--t2) }

/* ── DEV PAGE ── */
.dev-wrap { flex: 1; overflow-y: auto; padding: 20px 24px }
.dev-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 280px; gap: 14px }
.dev-card { background: var(--surface); border: 1px solid var(--bdr); border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 10px }
.dev-card.dev-span { grid-column: 1 / -1 }
.dev-card.dev-users { grid-column: 4 / 5; grid-row: 2 / 4 }
.dev-card-h { display: flex; align-items: center; gap: 7px; font-size: 11px; font-weight: 600; color: var(--t3); text-transform: uppercase; letter-spacing: .07em }
.dev-kpis { display: flex; gap: 14px; flex-wrap: wrap }
.dev-kpi { display: flex; flex-direction: column; align-items: center; gap: 5px; padding: 14px 20px; border-radius: 10px; background: var(--bg-2); border: 1px solid var(--bdr); flex: 1; min-width: 80px }
.dev-kpi b { font-family: var(--mono); font-size: 22px; font-weight: 700; color: var(--t1) }
.dev-kpi span { font-size: 10px; color: var(--t3); text-transform: uppercase; letter-spacing: .05em }
.dev-kpi.warn b { color: var(--bad) }
.dev-status { display: flex; flex-direction: column; gap: 6px }
.dev-status > div { display: flex; justify-content: space-between; font-size: 12px; align-items: center }
.dev-status span { color: var(--t3) }
.dev-status b { color: var(--t1); font-family: var(--mono) }
.dev-status b.ok { color: var(--good) }
.dev-events { display: flex; flex-direction: column; gap: 4px; max-height: 300px; overflow-y: auto }
.dev-event { display: grid; grid-template-columns: 70px 100px 1fr; gap: 10px; font-size: 11.5px; padding: 5px 0; border-bottom: 1px solid var(--bdr) }
.dev-event:last-child { border: none }
.dev-event span { color: var(--t3); font-family: var(--mono) }
.dev-event b { color: var(--accent-h); font-weight: 600 }
.dev-event p { color: var(--t2) }
.dev-terminal {
  flex: 1; background: var(--bg); border: 1px solid var(--bdr); border-radius: 8px;
  padding: 12px 14px; font-family: var(--mono); font-size: 11.5px; line-height: 1.7;
  color: var(--t2); white-space: pre-wrap; overflow-y: auto; min-height: 80px;
}
.dev-cli-actions { display: flex; gap: 6px; flex-wrap: wrap }
.dev-phases { display: flex; gap: 5px }
.dev-phases span {
  width: 26px; height: 26px; border-radius: 6px; border: 1px solid var(--bdr);
  background: var(--bg-3); color: var(--t4); display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-family: var(--mono); font-weight: 600; transition: all .2s;
}
.dev-phases span.on { background: var(--accent-d); color: var(--accent-h); border-color: var(--accent-b) }
.dev-user-list { display: flex; flex-direction: column; gap: 3px; max-height: 360px; overflow-y: auto }
.dev-user {
  display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: 8px;
  border: 1px solid transparent; background: none; cursor: pointer; transition: all .12s; text-align: left; width: 100%;
}
.dev-user:hover { background: var(--bg-3) }
.dev-user.active { background: var(--accent-d); border-color: var(--accent-b) }
.dev-user b { display: block; font-size: 13px; color: var(--t1); font-weight: 600 }
.dev-user small { display: block; font-size: 10px; color: var(--t3); font-family: var(--mono); margin-top: 1px }
.dev-user em { font-size: 10px; color: var(--t3); font-style: normal; font-family: var(--mono) }
.dev-inspect-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: auto; gap: 14px; margin-top: 10px }
.inspect-sec { display: flex; flex-direction: column; gap: 8px }
.inspect-sec h4 { font-size: 11px; font-weight: 600; color: var(--t3); text-transform: uppercase; letter-spacing: .07em }
.dev-tweak-row { display: flex; gap: 8px; flex-wrap: wrap }
.dev-swatch { width: 24px; height: 24px; border-radius: 6px; border: 2px solid transparent; cursor: pointer; transition: transform .12s, border-color .12s; padding: 0 }
.dev-swatch:hover { transform: scale(1.2); border-color: rgba(255,255,255,.3) }

/* ── SCROLL-REVEAL ── */
.lp-sr { opacity: 0; transform: translateY(16px); transition: opacity .5s ease, transform .5s ease }
.lp-sr.vis { opacity: 1; transform: none }

/* ── DEV FLOAT ── */
.dev-float {
  position: fixed; bottom: 16px; right: 16px; z-index: 999;
  display: flex; align-items: center; gap: 6px;
  padding: 7px 12px; border-radius: 9px; border: 1px solid var(--bdr);
  background: var(--surface); color: var(--t2); font-size: 12px; cursor: pointer; transition: all .12s;
  box-shadow: 0 4px 16px rgba(0,0,0,.4);
}
.dev-float:hover { background: var(--bg-3); color: var(--t1) }

/* ── PROFILE HELPER ── */
.prof-h { display: flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 600; color: var(--t1) }

/* ── MISC ── */
code { font-family: var(--mono); font-size: 11px; background: var(--bg-3); padding: 1px 5px; border-radius: 3px; color: var(--accent-h) }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="/frontend/app.jsx" data-presets="react"></script>
</body>
</html>
