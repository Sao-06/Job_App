<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Jobs AI — Autonomous Job Application Platform</title>
<meta name="description" content="Drop a resume. We scan it, score 20 sources against your profile, and tailor every application — automatically. Watch a real run."/>
<link rel="icon" type="image/svg+xml" href="/frontend/favicon.svg"/>
<link rel="apple-touch-icon" href="/frontend/favicon.svg"/>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
:root {
  --bg:        #07070d;
  --bg1:       #0c0c17;
  --bg2:       #11111e;
  --bg3:       #181828;
  --surface:   #1c1c2e;
  --bdr:       rgba(255,255,255,.06);
  --bdr2:      rgba(255,255,255,.13);
  --t1:        #f6f7ff;
  --t2:        #c8c8df;
  --t3:        #9da0bd;
  --t4:        #6e718e;
  --accent:    #7c5cff;
  --accent-h:  #a78bff;
  --accent-d:  rgba(124,92,255,.14);
  --accent-b:  rgba(124,92,255,.42);
  --cyan:      #22e5ff;
  --pink:      #ff3d9a;
  --good:      #4ade80;
  --good-d:    rgba(74,222,128,.12);
  --good-b:    rgba(74,222,128,.32);
  --warn:      #fbbf24;
  --warn-d:    rgba(251,191,36,.10);
  --bad:       #f87171;
  --mono:      'JetBrains Mono', ui-monospace, monospace;
  --sans:      'Inter', system-ui, -apple-system, sans-serif;
  --serif:     'Inter', system-ui, -apple-system, sans-serif;
  /* Page-level zoom — CSS `zoom` is the only single-knob way to do
     true browser-zoom-style scaling without rewriting every px to rem.
     --landing-zoom applies to the whole body. --scrubber-zoom is
     multiplied on top of it (1.25 * 1.20 = 1.50) so the demo reads at
     150% of natural while the rest of the page reads at 125%.
     Mobile breakpoint resets both to 1 because narrow viewports are
     already constrained by the 720px-and-below layout overrides.
     `zoom` is supported in Chrome/Edge/Safari and Firefox 126+ (Apr 2024);
     older Firefox falls back gracefully to 100%. */
  --landing-zoom:  1.25;
  --scrubber-zoom: 1.2;
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0 }
html {
  scroll-behavior: smooth; font-size: 16px;
  /* Belt-and-suspenders against horizontal scroll bugs. The scroll-driven
     scrubber sometimes positions decorative elements off-canvas; this
     keeps a stray transform from dragging a horizontal scrollbar across
     the whole viewport. CRITICAL: use `clip` not `hidden` — `overflow-x:
     hidden` per spec auto-promotes `overflow-y` to `auto`, which makes
     <html> a scrolling container and breaks `position: sticky` on
     descendants (this is what regressed the scrubber's pinned-section
     animation). `overflow-x: clip` only clips overflowing content
     without creating a scrolling context. Browser support is
     Chrome 90+/FF 81+/Safari 16+ — older browsers ignore the rule and
     fall back to the previous "occasionally a stray scrollbar" behaviour
     which is far less severe than a broken demo. */
  overflow-x: clip;
}
body {
  font-family: var(--sans); background: var(--bg); color: var(--t1);
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  letter-spacing: -.005em;
  overflow-x: clip;
  zoom: var(--landing-zoom);
}
.scrubber {
  zoom: var(--scrubber-zoom);
}
@media (max-width: 720px) {
  :root { --landing-zoom: 1; --scrubber-zoom: 1 }
}
/* Common offenders for horizontal scroll on small screens. */
img, video, iframe, canvas, svg, embed, object {
  max-width: 100%;
  height: auto;
}
iframe { display: block; }
em, i, cite, var { font-style: normal }
::-webkit-scrollbar { width: 6px; height: 6px }
::-webkit-scrollbar-track { background: transparent }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,.10); border-radius: 3px }

/* ── NAV ─────────────────────────────────────────────────────────────── */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100; height: 64px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 40px;
  background: rgba(7,7,13,.75); backdrop-filter: blur(20px) saturate(140%);
  border-bottom: 1px solid var(--bdr);
}
.brand { display: inline-flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; text-decoration: none }
.brand-glyph {
  width: 32px; height: 32px; flex-shrink: 0;
  display: inline-flex; align-items: center; justify-content: center;
  filter: drop-shadow(0 6px 18px rgba(124,92,255,.45));
}
.brand-glyph img, .brand-glyph svg {
  width: 100%; height: 100%; display: block;
}
.brand-name {
  font-family: var(--serif); font-size: 22px; line-height: 1; letter-spacing: -.3px;
  color: var(--t1); font-weight: 600;
}
.brand-name em {
  background: linear-gradient(105deg, #ffffff 0%, #a78bff 50%, #22e5ff 100%);
  background-clip: text; -webkit-background-clip: text; color: transparent;
}
.nav-right { display: flex; align-items: center; gap: 6px }
.nav-link {
  font-size: 15px; color: var(--t2); cursor: pointer; padding: 8px 14px;
  border-radius: 8px; text-decoration: none; transition: color .15s, background .15s;
  font-weight: 500;
}
.nav-link:hover { color: var(--t1); background: rgba(255,255,255,.04) }
.nav-cta {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 18px; border-radius: 9px; font-size: 14.5px; font-weight: 600;
  color: #fff; text-decoration: none; cursor: pointer;
  background: linear-gradient(135deg, #7c5cff 0%, #ff3d9a 100%);
  box-shadow: 0 8px 22px -8px rgba(255,61,154,.55), inset 0 1px 0 rgba(255,255,255,.18);
  transition: transform .15s, box-shadow .15s;
  margin-left: 6px;
}
.nav-cta:hover { transform: translateY(-1px); box-shadow: 0 14px 28px -8px rgba(255,61,154,.6), inset 0 1px 0 rgba(255,255,255,.22) }

/* ── HERO ─────────────────────────────────────────────────────────────── */
.hero {
  position: relative; overflow: hidden;
  min-height: 100vh; padding: 140px 40px 80px;
  display: flex; align-items: center;
  background: radial-gradient(120% 80% at 0% 0%, #1a0e3d 0%, transparent 60%),
              radial-gradient(80% 70% at 100% 100%, #15082c 0%, transparent 70%),
              var(--bg);
}
.hero-orbs { position: absolute; inset: 0; pointer-events: none; z-index: 0 }
.hero-orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: .55 }
.hero-orb-1 { width: 520px; height: 520px; left: -120px; top: -180px;
  background: radial-gradient(circle, #a78bff 0%, transparent 70%);
  animation: orb-drift-1 18s ease-in-out infinite }
.hero-orb-2 { width: 440px; height: 440px; right: -80px; top: 80px;
  background: radial-gradient(circle, #ff3d9a 0%, transparent 70%);
  animation: orb-drift-2 22s ease-in-out infinite }
.hero-orb-3 { width: 360px; height: 360px; right: 30%; bottom: -120px;
  background: radial-gradient(circle, #22e5ff 0%, transparent 70%); opacity: .4;
  animation: orb-drift-3 24s ease-in-out infinite }
@keyframes orb-drift-1 { 0%, 100% { transform: translate(0,0) } 50% { transform: translate(60px, 50px) } }
@keyframes orb-drift-2 { 0%, 100% { transform: translate(0,0) } 50% { transform: translate(-50px, 80px) } }
@keyframes orb-drift-3 { 0%, 100% { transform: translate(0,0) } 50% { transform: translate(-70px, -40px) } }

.hero-inner {
  position: relative; z-index: 2; max-width: 880px; margin: 0 auto; width: 100%;
  text-align: center;
}
.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 9px;
  font-family: var(--mono); font-size: 12.5px; font-weight: 600;
  color: var(--t2); letter-spacing: .12em; text-transform: uppercase;
  padding: 7px 14px; border-radius: 999px;
  background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08);
  margin-bottom: 28px;
}
.hero-eyebrow-num {
  font-family: var(--serif); font-size: 17px;
  background: linear-gradient(105deg, #a78bff 0%, #22e5ff 110%);
  background-clip: text; -webkit-background-clip: text; color: transparent;
  letter-spacing: -.02em; text-transform: none; font-weight: 600;
}
.hero-eyebrow-pulse {
  width: 8px; height: 8px; border-radius: 50%; background: var(--good);
  animation: pulse-soft 1.6s ease-in-out infinite;
}
@keyframes pulse-soft { 50% { opacity: .35; transform: scale(.7) } }
.hero-eyebrow-sep { color: var(--t4); margin: 0 1px }

.hero-h1 {
  font-family: var(--serif); font-weight: 400;
  font-size: clamp(46px, 6vw, 88px); line-height: .98;
  letter-spacing: -.045em; color: var(--t1); margin-bottom: 24px;
}
.hero-h1 em {
  background: linear-gradient(105deg, #ffffff 0%, #a78bff 35%, #ff3d9a 70%, #22e5ff 100%);
  background-clip: text; -webkit-background-clip: text; color: transparent;
  font-weight: 500;
}
.hero-sub {
  font-size: 19px; line-height: 1.55; color: var(--t2);
  max-width: 600px; margin: 0 auto 32px; font-weight: 400;
}
.hero-sub strong { color: var(--t1); font-weight: 600 }

.hero-cta-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; justify-content: center }
.btn-cta {
  display: inline-flex; align-items: center; gap: 9px;
  padding: 14px 26px; border-radius: 11px;
  background: linear-gradient(135deg, #7c5cff 0%, #ff3d9a 60%, #22e5ff 130%);
  color: #fff; font-family: var(--sans); font-size: 16px; font-weight: 600;
  cursor: pointer; text-decoration: none; border: none;
  box-shadow: 0 14px 38px -10px rgba(124,92,255,.65),
              0 0 0 1px rgba(255,255,255,.05) inset,
              0 1px 0 rgba(255,255,255,.18) inset;
  position: relative; overflow: hidden;
  transition: transform .18s, box-shadow .18s;
}
.btn-cta:hover { transform: translateY(-2px); box-shadow: 0 22px 50px -12px rgba(255,61,154,.6), 0 0 0 1px rgba(255,255,255,.08) inset, 0 1px 0 rgba(255,255,255,.24) inset }
.btn-cta .btn-arrow { transition: transform .25s cubic-bezier(.16,1,.3,1) }
.btn-cta:hover .btn-arrow { transform: translateX(4px) }
.btn-ghost {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 14px 22px; border-radius: 11px;
  background: transparent; color: var(--t1);
  border: 1px solid var(--bdr2); font-size: 15.5px; font-weight: 500;
  cursor: pointer; text-decoration: none; transition: background .15s, border-color .15s;
}
.btn-ghost:hover { background: rgba(255,255,255,.04); border-color: var(--accent-b) }

.hero-reassure {
  margin-top: 26px;
  display: inline-flex; align-items: center; gap: 10px; flex-wrap: wrap;
  font-family: var(--mono); font-size: 12px; color: var(--t3);
  letter-spacing: .04em;
}
.hero-reassure .dot {
  width: 7px; height: 7px; border-radius: 50%; background: var(--good);
  box-shadow: 0 0 0 0 rgba(74,222,128,.7);
  animation: hr-pulse 1.8s ease-in-out infinite;
}
@keyframes hr-pulse { 50% { box-shadow: 0 0 0 8px rgba(74,222,128,0) } }

.hero-scroll-hint {
  position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
  display: inline-flex; align-items: center; gap: 8px;
  color: var(--t4); font-family: var(--mono); font-size: 11px;
  letter-spacing: .14em; text-transform: uppercase;
  animation: scroll-hint-bob 2.4s ease-in-out infinite;
  z-index: 3;
}
@keyframes scroll-hint-bob { 0%, 100% { transform: translate(-50%, 0); opacity: .55 } 50% { transform: translate(-50%, 6px); opacity: .9 } }

/* ── SCRUBBER ─────────────────────────────────────────────────────────── */
/* The whole demo is a single section pinned for ~2400vh of scroll. Each
   phase gets ~340vh of scroll travel, which at typical wheel speed lingers
   on each phase for 4–6 seconds — long enough that the typewriter and the
   counters actually read as motion, not as a flicker. Mobile drops the
   pin entirely (see the .mobile-stack rules below). */
.scrubber {
  position: relative;
  height: 2400vh;         /* total scroll travel; tune for desired pacing */
  background: var(--bg);
}
.scrubber-pin {
  position: sticky; top: 0;
  height: 100vh; width: 100%;
  display: flex; flex-direction: column;
  overflow: hidden;
  background: radial-gradient(60% 60% at 50% 50%, #0e0e1f 0%, #07070d 80%);
}

.scr-rail {
  flex-shrink: 0;
  display: flex; align-items: stretch; justify-content: stretch;
  padding: 18px 32px 0; gap: 0;
  font-family: var(--mono);
}
.scr-rail-cell {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column; align-items: flex-start; gap: 6px;
  padding: 10px 14px;
  border-bottom: 2px solid rgba(255,255,255,.05);
  position: relative;
  cursor: pointer;
  transition: opacity .25s;
  opacity: .35;
}
.scr-rail-cell.on { opacity: 1 }
.scr-rail-cell.done { opacity: .65 }
.scr-rail-cell::after {
  content: ''; position: absolute; left: 0; bottom: -2px; height: 2px;
  width: var(--p, 0%);
  background: linear-gradient(90deg, var(--accent-h), var(--cyan));
  transition: width .15s linear;
}
.scr-rail-num {
  font-size: 10.5px; letter-spacing: .18em; font-weight: 600; color: var(--t4);
  text-transform: uppercase;
}
.scr-rail-cell.on .scr-rail-num { color: var(--accent-h) }
.scr-rail-lbl {
  font-family: var(--sans); font-size: 14.5px; font-weight: 500; color: var(--t2);
  letter-spacing: -.005em;
}
.scr-rail-cell.on .scr-rail-lbl { color: var(--t1) }

.scr-stage {
  flex: 1; position: relative;
  display: flex; align-items: center; justify-content: center;
  padding: 24px 32px 32px;
  overflow: hidden;
}
.scr-frame {
  position: absolute; inset: 24px 32px 32px;
  display: flex; align-items: center; justify-content: center;
  opacity: 0;
  transform: translateY(18px);
  transition: opacity .35s ease, transform .35s ease;
  pointer-events: none;
}
.scr-frame.active {
  opacity: 1; transform: none;
  pointer-events: auto;
}

.scr-meta {
  position: absolute; left: 32px; bottom: 18px;
  font-family: var(--mono); font-size: 11px; color: var(--t4);
  letter-spacing: .12em; text-transform: uppercase;
  display: inline-flex; align-items: center; gap: 8px;
}
.scr-meta-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--good); animation: pulse-soft 1.6s ease-in-out infinite }

/* ── Phase 1 — Resume scan ───────────────────────────────────────────── */
.ph1 {
  display: grid; grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr); gap: 32px;
  width: 100%; max-width: 1100px; align-items: stretch;
}
.ph1-doc {
  position: relative;
  background: linear-gradient(180deg, #f4f4f8 0%, #e8e8f0 100%);
  border-radius: 6px;
  padding: 22px 24px;
  font-family: 'Times New Roman', Times, serif;
  color: #15151c;
  font-size: 11px; line-height: 1.45;
  box-shadow: 0 30px 60px -20px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.04);
  min-height: 420px;
  overflow: hidden;
}
.ph1-doc-name { font-size: 18px; font-weight: 700; margin-bottom: 2px; letter-spacing: -.01em }
.ph1-doc-contact { font-size: 10px; color: #555; margin-bottom: 12px }
.ph1-doc-h { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; margin-top: 10px; margin-bottom: 4px; padding-bottom: 2px; border-bottom: 1px solid #ccc }
.ph1-doc-row { font-size: 10.5px; margin: 2px 0 }
.ph1-doc-row b { font-weight: 600 }
.ph1-doc-bullet { font-size: 9.5px; padding-left: 12px; position: relative; margin: 2px 0; color: #333 }
.ph1-doc-bullet::before { content: '•'; position: absolute; left: 4px; color: #888 }

.ph1-doc-hl {
  /* highlight overlay sweeping down the doc as the scanner reads */
  position: absolute; left: 0; right: 0; height: 32px;
  background: linear-gradient(180deg, transparent 0%, rgba(124,92,255,.22) 50%, transparent 100%);
  border-top: 1px solid rgba(124,92,255,.45);
  border-bottom: 1px solid rgba(124,92,255,.45);
  pointer-events: none;
  transition: top .15s linear;
  mix-blend-mode: multiply;
}

.ph1-out {
  display: flex; flex-direction: column; gap: 12px;
  align-self: center;
}
.ph1-out-h {
  font-family: var(--mono); font-size: 11px; letter-spacing: .14em;
  text-transform: uppercase; color: var(--t4); font-weight: 600;
  margin-bottom: 2px;
}
.ph1-extract {
  background: rgba(255,255,255,.03);
  border: 1px solid var(--bdr); border-radius: 12px;
  padding: 14px 16px;
}
.ph1-extract-row {
  display: flex; gap: 14px; padding: 5px 0;
  font-family: var(--mono); font-size: 12.5px;
  border-bottom: 1px dashed var(--bdr);
}
.ph1-extract-row:last-child { border-bottom: none }
.ph1-extract-k {
  color: var(--t4); width: 80px; flex-shrink: 0;
  letter-spacing: .04em;
}
.ph1-extract-v { color: var(--t1); font-weight: 500; min-width: 0; word-break: break-word }
.ph1-extract-v em {
  display: inline-block;
  background: linear-gradient(90deg, var(--accent-d), transparent);
  padding: 0 4px; border-radius: 3px;
  color: var(--accent-h);
}

.ph1-skills {
  display: flex; flex-wrap: wrap; gap: 5px;
}
.ph1-skill-chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 999px;
  font-family: var(--mono); font-size: 11.5px; font-weight: 500;
  background: var(--accent-d); border: 1px solid var(--accent-b);
  color: var(--accent-h);
  transform: scale(0); opacity: 0;
  transition: transform .35s cubic-bezier(.34, 1.56, .64, 1), opacity .25s;
}
.ph1-skill-chip.in { transform: scale(1); opacity: 1 }

.ph1-score-row {
  display: grid; grid-template-columns: auto 1fr; gap: 16px; align-items: center;
  padding-top: 10px; border-top: 1px solid var(--bdr);
}
.ph1-score-num {
  font-family: var(--serif); font-size: 56px; font-weight: 500; line-height: 1;
  color: var(--good); letter-spacing: -.04em; font-variant-numeric: tabular-nums;
}
.ph1-score-meta {
  display: grid; grid-template-columns: 1fr 1fr; gap: 4px 18px;
  font-family: var(--mono); font-size: 11px; color: var(--t3);
}
.ph1-score-meta b { color: var(--t1); font-weight: 600 }

/* ── Phase 2 — Discovery ─────────────────────────────────────────────── */
.ph2 {
  width: 100%; max-width: 1100px;
  display: flex; flex-direction: column; gap: 22px; align-items: center;
}
.ph2-counter {
  font-family: var(--mono); font-size: 12px; letter-spacing: .14em;
  text-transform: uppercase; color: var(--t3); font-weight: 600;
  display: inline-flex; align-items: baseline; gap: 14px;
}
.ph2-counter-num {
  font-family: var(--serif); font-size: 48px; font-weight: 500;
  color: var(--accent-h); letter-spacing: -.03em;
  font-variant-numeric: tabular-nums;
  text-transform: none;
}
.ph2-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  width: 100%;
}
.ph2-src {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
  padding: 11px 14px; border-radius: 9px;
  background: rgba(255,255,255,.03);
  border: 1px solid var(--bdr);
  font-family: var(--mono); font-size: 12px;
  color: var(--t3);
  transition: all .35s cubic-bezier(.16,1,.3,1);
  opacity: .35; transform: translateY(6px);
}
.ph2-src.lit {
  opacity: 1; transform: none;
  background: var(--accent-d); border-color: var(--accent-b);
  color: var(--t1);
  box-shadow: 0 4px 14px -4px rgba(124,92,255,.4);
}
.ph2-src-name { font-weight: 600 }
.ph2-src-n {
  font-family: var(--mono); font-size: 11px; color: var(--accent-h);
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  opacity: 0; transition: opacity .25s;
}
.ph2-src.lit .ph2-src-n { opacity: 1 }

.ph2-dedupe-row {
  display: inline-flex; align-items: center; gap: 16px;
  font-family: var(--mono); font-size: 13px; color: var(--t3);
  padding: 10px 18px; border-radius: 999px;
  background: rgba(255,255,255,.03); border: 1px solid var(--bdr);
}
.ph2-dedupe-row b { color: var(--t1); font-weight: 600; font-variant-numeric: tabular-nums }
.ph2-dedupe-arrow {
  display: inline-flex; align-items: center;
  color: var(--t4);
}

/* ── Phase 3 — Scoring ───────────────────────────────────────────────── */
.ph3 { width: 100%; max-width: 720px; display: flex; flex-direction: column; gap: 8px }
.ph3-row {
  display: grid; grid-template-columns: 1fr 220px auto; align-items: center; gap: 14px;
  padding: 12px 16px; border-radius: 11px;
  background: rgba(255,255,255,.03); border: 1px solid var(--bdr);
  opacity: 0; transform: translateY(8px);
  transition: opacity .35s, transform .35s;
}
.ph3-row.in { opacity: 1; transform: none }
.ph3-row-id {
  display: flex; flex-direction: column; gap: 2px; min-width: 0;
}
.ph3-row-title { font-family: var(--sans); font-size: 14px; font-weight: 600; color: var(--t1) }
.ph3-row-co { font-family: var(--mono); font-size: 11.5px; color: var(--t3) }
.ph3-bar-wrap {
  height: 7px; border-radius: 999px; overflow: hidden;
  background: rgba(255,255,255,.05); position: relative;
}
.ph3-bar-fill {
  position: absolute; inset: 0;
  background: linear-gradient(90deg, var(--accent-h), var(--cyan));
  transform-origin: left; transform: scaleX(0);
  transition: transform .55s cubic-bezier(.16,1,.3,1);
}
.ph3-row.in .ph3-bar-fill { transform: scaleX(var(--w, 0)) }
.ph3-score-num {
  font-family: var(--mono); font-size: 16px; font-weight: 700;
  color: var(--accent-h); letter-spacing: -.01em;
  font-variant-numeric: tabular-nums;
  min-width: 28px; text-align: right;
}

/* ── Phase 4 — Tailoring ─────────────────────────────────────────────── */
.ph4 { width: 100%; max-width: 760px; display: flex; flex-direction: column; gap: 16px }
.ph4-head {
  font-family: var(--mono); font-size: 11.5px; letter-spacing: .14em;
  text-transform: uppercase; color: var(--t3); font-weight: 600;
  display: inline-flex; align-items: center; gap: 12px;
  align-self: flex-start;
}
.ph4-head em {
  background: linear-gradient(90deg, var(--accent-h), var(--cyan));
  background-clip: text; -webkit-background-clip: text; color: transparent;
  font-weight: 600; text-transform: none; letter-spacing: 0;
  font-family: var(--sans);
  font-size: 13px;
}
.ph4-card {
  background: rgba(255,255,255,.03);
  border: 1px solid var(--bdr); border-radius: 14px;
  padding: 18px 22px;
  display: flex; flex-direction: column; gap: 14px;
}
.ph4-bullet {
  display: flex; gap: 12px; padding: 12px 14px; border-radius: 9px;
  font-size: 14.5px; line-height: 1.6;
  font-family: var(--sans);
}
.ph4-bullet-mark {
  flex-shrink: 0; width: 22px; height: 22px; border-radius: 6px;
  display: inline-flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 12px; font-weight: 700;
}
.ph4-bullet.before { background: rgba(248,113,113,.06); border: 1px solid rgba(248,113,113,.18); color: var(--t3) }
.ph4-bullet.before .ph4-bullet-mark { background: var(--bad); color: #fff }
.ph4-bullet.after { background: rgba(74,222,128,.06); border: 1px solid var(--good-b); color: var(--t1) }
.ph4-bullet.after .ph4-bullet-mark { background: var(--good); color: #03161a }
.ph4-bullet-txt strong { font-weight: 600; color: var(--t1) }
.ph4-bullet-txt em {
  background: linear-gradient(180deg, transparent 60%, var(--good-d) 60%);
  padding: 0 2px; border-radius: 2px;
  color: var(--good); font-weight: 600;
}
.ph4-bullet-cursor {
  display: inline-block; width: 6px; height: 1em; vertical-align: -2px;
  background: var(--accent-h); margin-left: 1px;
  animation: ph4-blink 1s steps(2) infinite;
}
@keyframes ph4-blink { 50% { opacity: 0 } }
.ph4-changes {
  display: flex; flex-wrap: wrap; gap: 6px; padding-top: 6px;
  border-top: 1px dashed var(--bdr);
}
.ph4-change-chip {
  font-family: var(--mono); font-size: 11px; padding: 3px 9px; border-radius: 999px;
  background: var(--accent-d); border: 1px solid var(--accent-b); color: var(--accent-h);
}

/* ── Phase 5 — Submission ────────────────────────────────────────────── */
.ph5 { width: 100%; max-width: 760px; display: flex; flex-direction: column; gap: 14px }
.ph5-window {
  background: #14141d;
  border: 1px solid var(--bdr2); border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 28px 60px -20px rgba(0,0,0,.65);
}
.ph5-titlebar {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-bottom: 1px solid var(--bdr);
  background: rgba(255,255,255,.02);
}
.ph5-dots { display: inline-flex; gap: 6px }
.ph5-dot { width: 11px; height: 11px; border-radius: 50% }
.ph5-dot:nth-child(1) { background: #ff5f57 }
.ph5-dot:nth-child(2) { background: #febc2e }
.ph5-dot:nth-child(3) { background: #28c840 }
.ph5-url {
  flex: 1; font-family: var(--mono); font-size: 12px; color: var(--t3);
  background: rgba(0,0,0,.3); padding: 5px 12px; border-radius: 6px;
  border: 1px solid var(--bdr);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.ph5-form { padding: 18px 22px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px 18px }
.ph5-field {
  display: flex; flex-direction: column; gap: 5px;
  font-family: var(--mono); font-size: 11px; color: var(--t4);
  letter-spacing: .06em; text-transform: uppercase;
}
.ph5-input {
  font-family: var(--sans); font-size: 13.5px; color: var(--t1);
  background: rgba(255,255,255,.04); border: 1px solid var(--bdr);
  border-radius: 7px; padding: 8px 12px;
  letter-spacing: 0; text-transform: none;
  min-height: 32px;
  transition: background .25s, border-color .25s;
}
.ph5-input.filled {
  background: rgba(74,222,128,.05);
  border-color: var(--good-b);
}
.ph5-submit-wrap { grid-column: 1 / -1; display: flex; justify-content: flex-end; padding-top: 8px }
.ph5-submit-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 22px; border-radius: 9px;
  background: var(--accent); color: #fff;
  font-family: var(--sans); font-size: 14.5px; font-weight: 600;
  border: 1px solid var(--accent); cursor: default;
  transition: all .3s;
}
.ph5-submit-btn.success { background: var(--good); border-color: var(--good); color: #03161a }

/* ── Phase 6 — Tracker ───────────────────────────────────────────────── */
.ph6 { width: 100%; max-width: 880px; display: flex; flex-direction: column; gap: 12px }
.ph6-tab {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 12px; border-radius: 7px 7px 0 0;
  background: linear-gradient(180deg, #1d6e3d 0%, #155729 100%);
  color: #d8f5e1; border: 1px solid #2d8b53;
  font-family: var(--mono); font-size: 11px; font-weight: 600;
  letter-spacing: .04em; align-self: flex-start;
}
.ph6-table {
  background: #f4f4f8; border-radius: 0 8px 8px 8px;
  border: 1px solid #c8c8d4;
  overflow: hidden;
  font-family: var(--mono); font-size: 11.5px;
  color: #15151c;
}
.ph6-row {
  display: grid; grid-template-columns: 36px 2fr 2.5fr 60px 1fr;
  align-items: center;
  padding: 7px 14px;
  border-bottom: 1px solid #d8d8e0;
  background: #fff;
  opacity: 0; transform: translateY(4px);
  transition: opacity .25s, transform .25s;
}
.ph6-row.in { opacity: 1; transform: none }
.ph6-row.head {
  background: #2c2c4a; color: #f6f7ff; font-weight: 600;
  font-size: 11px; letter-spacing: .04em; text-transform: uppercase;
  opacity: 1; transform: none;
}
.ph6-row.head > * { color: #f6f7ff !important }
.ph6-row > div { padding: 0 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
.ph6-status-pill {
  display: inline-block;
  padding: 2px 8px; border-radius: 999px;
  font-size: 10px; font-weight: 600;
  font-family: var(--mono);
}
.ph6-status-pill.applied  { background: #c5f0d4; color: #15523c }
.ph6-status-pill.manual   { background: #ffe5b8; color: #6b3e00 }
.ph6-status-pill.queued   { background: #d8d8e8; color: #45456b }

/* ── Phase 7 — Report ────────────────────────────────────────────────── */
.ph7 { width: 100%; max-width: 720px; display: flex; flex-direction: column; gap: 12px }
.ph7-card {
  background: #07070d;
  border: 1px solid var(--bdr2); border-radius: 12px;
  padding: 22px 26px;
  font-family: var(--mono); font-size: 13.5px; line-height: 1.65;
  color: var(--t2);
  box-shadow: 0 24px 50px -20px rgba(0,0,0,.7);
}
.ph7-h1 {
  font-family: var(--serif); font-weight: 500;
  font-size: 24px; line-height: 1.15; color: var(--t1);
  letter-spacing: -.025em;
  margin-bottom: 4px;
}
.ph7-h1 em {
  background: linear-gradient(105deg, var(--accent-h) 0%, var(--cyan) 100%);
  background-clip: text; -webkit-background-clip: text; color: transparent;
  font-weight: 600;
}
.ph7-pill {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--mono); font-size: 11px; color: var(--good);
  background: var(--good-d); border: 1px solid var(--good-b);
  padding: 4px 10px; border-radius: 999px;
  margin-bottom: 14px;
  letter-spacing: .06em; text-transform: uppercase; font-weight: 600;
}
.ph7-summary { color: var(--t2); margin-bottom: 18px; font-family: var(--sans); font-size: 14.5px; line-height: 1.65 }
.ph7-list { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 8px; counter-reset: ph7c }
.ph7-list li {
  position: relative;
  padding: 10px 14px 10px 44px;
  background: rgba(255,255,255,.03);
  border: 1px solid var(--bdr); border-radius: 9px;
  color: var(--t1); font-size: 14px; font-family: var(--sans); line-height: 1.55;
  counter-increment: ph7c;
}
.ph7-list li::before {
  content: counter(ph7c);
  position: absolute; left: 12px; top: 12px;
  width: 22px; height: 22px; border-radius: 6px;
  background: var(--accent-d); border: 1px solid var(--accent-b);
  color: var(--accent-h); font-family: var(--mono); font-size: 11.5px; font-weight: 700;
  display: inline-flex; align-items: center; justify-content: center;
}
.ph7-cta {
  display: inline-flex; align-items: center; gap: 8px;
  margin-top: 14px;
  padding: 10px 18px; border-radius: 9px;
  background: linear-gradient(135deg, #7c5cff 0%, #ff3d9a 100%);
  color: #fff; font-size: 14.5px; font-weight: 600;
  text-decoration: none;
  align-self: flex-start;
}

/* ── RECAP ───────────────────────────────────────────────────────────── */
/* Sits directly under the Scrubber. Translates the visitor's "I just watched
   this thing run" feeling into the four numbers that anchor the pitch, then
   names each phase they actually saw. Same dark palette as the scrubber so
   it reads as a continuation, not a new page. */
.recap {
  position: relative; isolation: isolate;
  padding: 90px 40px 70px;
  background:
    radial-gradient(80% 60% at 50% 0%, rgba(124,92,255,.10) 0%, transparent 60%),
    var(--bg);
  border-top: 1px solid var(--bdr);
}
.recap-inner { max-width: 1180px; margin: 0 auto }
.recap-eyebrow {
  display: inline-flex; align-items: center; gap: 9px;
  font-family: var(--mono); font-size: 11.5px; font-weight: 600;
  color: var(--t2); letter-spacing: .14em; text-transform: uppercase;
  padding: 6px 12px; border-radius: 999px;
  background: rgba(255,255,255,.03); border: 1px solid var(--bdr);
  margin-bottom: 18px;
}
.recap-eyebrow-num {
  font-family: var(--serif); font-size: 15px;
  background: linear-gradient(105deg, #a78bff 0%, #22e5ff 110%);
  background-clip: text; -webkit-background-clip: text; color: transparent;
  letter-spacing: -.02em; text-transform: none; font-weight: 600;
}
.recap-h {
  font-family: var(--serif); font-weight: 400;
  font-size: clamp(34px, 4.4vw, 54px); line-height: 1.04;
  letter-spacing: -.035em; color: var(--t1);
  max-width: 740px; margin-bottom: 14px;
}
.recap-h em {
  background: linear-gradient(105deg, #a78bff 0%, #ff3d9a 60%, #22e5ff 110%);
  background-clip: text; -webkit-background-clip: text; color: transparent;
  font-weight: 500;
}
.recap-sub {
  font-size: 16.5px; line-height: 1.65; color: var(--t2);
  max-width: 640px; margin-bottom: 36px;
}
.recap-sub strong { color: var(--t1); font-weight: 600 }

.recap-stats {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;
  margin-bottom: 44px;
}
.recap-stat {
  position: relative; isolation: isolate;
  padding: 22px 22px 20px;
  border-radius: 14px;
  background: linear-gradient(165deg, rgba(255,255,255,.03) 0%, rgba(255,255,255,.01) 70%);
  border: 1px solid var(--bdr);
  overflow: hidden;
}
.recap-stat::before {
  content: ''; position: absolute; inset: -1px;
  border-radius: inherit; pointer-events: none;
  background: var(--stat-glow, radial-gradient(60% 80% at 0% 0%, rgba(124,92,255,.14), transparent 60%));
  z-index: -1;
}
.recap-stat-n {
  font-family: var(--serif); font-weight: 500;
  font-size: 44px; line-height: 1;
  color: var(--t1); letter-spacing: -.04em;
  font-variant-numeric: tabular-nums;
  background: var(--stat-grad, linear-gradient(105deg, #a78bff 0%, #22e5ff 100%));
  background-clip: text; -webkit-background-clip: text; color: transparent;
  margin-bottom: 8px;
}
.recap-stat-n-unit {
  font-family: var(--mono); font-size: 18px; font-weight: 600;
  margin-left: 2px; vertical-align: 2px;
}
.recap-stat-l {
  font-family: var(--mono); font-size: 11.5px; font-weight: 600;
  color: var(--t3); letter-spacing: .12em; text-transform: uppercase;
}

.recap-phases {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px;
}
.recap-phase {
  display: flex; flex-direction: column; gap: 6px;
  padding: 14px 14px 16px;
  background: rgba(255,255,255,.02);
  border: 1px solid var(--bdr);
  border-radius: 10px;
  transition: transform .2s, border-color .2s, background .2s;
}
.recap-phase:hover {
  transform: translateY(-3px);
  border-color: var(--accent-b);
  background: rgba(124,92,255,.04);
}
.recap-phase-num {
  font-family: var(--mono); font-size: 10px; font-weight: 700;
  letter-spacing: .14em; color: var(--accent-h);
  text-transform: uppercase;
}
.recap-phase-t {
  font-family: var(--sans); font-size: 14px; font-weight: 600;
  color: var(--t1); letter-spacing: -.005em;
}
.recap-phase-d {
  font-family: var(--sans); font-size: 12.5px; line-height: 1.5; color: var(--t3);
}

/* ── PROVIDERS ───────────────────────────────────────────────────────── */
.providers {
  position: relative;
  padding: 80px 40px 100px;
  background:
    radial-gradient(60% 50% at 50% 100%, rgba(34,229,255,.08) 0%, transparent 60%),
    var(--bg);
  border-top: 1px solid var(--bdr);
}
.providers-inner { max-width: 980px; margin: 0 auto }
.providers-h {
  font-family: var(--serif); font-weight: 400;
  font-size: clamp(30px, 3.4vw, 42px); line-height: 1.04;
  letter-spacing: -.03em; color: var(--t1);
  max-width: 640px; margin-bottom: 12px;
}
.providers-h em {
  background: linear-gradient(105deg, #a78bff 0%, #22e5ff 110%);
  background-clip: text; -webkit-background-clip: text; color: transparent;
  font-weight: 500;
}
.providers-sub {
  font-size: 15.5px; line-height: 1.6; color: var(--t3);
  max-width: 600px; margin-bottom: 32px;
}

.provider-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
}
.provider-card {
  position: relative; overflow: hidden;
  padding: 26px 28px 24px;
  border-radius: 16px;
  background: linear-gradient(165deg, rgba(255,255,255,.04) 0%, rgba(0,0,0,.3) 100%);
  border: 1px solid var(--bdr2);
  display: flex; flex-direction: column; gap: 14px;
  transition: transform .2s, border-color .2s;
}
.provider-card:hover {
  transform: translateY(-4px);
  border-color: var(--accent-b);
}
.provider-card.recommended {
  border-color: var(--accent-b);
  background: linear-gradient(165deg, rgba(124,92,255,.08) 0%, rgba(0,0,0,.3) 100%);
  box-shadow: 0 24px 60px -28px rgba(124,92,255,.5);
}
.provider-tag {
  position: absolute; top: 16px; right: 16px;
  font-family: var(--mono); font-size: 10px; font-weight: 700;
  letter-spacing: .14em; text-transform: uppercase;
  padding: 3px 9px; border-radius: 999px;
  background: var(--accent-d); color: var(--accent-h);
  border: 1px solid var(--accent-b);
}
.prov-eyebrow {
  font-family: var(--mono); font-size: 11px; font-weight: 600;
  color: var(--t3); letter-spacing: .14em; text-transform: uppercase;
}
/* Provider wordmarks — the engine names as oversized type. Each provider
   gets its own gradient palette so the card-pair reads as a clean
   "Ollama vs Claude" centerpiece. Headline-version variants live in
   .pv-headline (used inside the section <h2>); the card-version is
   .prov-wordmark. */
.prov-wordmark {
  font-family: var(--serif); font-weight: 600;
  font-size: clamp(64px, 8vw, 88px); line-height: 0.9;
  letter-spacing: -.045em;
  background-clip: text; -webkit-background-clip: text;
  color: transparent;
  display: inline-block;
  margin: 4px 0 6px;
}
.pv-headline {
  font-style: normal;
  background-clip: text; -webkit-background-clip: text;
  color: transparent;
  font-weight: 600;
}
.pv-word-ollama {
  background-image: linear-gradient(105deg, #3dff9a 0%, #22e5ff 60%, #34d399 110%);
}
.pv-word-claude {
  background-image: linear-gradient(105deg, #ff9a5a 0%, #ff5a78 55%, #c87a3a 110%);
}
.prov-tagline {
  margin: 0; font-size: 14.5px; line-height: 1.55;
  color: var(--t3); max-width: 36ch;
}
.prov-tagline b { color: var(--t1); font-weight: 600 }
.prov-list {
  display: flex; flex-direction: column; gap: 8px;
  margin-top: 4px;
}
.prov-li {
  display: grid; grid-template-columns: 18px 1fr; gap: 10px; align-items: flex-start;
  font-size: 14px; color: var(--t2); line-height: 1.5;
}
.prov-li-mark {
  width: 18px; height: 18px; border-radius: 5px;
  background: var(--good-d); color: var(--good);
  display: inline-flex; align-items: center; justify-content: center;
  margin-top: 1px;
}
.prov-cost {
  margin-top: auto; padding-top: 12px;
  border-top: 1px solid var(--bdr);
  display: flex; align-items: baseline; gap: 8px;
  font-family: var(--mono);
}
.prov-cost-n {
  font-family: var(--serif); font-size: 28px; font-weight: 500;
  letter-spacing: -.02em; color: var(--t1);
}
.prov-cost-l {
  font-size: 12.5px; color: var(--t3);
}

/* ── FINAL CTA + FOOTER ──────────────────────────────────────────────── */
.cta {
  position: relative;
  padding: 110px 40px 80px; text-align: center; overflow: hidden;
  background:
    radial-gradient(80% 60% at 50% 0%, rgba(124,92,255,.18) 0%, transparent 65%),
    radial-gradient(60% 60% at 50% 100%, rgba(34,229,255,.12) 0%, transparent 60%),
    var(--bg);
  border-top: 1px solid var(--bdr);
}
.cta-eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--mono); font-size: 12px; color: var(--t2);
  letter-spacing: .14em; text-transform: uppercase; font-weight: 600;
  padding: 6px 14px; border-radius: 999px;
  background: rgba(255,255,255,.03); border: 1px solid var(--bdr);
  margin-bottom: 22px;
}
.cta-h {
  font-family: var(--serif); font-weight: 400;
  font-size: clamp(36px, 4.6vw, 60px); line-height: 1;
  letter-spacing: -.04em; color: var(--t1); margin-bottom: 18px;
}
.cta-h em {
  background: linear-gradient(105deg, #ffffff 0%, #a78bff 50%, #22e5ff 100%);
  background-clip: text; -webkit-background-clip: text; color: transparent;
  font-weight: 500;
}
.cta-actions {
  display: inline-flex; flex-direction: column; align-items: center; gap: 14px;
  margin-top: 14px;
}
.cta-signin {
  font-size: 14.5px; color: var(--t3); text-decoration: none;
}
.cta-signin em { color: var(--accent-h); font-weight: 600 }
.cta-signin:hover em { text-decoration: underline; text-underline-offset: 3px }

.footer {
  padding: 30px 40px;
  text-align: center; color: var(--t4);
  font-family: var(--mono); font-size: 12px;
  border-top: 1px solid var(--bdr);
  letter-spacing: .04em;
}
.footer em {
  background: linear-gradient(105deg, #a78bff 0%, #22e5ff 100%);
  background-clip: text; -webkit-background-clip: text; color: transparent;
  font-weight: 600;
}

/* ── RESPONSIVE ──────────────────────────────────────────────────────── */
@media (max-width: 920px) {
  .ph1  { grid-template-columns: 1fr; gap: 18px }
  .ph1-doc { min-height: 280px }
  .ph2-grid { grid-template-columns: repeat(3, 1fr) }
  .ph3-row  { grid-template-columns: 1fr; gap: 8px }
  .ph3-bar-wrap { grid-column: 1 }
  .ph3-score-num { grid-column: 1; justify-self: end }
  .ph5-form { grid-template-columns: 1fr }
  .ph6-row  { grid-template-columns: 28px 1.6fr 1.6fr 60px 80px }
  .recap-stats   { grid-template-columns: repeat(2, 1fr) }
  .recap-phases  { grid-template-columns: repeat(2, 1fr) }
  .provider-row  { grid-template-columns: 1fr }
}

/* ── MOBILE ──────────────────────────────────────────────────────────── */
/* Mobile drops the pinned-sticky scrubber entirely — `position: sticky`
   with a dynamic-URL-bar viewport on iOS Safari produces janky travel,
   and a 100vh stage on a 600px screen leaves no room for context above
   or below. The replacement: each phase renders as its own stacked card
   showing the *final* state, no animation, no progress tricks. The
   visitor scrolls past 7 cards naturally — same information, calmer
   pace, never a frame in mid-transition. */

@media (max-width: 720px) {
  .nav { padding: 0 16px }
  .nav-link.hide-on-mobile { display: none }
  .hero { padding: 110px 18px 60px }
  .hero-h1 { font-size: clamp(38px, 9vw, 56px) }
  .hero-sub { font-size: 16px }

  .scrubber, .scrubber.mobile-stack {
    height: auto;
    padding: 32px 0 40px;
  }
  .scrubber-pin, .scrubber.mobile-stack .scrubber-pin {
    position: relative;
    height: auto;
    padding: 0 0 8px;
    overflow: visible;
    background: transparent;
  }
  /* Rail hidden on mobile — its 7 cells flex-wrapping to 3 rows ate too
     much sticky chrome under the fixed nav, and each card now announces
     its own phase number via the ::before pill below. */
  .scr-rail { display: none }

  .scr-stage {
    padding: 0 14px; min-height: 0;
    display: flex; flex-direction: column; gap: 18px;
    align-items: stretch; justify-content: flex-start;
    overflow: visible;
    counter-reset: scr-phase;
  }
  /* Each phase becomes a labelled card, full-state, all visible. */
  .scr-frame {
    position: relative; inset: auto;
    display: block;                  /* override desktop flex centering */
    opacity: 1; transform: none;
    pointer-events: auto;
    background: linear-gradient(165deg, rgba(255,255,255,.03) 0%, rgba(0,0,0,.25) 100%);
    border: 1px solid var(--bdr);
    border-radius: 14px;
    padding: 44px 14px 18px;
    overflow: hidden;
    width: 100%; max-width: 100%;
  }
  .scr-frame::before {
    content: 'Phase ' counter(scr-phase) ' · ' attr(data-label);
    position: absolute; top: 12px; left: 14px; right: 14px;
    font-family: var(--mono); font-size: 10.5px; font-weight: 700;
    letter-spacing: .14em; text-transform: uppercase;
    color: var(--accent-h);
    padding: 4px 9px; border-radius: 6px;
    background: var(--accent-d); border: 1px solid var(--accent-b);
    counter-increment: scr-phase;
    width: fit-content; max-width: 100%;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .scr-meta { display: none }

  /* Phase-internal layout adjustments for the narrower card. */
  .ph1  { grid-template-columns: 1fr; gap: 18px }
  .ph1-doc { min-height: 260px; padding: 18px 18px }
  .ph1-doc-name { font-size: 16px }
  .ph1-doc-bullet { font-size: 9px }
  .ph1-doc-hl { display: none }      /* progress=1 leaves the bar parked at 95% — looks broken on a static card */
  .ph1-extract-row { font-size: 11.5px; gap: 10px }
  .ph1-extract-k { width: 70px }
  .ph1-skill-chip { font-size: 11px; padding: 3px 9px }
  .ph1-score-num { font-size: 44px }
  .ph1-score-meta { font-size: 10.5px }
  .ph2-grid { grid-template-columns: repeat(2, 1fr); gap: 6px }
  .ph2-src { padding: 9px 12px; font-size: 11.5px }
  .ph2-counter-num { font-size: 38px }
  .ph2-dedupe-row { font-size: 11.5px; padding: 8px 14px; gap: 10px; flex-wrap: wrap; justify-content: center }
  .ph3-row  { grid-template-columns: 1fr; gap: 10px }
  .ph3-bar-wrap { grid-column: 1 }
  .ph3-score-num { grid-column: 1; justify-self: end; font-size: 20px }
  .ph4-card { padding: 14px 16px }
  .ph4-bullet { font-size: 13px; padding: 10px 12px }
  .ph5-form { grid-template-columns: 1fr; gap: 10px }
  .ph5-window { font-size: 12px }
  .ph5-url { font-size: 10.5px }
  .ph6-table { font-size: 10px; overflow-x: auto }
  .ph6-row { grid-template-columns: 24px 1.4fr 1.6fr 50px 70px; padding: 6px 10px }
  .ph7-card { padding: 18px 18px }
  .ph7-h1   { font-size: 20px }
  .ph7-summary { font-size: 13.5px }

  .recap     { padding: 60px 18px 50px }
  .providers { padding: 50px 18px 70px }
  .recap-stats { grid-template-columns: 1fr 1fr }
  .recap-phases { grid-template-columns: 1fr }
  .cta { padding: 80px 20px 60px }
}

/* Tighter on very small phones: tame the rail label collisions. */
@media (max-width: 420px) {
  .scr-rail-cell { flex: 0 0 calc(33.333% - 4px); padding: 4px 6px }
  .scr-rail-num { font-size: 8.5px; letter-spacing: .12em }
  .scr-rail-lbl { font-size: 11.5px }
  .recap-stat-n { font-size: 36px }
}

/* ── Mobile hardening (catch-all responsive defaults) ────────────────────
   The landing page only had three @media blocks (920 / 720 / 420). This
   block fills in the gaps so the page never produces horizontal scroll
   and every section behaves on phones / small tablets. Late in the
   cascade so it overrides the earlier desktop-first declarations. */

@supports (padding: max(0px)) {
  .nav { padding-left: max(20px, env(safe-area-inset-left));
         padding-right: max(20px, env(safe-area-inset-right)); }
}

/* (The earlier @media (max-width: 720px) block above already tightens
   .nav and .hero padding for tablets. We only add NEW selectors here so
   the cascade doesn't end up with two same-breakpoint blocks fighting
   over the same properties.) */
@media (max-width: 720px) {
  .nav { height: 56px }
  /* Recap / providers / CTA / generic sections weren't covered by the
     earlier 720px block — only .hero was. Tighten their side padding too. */
  .recap, .providers, .cta, section:not(.hero) {
    padding-left: 18px;
    padding-right: 18px;
  }
  /* The scroll-driven scrubber in the hero is intentionally tall on
     desktop; cap it on mobile so the page doesn't feel like it's
     scrolling forever before any content shows. */
  .scrubber-stage { min-height: 100vh; min-height: 100dvh }
}

@media (max-width: 600px) {
  .nav { padding: 0 14px }
  .nav-link { padding: 6px 8px; font-size: 13.5px }
  /* Hide secondary nav links on mid-size phones — keep just the brand
     and the launch CTA. */
  .nav-link:not(.nav-cta) { display: none }
  /* Wrap any flex row that didn't already opt in. */
  .recap-stats, .providers-grid, .features-grid, .pricing-grid {
    flex-wrap: wrap;
    gap: 14px;
  }
  /* Long monospaced phrases / URLs — break instead of overflowing. */
  .mono, code, pre { word-break: break-all }
}

/* Touch-target floor for any pointer-coarse device (mostly phones/tablets). */
@media (hover: none) and (pointer: coarse) {
  .nav-link, .nav-cta, button, .btn, .cta-btn { min-height: 40px }
}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useMemo } = React;

const LAUNCH_URL = "/app";

/* ── Tiny SVG icons (avoid lucide bundle for landing page) ─────────────── */
const ArrowR = ({ size = 16 }) => (

);

/* ── NAV ─────────────────────────────────────────────────────────────── */
function Nav() {

          <img src="/frontend/favicon.svg" alt="" draggable="false"/>
        </span>

      </a>
      <div className="nav-right">
        <a className="nav-link hide-on-mobile" href={LAUNCH_URL}>Sign in</a>
        <a className="nav-cta" href={LAUNCH_URL}>Try it free <ArrowR size={13}/></a>
      </div>

}

/* ── HERO ─────────────────────────────────────────────────────────────── */
function Hero() {
  return (
    <section className="hero" id="top">
      <div className="hero-orbs" aria-hidden="true">
        <div className="hero-orb hero-orb-1"/>
        <div className="hero-orb hero-orb-2"/>
        <div className="hero-orb hero-orb-3"/>
      </div>
      <div className="hero-inner">
        <div className="hero-eyebrow">
          <span className="hero-eyebrow-num">01</span>
          <span>Watch a real run</span>
          <span className="hero-eyebrow-sep">·</span>
          <span className="hero-eyebrow-pulse"/>
          <span>scroll to play</span>
        </div>
        <h1 className="hero-h1">
          Your job search,<br/><em>on autopilot.</em>
        </h1>
        <p className="hero-sub">
          Drop a resume. We <strong>scan it</strong>, score 20 sources against your profile,
          and tailor every application — automatically.
        </p>
        <div className="hero-cta-row">
          <a className="btn-cta" href={LAUNCH_URL}>
            Try it free <span className="btn-arrow"><ArrowR size={15}/></span>
          </a>
          <a className="btn-ghost" href={LAUNCH_URL}>I have an account</a>
        </div>
        <div className="hero-reassure">
          <span className="dot"/>
          <span>NO CREDIT CARD · FREE TIER RUNS LOCAL OLLAMA ON OUR SERVER</span>
        </div>

      <a href="#scrubber" className="hero-scroll-hint" aria-label="Scroll to demo">
        <ChevronD/> Scroll to watch the pipeline
      </a>
    </section>

}

/* ══════════════════════════════════════════════════════════════════════
   SCRUBBER — single pinned section, scroll-driven progress 0..1
   ══════════════════════════════════════════════════════════════════════ */

/* Phase boundaries on the 0..1 progress timeline. Each phase gets a slice
   sized to the screen-time it deserves (Tailoring is the persuasion peak,
   so it gets the most). Sum is 1.0. */
const PHASE_SLICES = [
  { id: 1, label: 'Resume scan',  start: 0.00, end: 0.14 },
  { id: 2, label: 'Discovery',    start: 0.14, end: 0.28 },
  { id: 3, label: 'Scoring',      start: 0.28, end: 0.42 },
  { id: 4, label: 'Tailoring',    start: 0.42, end: 0.60 },
  { id: 5, label: 'Submission',   start: 0.60, end: 0.72 },
  { id: 6, label: 'Tracker',      start: 0.72, end: 0.86 },
  { id: 7, label: 'Report',       start: 0.86, end: 1.00 },
];

function localProgress(globalP, slice) {
  if (globalP < slice.start) return 0;
  if (globalP > slice.end)   return 1;
  return (globalP - slice.start) / (slice.end - slice.start);
}

function activeSliceIndex(p) {
  for (let i = 0; i < PHASE_SLICES.length; i++) {
    if (p < PHASE_SLICES[i].end) return i;
  }
  return PHASE_SLICES.length - 1;
}

function Scrubber() {
  const sectionRef = useRef(null);
  // Mobile must initialize at end-state (progress=1) on the very first
  // render — otherwise React paints every phase at 0% (empty doc, empty
  // grids, score=0) for the brief moment before useEffect runs, which
  // looked like a "broken" demo on a phone.
  const [progress, setProgress] = useState(() =>
    typeof window !== 'undefined' && window.innerWidth <= 720 ? 1 : 0
  );
  const [data, setData] = useState(null);
  const [dataErr, setDataErr] = useState(null);
  const isMobile = useIsMobile();

  // Load the frozen pipeline output once.
  useEffect(() => {
    fetch('/frontend/landing/demo-run.json')
      .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
      .then(setData)
      .catch(e => setDataErr(String(e)));
  }, []);

  // Desktop: scroll-driven. Mobile: render every phase at its final state
  // simultaneously — pinned-sticky on iOS Safari with a dynamic URL bar is
  // unreliable, and stacking 7 cards is calmer for narrow screens anyway.
  useEffect(() => {
    if (!sectionRef.current) return undefined;
    if (isMobile) {
      setProgress(1);   // every phase frame reads as "complete" on mobile
      return undefined;
    }

    let raf = 0;
    let pending = false;
    const onScroll = () => {
      if (pending) return;
      pending = true;
      raf = requestAnimationFrame(() => {
        pending = false;
        const el = sectionRef.current;
        if (!el) return;
        const rect = el.getBoundingClientRect();
        const total = el.offsetHeight - window.innerHeight;
        // -rect.top because rect.top goes negative as we scroll down through the section.
        const raw = total > 0 ? Math.max(0, Math.min(1, -rect.top / total)) : 0;
        setProgress(raw);
      });
    };
    onScroll();
    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('resize', onScroll);
    return () => {
      window.removeEventListener('scroll', onScroll);
      window.removeEventListener('resize', onScroll);
      cancelAnimationFrame(raf);
    };
  }, [isMobile]);

  const activeIdx = activeSliceIndex(progress);

  // While loading the JSON, render the structure with dim placeholders so
  // there's no jarring layout pop when data lands.
  return (
    <section
      className={'scrubber' + (isMobile ? ' mobile-stack' : '')}
      id="scrubber"
      ref={sectionRef}
      aria-label="Watch the pipeline run">
      <div className="scrubber-pin">
        <div className="scr-rail" role="tablist" aria-label="Pipeline phases">
          {PHASE_SLICES.map((s, i) => {
            const lp = localProgress(progress, s);
            const isOn   = !isMobile && i === activeIdx;
            const isDone = !isMobile && i  <  activeIdx;
            return (
              <div
                key={s.id}
                className={'scr-rail-cell' + (isOn ? ' on' : (isDone ? ' done' : ''))}
                style={{ '--p': `${Math.round(lp * 100)}%` }}
                role="tab"
                aria-selected={isOn}>
                <span className="scr-rail-num">Phase {s.id}</span>
                <span className="scr-rail-lbl">{s.label}</span>
              </div>
            );
          })}
        </div>
        <div className="scr-stage">
          {dataErr && (
            <div className="scr-frame active" style={{ color: 'var(--t3)' }}>
              <div style={{ textAlign:'center', padding: 30 }}>
                Demo data couldn't load — refresh the page.<br/>
                <code style={{ fontFamily:'var(--mono)', fontSize:12, color:'var(--t4)' }}>{dataErr}</code>
              </div>
            </div>
          )}
          {!data && !dataErr && (
            <div className="scr-frame active" style={{ color: 'var(--t3)' }}>
              <div style={{ textAlign:'center', padding: 30, fontFamily:'var(--mono)', fontSize:13, letterSpacing:'.06em', textTransform:'uppercase' }}>
                <span className="scr-meta-dot" style={{ display:'inline-block', marginRight:10, verticalAlign:'middle' }}/>
                Loading demo run…
              </div>
            </div>
          )}
          {data && PHASE_SLICES.map((s, i) => {
            // Mobile: every frame is "active" and rendered at progress=1 (end-state).
            // Desktop: only the active frame is opaque; others fade.
            const active = isMobile || i === activeIdx;
            const localP = isMobile ? 1 : localProgress(progress, s);
            return (
              <div
                key={s.id}
                className={'scr-frame' + (active ? ' active' : '')}
                data-label={s.label}
                aria-hidden={!active}>
                <PhaseFrame phase={s.id} progress={localP} data={data}/>
              </div>
            );
          })}
        </div>
        <div className="scr-meta">
          <span className="scr-meta-dot"/>
          <span>Real run · DemoProvider · {data ? data.resume.name : 'loading…'}</span>
        </div>
      </div>
    </section>
  );
}

function useIsMobile() {
  const [m, setM] = useState(() => typeof window !== 'undefined' && window.innerWidth <= 720);
  useEffect(() => {
    const fn = () => setM(window.innerWidth <= 720);
    window.addEventListener('resize', fn);
    return () => window.removeEventListener('resize', fn);
  }, []);
  return m;
}

/* ── Phase dispatcher ────────────────────────────────────────────────── */
function PhaseFrame({ phase, progress, data }) {
  if (phase === 1) return <Phase1Scan      data={data} p={progress}/>;
  if (phase === 2) return <Phase2Discovery data={data} p={progress}/>;
  if (phase === 3) return <Phase3Scoring   data={data} p={progress}/>;
  if (phase === 4) return <Phase4Tailoring data={data} p={progress}/>;
  if (phase === 5) return <Phase5Submit    data={data} p={progress}/>;
  if (phase === 6) return <Phase6Tracker   data={data} p={progress}/>;
  if (phase === 7) return <Phase7Report    data={data} p={progress}/>;
  return null;
}

/* ── Phase 1: Resume scan ────────────────────────────────────────────── */
function Phase1Scan({ data, p }) {
  const r = data.resume;
  // Highlight bar slides down the doc as p goes 0→0.6, then sits at the bottom.
  const hlTop = `${Math.min(0.95, p / 0.6) * 100}%`;
  const skillsIn = Math.floor(Math.min(1, p / 0.7) * r.skills.length);
  const score = Math.round(Math.min(1, Math.max(0, (p - 0.55) / 0.4)) * r.score);
  return (
    <div className="ph1">
      <div className="ph1-doc" aria-hidden="true">
        <div className="ph1-doc-name">{r.name}</div>
        <div className="ph1-doc-contact">{r.email} · {r.linkedin}</div>

        <div className="ph1-doc-h">Education</div>
        <div className="ph1-doc-row"><b>MIT</b> — B.S. EECS · Expected May 2025 · GPA 4.7</div>

        <div className="ph1-doc-h">Experience</div>
        <div className="ph1-doc-row"><b>Apple Inc.</b> — IC Design Intern · Jun–Aug 2024</div>
        <div className="ph1-doc-bullet">Designed RF amplifier prototypes — improved SNR by 6 dB across 5 devices.</div>
        <div className="ph1-doc-bullet">Wrote 2,400 lines of SystemVerilog for low-power memory controller.</div>
        <div className="ph1-doc-row"><b>NVIDIA</b> — ASIC Verification Intern · Jun–Aug 2023</div>
        <div className="ph1-doc-bullet">Built UVM testbench covering 94% of an H100 datapath module.</div>
        <div className="ph1-doc-bullet">Optimized CUDA matmul kernel from 1.2 → 1.8 TFLOPS.</div>

        <div className="ph1-doc-h">Skills</div>
        <div className="ph1-doc-row">Python, C, C++, SystemVerilog, Verilog, VHDL, MATLAB, CUDA, Bash</div>

        <div className="ph1-doc-hl" style={{ top: hlTop }}/>
      </div>

      <div className="ph1-out">
        <div className="ph1-out-h">Extracted</div>
        <div className="ph1-extract">
          <div className="ph1-extract-row"><span className="ph1-extract-k">Name</span><span className="ph1-extract-v"><em>{r.name}</em></span></div>
          <div className="ph1-extract-row"><span className="ph1-extract-k">Email</span><span className="ph1-extract-v">{r.email}</span></div>
          <div className="ph1-extract-row"><span className="ph1-extract-k">School</span><span className="ph1-extract-v">MIT · EECS</span></div>
          <div className="ph1-extract-row"><span className="ph1-extract-k">Roles</span><span className="ph1-extract-v">{r.experience.length} positions parsed</span></div>
        </div>
        <div className="ph1-out-h" style={{ marginTop: 4 }}>Skills · {r.skills.length} hard</div>
        <div className="ph1-skills">
          {r.skills.map((s, i) => (
            <span key={s} className={'ph1-skill-chip' + (i < skillsIn ? ' in' : '')}
                  style={{ transitionDelay: `${i * 30}ms` }}>{s}</span>
          ))}
        </div>
        <div className="ph1-score-row">
          <div className="ph1-score-num">{score}</div>
          <div className="ph1-score-meta">
            <span>Quantified <b>{r.metrics.quantified_pct}%</b></span>
            <span>Action verbs <b>{r.metrics.action_verb_pct}%</b></span>
            <span>Skill density <b>{r.metrics.skill_density}</b></span>
            <span>Weak phrases <b>{r.metrics.weak_phrases}</b></span>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── Phase 2: Discovery ──────────────────────────────────────────────── */
function Phase2Discovery({ data, p }) {
  const sources = data.discovery.sources;
  const lit = Math.floor(Math.min(1, p / 0.55) * sources.length);
  const dedupePhase = p > 0.7;
  const counter = dedupePhase
    ? Math.round(data.discovery.after_dedupe + (data.discovery.after_filter - data.discovery.after_dedupe) * Math.min(1, (p - 0.85) / 0.12))
    : Math.round(Math.min(1, p / 0.7) * data.discovery.total_found);
  return (
    <div className="ph2">
      <div className="ph2-counter">
        <span>Jobs found</span>
        <span className="ph2-counter-num">{counter}</span>
      </div>
      <div className="ph2-grid">
        {sources.map((s, i) => (
          <div key={s.name} className={'ph2-src' + (i < lit ? ' lit' : '')}
               style={{ transitionDelay: `${i * 18}ms` }}>
            <span className="ph2-src-name">{s.name}</span>
            <span className="ph2-src-n">+{s.found}</span>
          </div>
        ))}
      </div>
      <div className="ph2-dedupe-row" style={{ opacity: p > 0.62 ? 1 : 0.3, transition: 'opacity .3s' }}>
        <span><b>{data.discovery.total_found}</b> found</span>
        <span className="ph2-dedupe-arrow">→</span>
        <span><b>{data.discovery.after_dedupe}</b> after dedupe</span>
        <span className="ph2-dedupe-arrow">→</span>
        <span style={{ color: 'var(--good)' }}><b>{data.discovery.after_filter}</b> match your filters</span>
      </div>
    </div>
  );
}

/* ── Phase 3: Scoring ────────────────────────────────────────────────── */
function Phase3Scoring({ data, p }) {
  const jobs = data.scoring.top_jobs;
  // Stagger row reveal then animate the score bars.
  return (
    <div className="ph3">
      {jobs.map((j, i) => {
        const rowStart = i / (jobs.length + 1);
        const rowIn = p > rowStart;
        return (
          <div key={`${j.company}-${j.title}`} className={'ph3-row' + (rowIn ? ' in' : '')}
               style={{ '--w': j.score / 100 }}>
            <div className="ph3-row-id">
              <span className="ph3-row-title">{j.title}</span>
              <span className="ph3-row-co">{j.company} · {j.location}</span>
            </div>
            <div className="ph3-bar-wrap"><div className="ph3-bar-fill"/></div>
            <span className="ph3-score-num">{j.score}</span>
          </div>
        );
      })}
    </div>
  );
}

/* ── Phase 4: Tailoring (cinematic moment) ───────────────────────────── */
function Phase4Tailoring({ data, p }) {
  const t = data.tailoring;
  const fullAfter = t.after;
  // Type out the "after" bullet during 0.15..0.75 of the phase.
  const typeP = Math.max(0, Math.min(1, (p - 0.15) / 0.6));
  const cutoff = Math.floor(typeP * fullAfter.length);
  const typed = fullAfter.slice(0, cutoff);
  const showCursor = p > 0.15 && p < 0.78;
  const showChanges = p > 0.78;
  return (
    <div className="ph4">
      <div className="ph4-head">
        <span>Phase 4 · Tailoring</span>
        <em>{t.company} · {t.title}</em>
      </div>
      <div className="ph4-card">
        <div className="ph4-bullet before">
          <span className="ph4-bullet-mark">−</span>
          <span className="ph4-bullet-txt">{t.before}</span>
        </div>
        <div className="ph4-bullet after">
          <span className="ph4-bullet-mark">+</span>
          <span className="ph4-bullet-txt">
            <strong>Engineered</strong>{typed.replace('Engineered', '')}
            {showCursor && <span className="ph4-bullet-cursor"/>}
          </span>
        </div>
        {showChanges && (
          <div className="ph4-changes">
            {t.diff_changes.map((c, i) => (
              <span key={i} className="ph4-change-chip">{c}</span>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

/* ── Phase 5: Submission ─────────────────────────────────────────────── */
function Phase5Submit({ data, p }) {
  const fields = [
    { l: 'Full name',       v: 'Aisha Rahman',          when: 0.05 },
    { l: 'Email',           v: 'aisha.rahman@mit.edu',  when: 0.12 },
    { l: 'Phone',           v: '(617) 555-0142',        when: 0.18 },
    { l: 'LinkedIn',        v: 'linkedin.com/in/…',     when: 0.24 },
    { l: 'School',          v: 'MIT',                   when: 0.30 },
    { l: 'Degree',          v: 'B.S. EECS',             when: 0.36 },
    { l: 'Graduation',      v: 'May 2025',              when: 0.42 },
    { l: 'Visa sponsorship',v: 'Not required',          when: 0.48 },
    { l: 'Résumé',          v: 'aisha-rahman.tailored.pdf', when: 0.55 },
    { l: 'Cover letter',    v: 'NVIDIA-asic-cover.pdf',  when: 0.62 },
  ];
  const submitted = p > 0.85;
  return (
    <div className="ph5">
      <div className="ph5-window">
        <div className="ph5-titlebar">
          <span className="ph5-dots">
            <span className="ph5-dot"/><span className="ph5-dot"/><span className="ph5-dot"/>
          </span>
          <span className="ph5-url">boards.greenhouse.io/{data.tailoring.company.toLowerCase()}/jobs/asic-design-intern</span>
        </div>
        <div className="ph5-form">
          {fields.map((f, i) => (
            <div key={i} className="ph5-field">
              <span>{f.l}</span>
              <span className={'ph5-input' + (p > f.when ? ' filled' : '')}>
                {p > f.when ? f.v : ' '}
              </span>
            </div>
          ))}
          <div className="ph5-submit-wrap">
            <span className={'ph5-submit-btn' + (submitted ? ' success' : '')}>
              {submitted ? '✓ Submitted' : 'Submit application'}
            </span>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── Phase 6: Tracker ────────────────────────────────────────────────── */
function Phase6Tracker({ data, p }) {
  const rows = data.tracker.preview_rows;
  // Stagger row reveal across the phase.
  return (
    <div className="ph6">
      <div className="ph6-tab">📊 Job_Applications_Tracker_2026-05.xlsx</div>
      <div className="ph6-table">
        <div className="ph6-row head">
          <div>#</div><div>Company</div><div>Title</div><div>Score</div><div>Status</div>
        </div>
        {rows.map((r, i) => {
          const rowStart = 0.05 + (i * 0.16);
          const rowIn = p > rowStart;
          const status = (r.status || '').toLowerCase();
          return (
            <div key={i} className={'ph6-row' + (rowIn ? ' in' : '')}>
              <div>{String(i + 1).padStart(2, '0')}</div>
              <div><b>{r.company}</b></div>
              <div>{r.title}</div>
              <div>{r.score}</div>
              <div><span className={'ph6-status-pill ' + status}>{r.status}</span></div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ── Phase 7: Report ─────────────────────────────────────────────────── */
function Phase7Report({ data, p }) {
  const r = data.report;
  const stepsIn = Math.floor(Math.min(1, Math.max(0, (p - 0.25) / 0.55)) * r.next_steps.length);
  return (
    <div className="ph7">
      <div className="ph7-card">
        <div className="ph7-pill">Run complete</div>
        <h3 className="ph7-h1">{r.headline.split(' · ').map((seg, i, arr) => (
          <React.Fragment key={i}>
            {i === 0 ? <em>{seg}</em> : seg}
            {i < arr.length - 1 ? ' · ' : ''}
          </React.Fragment>
        ))}</h3>
        <p className="ph7-summary">{r.summary}</p>
        <ol className="ph7-list">
          {r.next_steps.slice(0, stepsIn + 1).map((step, i) => (
            <li key={i}>{step}</li>
          ))}
        </ol>
        {p > 0.85 && (
          <a className="ph7-cta" href={LAUNCH_URL}>Run it on your resume <ArrowR size={14}/></a>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════════
   RECAP — sits directly under the scrubber. Anchors what the visitor just
   watched in four numbers and seven one-line phase summaries. Static
   content (framework facts, not run-specific) so no data dependency on the
   scrubber's JSON.
   ══════════════════════════════════════════════════════════════════════ */
function Recap() {
  const stats = [
    { n: '20',  unit: '+',  l: 'Job sources',    grad: 'linear-gradient(105deg, #a78bff 0%, #22e5ff 100%)' },
    { n: '7',                l: 'Pipeline phases', grad: 'linear-gradient(105deg, #22e5ff 0%, #a78bff 100%)' },
    { n: '0',   prefix: '$', l: 'Keys to start',   grad: 'linear-gradient(105deg, #4ade80 0%, #22e5ff 100%)' },
    { n: '~4',  unit: 'm',   l: 'Full run',        grad: 'linear-gradient(105deg, #ff3d9a 0%, #a78bff 100%)' },
  ];
  const phases = [
    { n: 1, t: 'Resume scan',      d: 'Heuristic regex pulls every field. The LLM verifies and adds a critique.' },
    { n: 2, t: 'Discovery',        d: '20+ sources hit in parallel. Deduplicated by URL and (company, title).' },
    { n: 3, t: 'Scoring',          d: 'Fast keyword pass, then an LLM rubric for the top picks. Cents, not dollars.' },
    { n: 4, t: 'Tailoring',        d: 'Bullets rewritten for each posting. Diff is human-readable, not a black box.' },
    { n: 5, t: 'Submission',       d: 'Greenhouse via Playwright when allowed. Manual queue for boards that aren\'t.' },
    { n: 6, t: 'Tracker',          d: 'Excel workbook, 17 columns, color-coded status. Auto-deduped against last run.' },
    { n: 7, t: 'Run report',       d: 'Plain-language summary, top picks, manual queue, next steps. Optional email.' },
  ];
  return (
    <section className="recap" id="recap">
      <div className="recap-inner">
        <div className="recap-eyebrow">
          <span className="recap-eyebrow-num">02</span>
          <span>Recap</span>
        </div>
        <h2 className="recap-h">
          What you just watched is <em>the actual production code.</em>
        </h2>
        <p className="recap-sub">
          Same scanner. Same scorer. Same tailor. Your run will look like that against
          your own resume — only the names, scores, and bullets change. Every number
          on this page came out of <strong>frontend/landing/demo-run.json</strong>,
          which a build script regenerates by running the real pipeline.
        </p>

        <div className="recap-stats">
          {stats.map(s => (
            <div key={s.l} className="recap-stat" style={{ '--stat-grad': s.grad }}>
              <div className="recap-stat-n" style={{ background: s.grad, WebkitBackgroundClip: 'text', backgroundClip: 'text', color: 'transparent' }}>
                {s.prefix}{s.n}{s.unit && <span className="recap-stat-n-unit">{s.unit}</span>}
              </div>
              <div className="recap-stat-l">{s.l}</div>
            </div>
          ))}
        </div>

        <div className="recap-phases">
          {phases.map(p => (
            <div key={p.n} className="recap-phase">
              <span className="recap-phase-num">Phase {p.n}</span>
              <span className="recap-phase-t">{p.t}</span>
              <span className="recap-phase-d">{p.d}</span>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}
