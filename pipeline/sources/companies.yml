# ─── Workday ────────────────────────────────────────────────────────────────
# Public unauth POST — `https://{slug}.{host}.myworkdayjobs.com/wday/cxs/{slug}/{site}/jobs`.
# Workday tenants need the full triple (slug + wdN host + site path); the host can't be
# guessed. Every entry below was live-verified by POSTing and getting >=1 posting back.
# This is the BIGGEST single coverage win — Fortune 500 healthcare, retail, finance,
# and media that no other source touches. NVIDIA omitted intentionally (already in
# greenhouse:; same jobs would double-count under different canonical URLs).
workday:
  # Healthcare / pharma
  - {slug: cigna,             host: wd5,   site: cignacareers}
  - {slug: elevancehealth,    host: wd1,   site: ANT}
  - {slug: humana,            host: wd5,   site: Humana_External_Career_Site}
  - {slug: bristolmyerssquibb, host: wd5,   site: BMS}
  - {slug: medtronic,         host: wd1,   site: MedtronicCareers}
  - {slug: astrazeneca,       host: wd3,   site: Careers}
  # Retail / consumer
  - {slug: walmart,           host: wd5,   site: WalmartExternal}
  - {slug: target,            host: wd5,   site: targetcareers}
  - {slug: homedepot,         host: wd5,   site: CareerDepot}
  - {slug: nordstrom,         host: wd501, site: nordstrom_careers}
  - {slug: coke,              host: wd1,   site: coca-cola-careers}
  # Finance / insurance
  - {slug: wf,                host: wd1,   site: WellsFargoJobs}
  - {slug: capitalone,        host: wd12,  site: Capital_One}
  - {slug: ghr,               host: wd1,   site: Lateral-US}              # Bank of America
  - {slug: citi,              host: wd5,   site: '2'}
  - {slug: mastercard,        host: wd1,   site: CorporateCareers}
  - {slug: visa,              host: wd5,   site: Visa}
  - {slug: paypal,            host: wd1,   site: jobs}
