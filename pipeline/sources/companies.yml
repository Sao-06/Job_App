# Per-company ATS allowlist used by ats_*.py source modules.
# Each entry is `slug: provider`. The slug is the company's identifier
# inside that provider's URL space.
#
# Add new entries by inspecting the careers page:
#   - boards.greenhouse.io/<slug>      → greenhouse
#   - jobs.lever.co/<slug>             → lever
#   - jobs.ashbyhq.com/<slug>          → ashby
#   - apply.workable.com/<slug>        → workable

