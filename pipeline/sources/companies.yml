# registered with SmartRecruiters). Bias here is intentionally NON-tech: healthcare,
# QSR/hospitality, retail, finance, public sector — categories that the rest of the
# index under-covers. All entries below were live-verified to return >0 postings
# at seed time; if any go cold, drop them.
