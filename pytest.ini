[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: fast pure-Python tests with no I/O outside tmp dirs
    integration: tests that hit FastAPI TestClient or write SQLite
    slow: long-running tests (skip with -m "not slow")
addopts = -ra --strict-markers --tb=short
asyncio_mode = strict
filterwarnings =
    ignore::DeprecationWarning:pydantic.*
    ignore::DeprecationWarning:fastapi.*
    ignore:.*on_event.*:DeprecationWarning
